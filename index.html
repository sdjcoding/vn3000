<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>VN 3000 · 闪卡</title>
<style>
:root{
  --bg:#f8fafc; --card:#fff; --soft:#f1f5f9; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0; --accent:#1e40af;
  --vn:#1e3a5f; --jp:#1a1a1a; --en:#64748b;
  --core-bg:#dbeafe; --core:#1e40af;
  --biz-bg:#fef3c7; --biz:#92400e;
  --daily-bg:#dcfce7; --daily:#166534;
  --gold:#f59e0b; --success:#16a34a;
  --sh:0 4px 16px rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --bg:#0f172a; --card:#1e293b; --soft:#334155; --text:#f1f5f9; --muted:#94a3b8;
  --border:#334155; --accent:#60a5fa;
  --vn:#93c5fd; --jp:#e2e8f0; --en:#cbd5e1;
  --core-bg:#1e3a8a; --core:#93c5fd;
  --biz-bg:#78350f; --biz:#fde68a;
  --daily-bg:#14532d; --daily:#bbf7d0;
  --gold:#fbbf24; --success:#4ade80;
  --sh:0 4px 16px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
  transition:background .2s,color .2s;
  display:flex;flex-direction:column;
  min-height:100dvh;min-height:100vh;
}
ruby{ruby-align:center}
rt{font-size:.5em;color:var(--muted);font-weight:normal}
header{
  position:sticky;top:0;z-index:100;background:var(--card);
  border-bottom:1px solid var(--border);padding:10px 12px;box-shadow:var(--sh);
}
.htop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
h1{font-size:16px;color:var(--accent);font-weight:700}
.theme-btn{
  background:var(--soft);border:1px solid var(--border);color:var(--text);
  padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;
}
.filters{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ch{
  padding:5px 11px;border:1px solid var(--border);border-radius:14px;
  background:var(--soft);color:var(--text);font-size:11px;cursor:pointer;
  user-select:none;font-weight:600;
}
.ch.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ch.toggle{background:transparent}
.ch.toggle.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.ch.toggle.rating.level-1{background:var(--fa);border-color:var(--fa);color:#fff}
.ch.toggle.rating.level-2{background:#f59e0b;border-color:#f59e0b;color:#fff}
.ch.toggle.rating.level-3{background:var(--fc);border-color:var(--fc);color:#fff}
.ch.toggle.rating.unrated{background:var(--accent);border-color:var(--accent);color:#fff}
.ch.toggle.order.on{background:var(--accent);border-color:var(--accent)}
.ch.toggle.audio.on{background:#ec4899;border-color:#ec4899;color:#fff}
.ch.toggle.audio.playing{animation:pulse 1.2s ease-in-out infinite}
.cat-btn{background:var(--soft);border:1px solid var(--border);color:var(--text);cursor:pointer;
  font-family:inherit;font-weight:600;max-width:220px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn:hover{border-color:var(--accent)}
.cat-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:16px}
.cat-modal[hidden]{display:none}
.cat-modal-inner{background:var(--card);border:1px solid var(--border);
  border-radius:14px;width:100%;max-width:460px;max-height:80vh;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.35)}
.cat-modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border)}
.cat-modal-close{background:var(--soft);border:1px solid var(--border);color:var(--text);
  width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px}
.cat-search{margin:10px 16px 0;padding:8px 12px;border:1px solid var(--border);
  border-radius:8px;font-size:13px;background:var(--soft);color:var(--text);outline:none}
.cat-search:focus{border-color:var(--accent)}
.cat-list{flex:1;overflow-y:auto;padding:8px 8px 14px}
.cat-item{display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;border-radius:8px;cursor:pointer;user-select:none;font-size:13px;
  color:var(--text);margin:2px 0}
.cat-item:hover{background:var(--soft)}
.cat-item.active{background:var(--accent);color:#fff;font-weight:600}
.cat-item-count{font-size:11px;color:var(--muted);font-weight:500}
.cat-item.active .cat-item-count{color:rgba(255,255,255,.8)}
.status{
  padding:6px 12px;font-size:11px;color:var(--muted);
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;gap:12px;align-items:center;
}
.clear-btn{
  font-size:10px;color:var(--muted);background:none;border:none;
  cursor:pointer;text-decoration:underline;padding:2px 6px;
}
main{
  padding:14px 12px;max-width:640px;width:100%;margin:0 auto;
  flex:1;min-height:0;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.scene{
  perspective:1400px;width:100%;max-width:560px;
  flex:1;min-height:220px;max-height:720px;
}
.card{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;-webkit-transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer;
}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--sh);
  padding:22px 20px;
  display:flex;flex-direction:column;overflow:hidden;
}
.back{transform:rotateY(180deg)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;gap:8px;
}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;
  background:var(--core-bg);color:var(--core);max-width:60%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-badge{font-size:10px;color:var(--muted);flex:1;text-align:center}
.num{font-size:10px;color:var(--muted);font-weight:700}
.body{
  flex:1;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  text-align:center;overflow-y:auto;padding:8px 0;
}
/* Front: words, hierarchy VN > JP > EN */
.vn-word{
  font-size:48px;font-weight:700;color:var(--vn);
  line-height:1.15;word-wrap:break-word;
  margin-bottom:18px;padding-bottom:16px;
  border-bottom:1px dashed var(--border);width:100%;
}
.jp-word{
  font-size:26px;font-weight:600;color:var(--jp);
  line-height:1.4;margin-bottom:12px;width:100%;
}
.en-word{
  font-size:17px;font-weight:500;color:var(--en);
  line-height:1.4;width:100%;opacity:.9;
}
/* Back: example sentences, hierarchy VN > JP > EN */
.vn-ex{
  font-size:28px;font-weight:600;color:var(--vn);
  line-height:1.45;word-wrap:break-word;
  margin-bottom:16px;padding-bottom:14px;
  border-bottom:1px dashed var(--border);width:100%;
}
.jp-ex{
  font-size:20px;color:var(--jp);line-height:1.6;
  margin-bottom:14px;padding-bottom:12px;
  border-bottom:1px dashed var(--border);width:100%;
}
.en-ex{
  font-size:14px;color:var(--en);font-style:italic;
  line-height:1.5;opacity:.85;width:100%;
}
.card-bottom{
  display:flex;gap:10px;justify-content:flex-end;margin-top:8px;
}
.icon-btn{
  background:var(--soft);border:1px solid var(--border);color:var(--muted);
  width:36px;height:36px;border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all .15s;
}
.icon-btn:hover{background:var(--border)}
.icon-btn.on[data-type="bookmark"]{background:var(--gold);color:#fff;border-color:var(--gold)}
.rate-group{display:flex;gap:5px}
.rate-btn{
  width:30px;height:30px;border-radius:15px;
  border:1px solid var(--border);background:var(--soft);color:var(--muted);
  font-size:13px;font-weight:700;cursor:pointer;user-select:none;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  font-family:inherit;
}
.rate-btn:hover{background:var(--border)}
.rate-btn.level-1.on{background:var(--fa);border-color:var(--fa);color:#fff}
.rate-btn.level-2.on{background:#f59e0b;border-color:#f59e0b;color:#fff}
.rate-btn.level-3.on{background:var(--fc);border-color:var(--fc);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.flip-hint{
  font-size:10px;color:var(--muted);text-align:center;
  letter-spacing:.06em;margin:0;
}
.nav-bar{
  display:flex;gap:10px;width:100%;max-width:560px;flex:0 0 auto;
}
.nav-btn{
  flex:1;padding:14px;border:1px solid var(--border);
  border-radius:10px;background:var(--card);color:var(--text);
  font-size:14px;font-weight:600;cursor:pointer;
}
.nav-btn:active{background:var(--soft)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn-mid{flex:0 0 56px;padding:14px 0;font-size:20px}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
@media (max-width:500px){
  header{padding:8px 10px}
  .htop{margin-bottom:6px}
  .status{padding:5px 10px}
  main{padding:10px 10px;gap:8px}
  .vn-word{font-size:38px;margin-bottom:14px;padding-bottom:12px}
  .jp-word{font-size:22px}
  .en-word{font-size:15px}
  .vn-ex{font-size:23px;margin-bottom:12px;padding-bottom:10px}
  .jp-ex{font-size:17px;margin-bottom:10px;padding-bottom:8px}
  .en-ex{font-size:13px}
  .face{padding:14px 14px}
  h1{font-size:14px}
  .nav-btn{padding:12px;font-size:14px}
  .nav-btn-mid{flex:0 0 48px;font-size:18px}
  .theme-btn{padding:5px 8px;font-size:11px}
  .ch{padding:4px 9px;font-size:10.5px}
}
@media (max-width:360px){
  .filters{gap:3px}
  .ch{padding:3px 8px;font-size:10px}
  .vn-word{font-size:32px}
  .jp-word{font-size:19px}
  .en-word{font-size:14px}
  .vn-ex{font-size:20px}
  .jp-ex{font-size:15px}
  .en-ex{font-size:12px}
}
@media (max-height:600px){
  .scene{min-height:180px}
  .vn-word{font-size:30px;margin-bottom:10px;padding-bottom:8px}
  .jp-word{font-size:19px;margin-bottom:6px}
  .vn-ex{font-size:20px;margin-bottom:8px;padding-bottom:6px}
  .jp-ex{font-size:15px;margin-bottom:6px;padding-bottom:5px}
  .face{padding:12px 14px}
}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>VN 3000 · 越南语闪卡</h1>
    <button class="theme-btn" id="themeBtn">🌙 Dark</button>
  </div>
  <div class="filters" id="filterBar">
    <button class="ch cat-btn" id="catBtn">📂 전체 · 1793</button>
    <span class="ch toggle" id="onlyBm">☆ 只看收藏</span>
    <span class="ch toggle rating" id="rateFilter">📊 전체</span>
    <span class="ch toggle order" id="orderToggle">📋 顺序</span>
    <span class="ch toggle audio" id="audioToggle">🔇 静音</span>
  </div>
  <div class="cat-modal" id="catModal" hidden>
    <div class="cat-modal-inner">
      <div class="cat-modal-head">
        <strong>카테고리 선택</strong>
        <button class="cat-modal-close" id="catModalClose" title="닫기">✕</button>
      </div>
      <input type="search" class="cat-search" id="catSearch" placeholder="검색..." autocomplete="off">
      <div class="cat-list" id="catList"></div>
    </div>
  </div>
</header>
<div class="status">
  <span id="progress">0 / 0</span>
  <span id="ratingCount">1:0 · 2:0 · 3:0</span>
  <button class="clear-btn" id="clearBtn">清除标记</button>
</div>
<main>
  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="card-top">
          <span class="badge" id="fCat">Core</span>
          <span class="num" id="fNum">#001</span>
        </div>
        <div class="body">
          <div class="vn-word" id="fVn"></div>
          <div class="jp-word" id="fJp"></div>
          <div class="en-word" id="fEn"></div>
        </div>
        <div class="card-bottom">
          <button class="icon-btn" data-type="bookmark" id="fBm">☆</button>
          <div class="rate-group" id="fRate">
            <button class="rate-btn level-1" data-rate="1" title="1 · 모름">1</button>
            <button class="rate-btn level-2" data-rate="2" title="2 · 인상">2</button>
            <button class="rate-btn level-3" data-rate="3" title="3 · 장악">3</button>
          </div>
        </div>
      </div>
      <div class="face back">
        <div class="card-top">
          <span class="badge" id="bCat">Core</span>
          <span class="tag-badge" id="bTag"></span>
          <span class="num" id="bNum">#001</span>
        </div>
        <div class="body">
          <div class="vn-ex" id="bVnEx"></div>
          <div class="jp-ex" id="bJpEx"></div>
          <div class="en-ex" id="bEnEx"></div>
        </div>
        <div class="card-bottom">
          <button class="icon-btn" data-type="bookmark" id="bBm">☆</button>
          <div class="rate-group" id="bRate">
            <button class="rate-btn level-1" data-rate="1" title="1 · 모름">1</button>
            <button class="rate-btn level-2" data-rate="2" title="2 · 인상">2</button>
            <button class="rate-btn level-3" data-rate="3" title="3 · 장악">3</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="flip-hint">点击卡片翻面 · Space 翻面 · ←/→ 切换 · 手机滑动</div>
  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn">← 上一张</button>
    <button class="nav-btn" id="nextBtn">下一张 →</button>
  </div>
  <div class="empty" id="emptyMsg" style="display:none">没有匹配的卡片。请调整筛选条件。</div>
</main>
<script>

const STATE_KEY = "vn3k_state";

let viVoice = null;
function loadVoices() {
  if (!("speechSynthesis" in window)) return;
  const voices = speechSynthesis.getVoices();
  const vi = voices.filter(v => /^vi[-_]|^vi$/i.test(v.lang) || /vietnam/i.test(v.name));
  // Prefer native/localService voice; else first vi voice
  viVoice = vi.find(v => v.localService) || vi[0] || null;
}
if ("speechSynthesis" in window) {
  loadVoices();
  speechSynthesis.addEventListener?.("voiceschanged", loadVoices);
}

function speak(text) {
  if (!("speechSynthesis" in window) || !text) return;
  speechSynthesis.cancel();
  const audioBtn = document.getElementById("audioToggle");
  audioBtn?.classList.add("playing");
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "vi-VN";
  if (viVoice) u.voice = viVoice;
  u.rate = 0.9;
  u.pitch = 1.0;
  const clear = () => audioBtn?.classList.remove("playing");
  u.onend = clear;
  u.onerror = clear;
  speechSynthesis.speak(u);
}

function autoPlayCurrent() {
  if (!S.audioOn || current.length === 0) return;
  const d = current[idx];
  const isBack = document.getElementById("card").classList.contains("flipped");
  speak(isBack ? d.vn_ex : d.vn);
}

function stopSpeak() {
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  document.getElementById("audioToggle")?.classList.remove("playing");
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY) || "{}");
    // Migrate legacy "mastered" array to ratings (mastered items → rating 3)
    let ratings = (s.ratings && typeof s.ratings === "object") ? s.ratings : {};
    if (Array.isArray(s.mastered)) {
      for (const no of s.mastered) if (!ratings[no]) ratings[no] = 3;
    }
    const validRatings = ["all", "1", "2", "3", "unrated"];
    return {
      version: 2,
      position: typeof s.position === "number" ? s.position : 1,
      category: s.category || "all",
      ratingFilter: validRatings.includes(s.ratingFilter) ? s.ratingFilter : "all",
      onlyBookmarked: !!s.onlyBookmarked,
      order: s.order === "random" ? "random" : "sequential",
      audioOn: !!s.audioOn,
      ratings: ratings,
      bookmarked: Array.isArray(s.bookmarked) ? s.bookmarked : [],
      theme: s.theme || null,
    };
  } catch(e) {
    return { version:2, position:1, category:"all", ratingFilter:"all", onlyBookmarked:false, order:"sequential", audioOn:false, ratings:{}, bookmarked:[], theme:null };
  }
}

function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      version: S.version,
      position: S.position,
      category: S.category,
      onlyBookmarked: S.onlyBookmarked,
      order: S.order,
      audioOn: S.audioOn,
      ratingFilter: S.ratingFilter,
      ratings: S.ratings,
      bookmarked: S.bookmarked,
      theme: S.theme,
    }));
  } catch(e) {}
}

const S = loadState();
// ratings: {no: 1|2|3}
const bookmarkedSet = new Set(S.bookmarked);

let current = [];
let idx = 0;

function applyFilter() {
  current = D.filter(d => {
    if (S.category !== "all" && d.cat !== S.category) return false;
    if (S.onlyBookmarked && !bookmarkedSet.has(d.no)) return false;
    if (S.ratingFilter !== "all") {
      const r = S.ratings[d.no] || 0;
      if (S.ratingFilter === "unrated") { if (r !== 0) return false; }
      else if (String(r) !== S.ratingFilter) return false;
    }
    return true;
  });
  if (S.order === "random") {
    for (let i = current.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [current[i], current[j]] = [current[j], current[i]];
    }
  }
}

function syncIdx() {
  const i = current.findIndex(d => d.no === S.position);
  idx = i >= 0 ? i : 0;
  if (current.length > 0) S.position = current[idx].no;
}

function render(resetFlip = true) {
  const scene = document.getElementById("scene");
  const navBar = document.querySelector(".nav-bar");
  const emptyMsg = document.getElementById("emptyMsg");
  const flipHint = document.querySelector(".flip-hint");

  if (current.length === 0) {
    scene.style.display = "none";
    navBar.style.display = "none";
    flipHint.style.display = "none";
    emptyMsg.style.display = "";
    document.getElementById("progress").textContent = "0 / 0";
    updateRatingCount();
    return;
  }

  scene.style.display = "";
  navBar.style.display = "";
  flipHint.style.display = "";
  emptyMsg.style.display = "none";

  syncIdx();
  const d = current[idx];
  const card = document.getElementById("card");
  if (resetFlip) card.classList.remove("flipped");

  document.getElementById("fCat").textContent = d.cat;
  document.getElementById("fCat").title = d.cat;
  document.getElementById("fNum").textContent = "#" + String(d.no).padStart(4, "0");
  document.getElementById("fVn").textContent = d.vn;
  document.getElementById("fJp").innerHTML = d.jp || "";
  document.getElementById("fEn").textContent = d.en || "";

  document.getElementById("bCat").textContent = d.cat;
  document.getElementById("bCat").title = d.cat;
  document.getElementById("bTag").textContent = d.tag ? ("#" + d.tag) : "";
  document.getElementById("bNum").textContent = "#" + String(d.no).padStart(4, "0");
  document.getElementById("bVnEx").textContent = d.vn_ex;
  document.getElementById("bJpEx").innerHTML = d.jp_ex;
  document.getElementById("bEnEx").textContent = d.en_ex;

  const isBm = bookmarkedSet.has(d.no);
  const rating = S.ratings[d.no] || 0;
  ["fBm", "bBm"].forEach(id => {
    const el = document.getElementById(id);
    el.classList.toggle("on", isBm);
    el.textContent = isBm ? "★" : "☆";
  });
  ["fRate", "bRate"].forEach(gid => {
    document.querySelectorAll(`#${gid} .rate-btn`).forEach(b => {
      b.classList.toggle("on", parseInt(b.dataset.rate) === rating);
    });
  });

  document.getElementById("progress").textContent = `${idx + 1} / ${current.length}`;
  updateRatingCount();

  document.getElementById("prevBtn").disabled = idx === 0;
  document.getElementById("nextBtn").disabled = idx === current.length - 1;
}

function updateRatingCount() {
  const c = {1: 0, 2: 0, 3: 0};
  for (const no in S.ratings) {
    const r = S.ratings[no];
    if (c[r] !== undefined) c[r]++;
  }
  document.getElementById("ratingCount").textContent = `1:${c[1]} · 2:${c[2]} · 3:${c[3]}`;
}

function setCategory(c) {
  S.category = c;
  applyFilter();
  if (current.length > 0) S.position = current[0].no;
  updateCatButton();
  render(true);
  saveState();
}

function updateCatButton() {
  const btn = document.getElementById("catBtn");
  const total = S.category === "all"
    ? D.length
    : D.filter(d => d.cat === S.category).length;
  const label = S.category === "all" ? "전체" : S.category;
  btn.textContent = `📂 ${label} · ${total}`;
  btn.title = label;
}

function buildCatList(filter = "") {
  const list = document.getElementById("catList");
  const q = filter.trim().toLowerCase();
  const counts = new Map();
  for (const d of D) counts.set(d.cat, (counts.get(d.cat) || 0) + 1);
  const cats = [...counts.entries()].sort((a, b) => b[1] - a[1]);
  const items = [["all", D.length], ...cats];
  const filtered = items.filter(([name]) =>
    !q || name === "all" || name.toLowerCase().includes(q)
  );
  list.innerHTML = filtered.map(([name, n]) => {
    const label = name === "all" ? "전체 (All)" : name;
    const active = name === S.category ? " active" : "";
    return `<div class="cat-item${active}" data-cat="${name.replace(/"/g,"&quot;")}">
      <span>${label}</span><span class="cat-item-count">${n}</span>
    </div>`;
  }).join("");
  list.querySelectorAll(".cat-item").forEach(el => {
    el.addEventListener("click", () => {
      setCategory(el.dataset.cat);
      closeCatModal();
    });
  });
}

function openCatModal() {
  buildCatList("");
  document.getElementById("catSearch").value = "";
  document.getElementById("catModal").hidden = false;
  setTimeout(() => document.getElementById("catSearch").focus(), 50);
}

function closeCatModal() {
  document.getElementById("catModal").hidden = true;
}

function toggleFlip() {
  document.getElementById("card").classList.toggle("flipped");
  stopSpeak();
  if (S.audioOn) setTimeout(autoPlayCurrent, 120);
}

function toggleAudio() {
  S.audioOn = !S.audioOn;
  updateAudioButton();
  saveState();
  if (S.audioOn) autoPlayCurrent();
  else stopSpeak();
}

function updateAudioButton() {
  const btn = document.getElementById("audioToggle");
  if (S.audioOn) { btn.textContent = "🔊 朗读"; btn.classList.add("on"); }
  else { btn.textContent = "🔇 静音"; btn.classList.remove("on"); }
}

function nav(delta) {
  if (current.length === 0) return;
  const ni = Math.max(0, Math.min(current.length - 1, idx + delta));
  if (ni === idx) return;
  idx = ni;
  S.position = current[idx].no;
  stopSpeak();
  render(true);
  saveState();
  if (S.audioOn) setTimeout(autoPlayCurrent, 120);
}

function toggleOrder() {
  S.order = S.order === "random" ? "sequential" : "random";
  updateOrderButton();
  applyFilter();
  if (current.length > 0) S.position = current[0].no;
  render(true);
  saveState();
}

function updateOrderButton() {
  const btn = document.getElementById("orderToggle");
  if (S.order === "random") {
    btn.textContent = "🔀 随机";
    btn.classList.add("on");
  } else {
    btn.textContent = "📋 顺序";
    btn.classList.remove("on");
  }
}

function toggleBookmark() {
  if (current.length === 0) return;
  const d = current[idx];
  if (bookmarkedSet.has(d.no)) bookmarkedSet.delete(d.no);
  else bookmarkedSet.add(d.no);
  S.bookmarked = [...bookmarkedSet];
  if (S.onlyBookmarked) applyFilter();
  saveState();
  render(false);
}

function setRating(rating) {
  if (current.length === 0) return;
  const d = current[idx];
  const cur = S.ratings[d.no] || 0;
  const next = cur === rating ? 0 : rating;
  if (next === 0) delete S.ratings[d.no];
  else S.ratings[d.no] = next;
  if (S.ratingFilter !== "all") applyFilter();
  saveState();
  render(false);
}

function toggleOnlyBm() {
  S.onlyBookmarked = !S.onlyBookmarked;
  document.getElementById("onlyBm").classList.toggle("on", S.onlyBookmarked);
  applyFilter();
  render(true);
  saveState();
}

const RATING_CYCLE = ["all", "1", "2", "3", "unrated"];
const RATING_LABELS = {
  "all": "📊 전체",
  "1": "📊 1 · 모름",
  "2": "📊 2 · 인상",
  "3": "📊 3 · 장악",
  "unrated": "📊 미평가",
};
function cycleRatingFilter() {
  const i = RATING_CYCLE.indexOf(S.ratingFilter);
  S.ratingFilter = RATING_CYCLE[(i + 1) % RATING_CYCLE.length];
  updateRatingFilterBtn();
  applyFilter();
  if (current.length > 0) S.position = current[0].no;
  render(true);
  saveState();
}

function updateRatingFilterBtn() {
  const btn = document.getElementById("rateFilter");
  btn.textContent = RATING_LABELS[S.ratingFilter];
  btn.classList.remove("level-1", "level-2", "level-3", "unrated");
  if (S.ratingFilter === "unrated") btn.classList.add("unrated");
  else if (S.ratingFilter !== "all") btn.classList.add("level-" + S.ratingFilter);
}

function setTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeBtn").textContent = t === "dark" ? "☀️ Light" : "🌙 Dark";
  S.theme = t;
  saveState();
}

function initTheme() {
  let t = S.theme;
  if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  setTheme(t);
}

document.getElementById("card").addEventListener("click", (e) => {
  if (e.target.closest(".icon-btn")) return;
  toggleFlip();
});

document.getElementById("catBtn").addEventListener("click", openCatModal);
document.getElementById("catModalClose").addEventListener("click", closeCatModal);
document.getElementById("catModal").addEventListener("click", (e) => {
  if (e.target.id === "catModal") closeCatModal();
});
document.getElementById("catSearch").addEventListener("input", (e) => {
  buildCatList(e.target.value);
});

document.getElementById("onlyBm").addEventListener("click", toggleOnlyBm);
document.getElementById("rateFilter").addEventListener("click", cycleRatingFilter);

document.getElementById("prevBtn").addEventListener("click", () => nav(-1));
document.getElementById("nextBtn").addEventListener("click", () => nav(1));
document.getElementById("orderToggle").addEventListener("click", toggleOrder);

["fBm", "bBm"].forEach(id => {
  document.getElementById(id).addEventListener("click", (e) => {
    e.stopPropagation();
    toggleBookmark();
  });
});
["fRate", "bRate"].forEach(gid => {
  document.querySelectorAll(`#${gid} .rate-btn`).forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      setRating(parseInt(btn.dataset.rate));
    });
  });
});
document.getElementById("audioToggle").addEventListener("click", toggleAudio);

document.getElementById("themeBtn").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
});

document.getElementById("clearBtn").addEventListener("click", () => {
  if (!confirm("모든 「즐겨찾기」와 「1/2/3 평가」를 초기화할까요? 되돌릴 수 없습니다.")) return;
  bookmarkedSet.clear();
  S.bookmarked = [];
  S.ratings = {};
  applyFilter();
  saveState();
  render(false);
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !document.getElementById("catModal").hidden) {
    e.preventDefault();
    closeCatModal();
    return;
  }
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === " " || e.key === "ArrowUp" || e.key === "ArrowDown") {
    e.preventDefault();
    toggleFlip();
  } else if (e.key === "ArrowLeft") {
    e.preventDefault();
    nav(-1);
  } else if (e.key === "ArrowRight") {
    e.preventDefault();
    nav(1);
  }
});

let touchStartX = 0, touchStartY = 0;
document.addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx > 0) nav(-1); else nav(1);
  }
}, { passive: true });

// Reset category if stored value is no longer valid
if (S.category !== "all" && !D.some(d => d.cat === S.category)) {
  S.category = "all";
}
document.getElementById("onlyBm").classList.toggle("on", S.onlyBookmarked);
updateRatingFilterBtn();
updateOrderButton();
updateAudioButton();
updateCatButton();
initTheme();
applyFilter();
render(true);
</script>
</body>
</html>
