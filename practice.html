mới anh yêu!", "vn_b": "A: Năm nay là năm chúng mình.\nB: Ước gì năm nào cũng có anh.", "jp": "", "jp_a": "A: カウントダウン、5、4、3、2、1!\nB: 明けましておめでとうございます、ダーリン！", "jp_b": "A: 今年は私たちの年です。\nB: 毎年あなたがいればよかったのに。", "en": "New year countdown", "en_a": "A: Countdown, 5, 4, 3, 2, 1!\nB: Happy New Year darling!", "en_b": "A: This year is our year.\nB: I wish I had you every year.", "tag": "특별한 순간"}, {"no": 897, "cat": "친구 대화", "vn": "chúc mừng sinh nhật", "vn_a": "B: Sinh nhật anh, em làm bánh cho.\nA: Em làm bánh à? Đẹp lắm!", "vn_b": "B: Anh thổi nến, ước gì đi.\nA: Anh ước được ở bên em mãi mãi.", "jp": "", "jp_a": "B: あなたの誕生日にケーキを作ります。\nA: ケーキを作りますか？とても美しい！", "jp_b": "B: ろうそくの火を吹き消して願い事をします。\nA: 私はあなたと永遠に一緒にいたいと思っています。", "en": "happy birthday", "en_a": "B: For your birthday, I'll make you a cake.\nA: Do you make cakes? So beautiful!", "en_b": "B: You blow out the candles and make a wish.\nA: I wish to be with you forever.", "tag": "특별한 순간"}, {"no": 898, "cat": "친구 대화", "vn": "kỉ niệm buổi hẹn hò đầu tiên", "vn_a": "A: Em nhớ buổi hẹn đầu tiên không?\nB: Nhớ, em mặc nhầm giày khác chân.", "vn_b": "A: Anh đã cười em suốt buổi.\nB: Vậy mà em vẫn đồng ý làm bạn gái anh.", "jp": "", "jp_a": "A: 初めてのデートを覚えていますか？\nB: 思い出してください、私は間違った足に靴を履いていました。", "jp_b": "A: 私はずっとあなたのことを笑っていた。\nB: それでもあなたは私のガールフレンドになることに同意してくれました。", "en": "first date anniversary", "en_a": "A: Do you remember your first date?\nB: Remember, I was wearing shoes on the wrong foot.", "en_b": "A: I laughed at you the whole time.\nB: Yet you still agreed to be my girlfriend.", "tag": "특별한 순간"}, {"no": 899, "cat": "친구 대화", "vn": "mối quan hệ đường dài", "vn_a": "B: Em nhớ anh quá, mình xa nhau lâu rồi.\nA: Còn 3 tháng nữa anh về thôi.", "vn_b": "B: Lâu quá! Mỗi ngày như cả năm.\nA: Anh hứa sẽ bù đắp cho em gấp đôi.", "jp": "", "jp_a": "B: とても寂しいです、私たちは長い間離れていました。\nA: 彼が戻ってくるまであと3か月しかない。", "jp_b": "B: さよなら！毎日が一年のように感じられます。\nA: 倍額の賠償をお約束します。", "en": "long distance relationship", "en_a": "B: I miss you so much, we've been apart for a long time.\nA: Only 3 more months until he returns.", "en_b": "B: So long! Every day feels like a year.\nA: I promise to compensate you double.", "tag": "특별한 순간"}, {"no": 900, "cat": "친구 대화", "vn": "tình yêu vĩnh cửu", "vn_a": "B: Anh có yêu em mãi không?\nA: Đến cuối đời anh cũng yêu em.", "vn_b": "B: Em cũng vậy, kiếp này và mai sau.\nA: Em là duy nhất của anh.", "jp": "", "jp_a": "B: 永遠に私を愛していますか？\nA: 人生の終わりまで、私はあなたを愛します。", "jp_b": "B: 私も、この世でも来世でも。\nA: あなたは私の唯一の人です。", "en": "eternal love", "en_a": "B: Do you love me forever?\nA: Until the end of my life I will love you.", "en_b": "B: Me too, in this life and the next.\nA: You are my only one.", "tag": "특별한 순간"}, {"no": 901, "cat": "친구 대화", "vn": "ngày mưa", "vn_a": "B: Trời mưa to quá, anh ơi.\nA: Em mang ô chưa?", "vn_b": "B: Em quên rồi, làm sao về đây.\nA: Đợi anh đến đón em.", "jp": "", "jp_a": "B: すごく雨が降っているよ、兄弟。\nA: 傘を持ってきましたか？", "jp_b": "B: 忘れてしまいました、どうやってここに行けますか？\nA: 私が迎えに来るのを待っていてください。", "en": "rainy day", "en_a": "B: It's raining so hard, bro.\nA: Have you brought an umbrella?", "en_b": "B: I forgot, how can I get here?\nA: Wait for me to come pick you up.", "tag": "일상생활"}, {"no": 902, "cat": "친구 대화", "vn": "điều hòa ngày nắng nóng", "vn_a": "B: Nóng quá, bật điều hòa lên đi anh.\nA: Để anh lấy quạt cho em luôn.", "vn_b": "B: Anh thật là chu đáo.\nA: Vì em là báu vật của anh.", "jp": "", "jp_a": "B: 暑すぎるのでエアコンをつけてください。\nA: あなたにもファンを作ってあげましょう。", "jp_b": "B: あなたはとても思慮深いですね。\nA: だってあなたは私の宝物だから。", "en": "Air conditioning on hot days", "en_a": "B: It's too hot, turn on the air conditioner.\nA: Let me get you a fan too.", "en_b": "B: You are so thoughtful.\nA: Because you are my treasure.", "tag": "일상생활"}, {"no": 903, "cat": "친구 대화", "vn": "ngày lạnh", "vn_a": "A: Lạnh quá, em mặc thêm áo khoác đi.\nB: Em không có áo dày.", "vn_b": "A: Lấy áo của anh mà mặc.\nB: Cảm ơn anh, áo anh ấm thật.", "jp": "", "jp_a": "A: 寒いのでコートを着てください。\nB: 私は厚いシャツを持っていません。", "jp_b": "A: 私のシャツを持って行って着てください。\nB: ありがとう、あなたのシャツは本当に暖かいです。", "en": "cold day", "en_a": "A: It's cold, please wear a coat.\nB: I don't have a thick shirt.", "en_b": "A: Take my shirt and wear it.\nB: Thank you, your shirt is really warm.", "tag": "일상생활"}, {"no": 904, "cat": "친구 대화", "vn": "Khi bạn bị lạc", "vn_a": "B: Anh ơi, em lạc đường rồi.\nA: Em đang ở đâu, gửi định vị cho anh.", "vn_b": "B: Em đang ở gần một quán cà phê tên là Cộng.\nA: Đứng yên đó, anh tới ngay.", "jp": "", "jp_a": "B: ハニー、迷ってしまった。\nA: どこにいるの？あなたの位置情報を送ってください。", "jp_b": "B: 私はCongというコーヒーショップの近くにいます。\nA: じっとしてて、すぐそこにいるよ。", "en": "When you get lost", "en_a": "B: Honey, I'm lost.\nA: Where are you? Send me your location.", "en_b": "B: I'm near a coffee shop called Cong.\nA: Stay still, I'll be right there.", "tag": "일상생활"}, {"no": 905, "cat": "친구 대화", "vn": "Mất Internet", "vn_a": "B: Mạng nhà mình bị đứt rồi.\nA: Em thử khởi động lại modem chưa?", "vn_b": "B: Rồi mà vẫn không được.\nA: Để anh gọi nhà mạng.", "jp": "", "jp_a": "B: ホームネットワークが壊れてしまいました。\nA: モデムを再起動してみましたか?", "jp_b": "B: その後、まだ機能しません。\nA: 運送業者に電話してみます。", "en": "Lost Internet", "en_a": "B: My home network is broken.\nA: Have you tried restarting the modem?", "en_b": "B: Then it still doesn't work.\nA: Let me call the carrier.", "tag": "일상생활"}, {"no": 906, "cat": "친구 대화", "vn": "khủng hoảng đi trễ", "vn_a": "B: Chết rồi, em sắp trễ giờ làm!\nA: Để anh chở em đi cho nhanh.", "vn_b": "B: Cảm ơn anh, anh là cứu tinh.\nA: Lần sau dậy sớm hơn nhé.", "jp": "", "jp_a": "B: くそー、仕事に遅れそう！\nA: 早速連れて行きましょう。", "jp_b": "B: ありがとう、あなたは救世主です。\nA: 次回はもっと早く起きてください。", "en": "Lateness crisis", "en_a": "B: Damn, I'm going to be late for work!\nA: Let me take you quickly.", "en_b": "B: Thank you, you are a savior.\nA: Next time, wake up earlier.", "tag": "일상생활"}, {"no": 907, "cat": "친구 대화", "vn": "mất chìa khóa xe", "vn_a": "A: Em có thấy chìa khóa xe đâu không?\nB: Anh để trên bàn ăn hôm qua mà.", "vn_b": "A: Anh tìm hết rồi, không thấy.\nB: Để em phụ tìm cùng anh.", "jp": "", "jp_a": "A: どこかに車のキーが見えますか？\nB: 昨日ダイニングテーブルの上に放置してしまいました。", "jp_b": "A: あちこち探しましたが、見つかりません。\nB: それを見つけるのを手伝ってあげましょう。", "en": "lost car keys", "en_a": "A: Do you see the car keys anywhere?\nB: I left it on the dining table yesterday.", "en_b": "A: I've looked all over, can't find it.\nB: Let me help you find it.", "tag": "일상생활"}, {"no": 908, "cat": "친구 대화", "vn": "lệnh giao hàng", "vn_a": "B: Tối nay mình đặt đồ ăn nhé, em lười nấu.\nA: Đặt gì em?", "vn_b": "B: Bún bò Huế đi, lâu rồi không ăn.\nA: Ok, để anh đặt qua app.", "jp": "", "jp_a": "B: 今夜は食べ物を注文しましょう、料理するのが面倒なので。\nA: 何を注文すればいいですか？", "jp_b": "B: フエの牛肉麺のスープ、久しぶりに食べました。\nA: わかりました、アプリから注文しましょう。", "en": "delivery order", "en_a": "B: Let's order food tonight, I'm lazy to cook.\nA: What should I order?", "en_b": "B: Hue beef noodle soup, haven't eaten in a long time.\nA: Ok, let me order through the app.", "tag": "일상생활"}, {"no": 909, "cat": "친구 대화", "vn": "chào hàng xóm", "vn_a": "A: Cô bên cạnh chào em này.\nB: Cháu chào cô, cô khỏe không ạ?", "vn_b": "A: Cô ấy hay hỏi thăm tụi mình.\nB: Mai mình mua trái cây biếu cô.", "jp": "", "jp_a": "A: 私の隣の女の子が挨拶します。\nB: こんにちは お元気ですか？", "jp_b": "A: 彼女はよく私たちのことを尋ねます。\nB: 明日私は彼女に果物を買います。", "en": "hello neighbor", "en_a": "A: The girl next to me says hello.\nB: Hello, how are you?", "en_b": "A: She often asks about us.\nB: Tomorrow I will buy fruit for her.", "tag": "일상생활"}, {"no": 910, "cat": "친구 대화", "vn": "Nhận hàng", "vn_a": "B: Có shipper bấm chuông kìa anh.\nA: Em ra nhận giúp anh nhé.", "vn_b": "B: Hộp này nặng quá!\nA: Của em mua đó, đoán là giày.", "jp": "", "jp_a": "B: 荷主がベルを鳴らしています。\nA: 取りに来てお手伝いします。", "jp_b": "B: この箱はとても重いです！\nA: それは私が買ったものです、おそらく靴です。", "en": "Receive", "en_a": "B: There's a shipper ringing the bell.\nA: I'll come get it and help you.", "en_b": "B: This box is so heavy!\nA: That's what I bought, I guess it's shoes.", "tag": "일상생활"}, {"no": 911, "cat": "친구 대화", "vn": "dắt chó đi dạo", "vn_a": "B: Mình dắt Mít đi dạo nhé.\nA: Em cầm dây, anh cầm túi nha.", "vn_b": "B: Mít vui quá kìa, vẫy đuôi liên tục.\nA: Nó cũng yêu mình lắm.", "jp": "", "jp_a": "B: ミットを散歩に連れて行きましょう。\nA: あなたはロープを持ち、私はバッグを持ちます。", "jp_b": "B: ジャックフルーツはとても幸せで、しっぽをずっと振っています。\nA: 彼も私をとても愛しています。", "en": "walk the dog", "en_a": "B: Let's take Mit for a walk.\nA: You hold the rope, I hold the bag.", "en_b": "B: Jackfruit is so happy, his tail is constantly wagging.\nA: He also loves me very much.", "tag": "일상생활"}, {"no": 912, "cat": "친구 대화", "vn": "chăm sóc mèo", "vn_a": "A: Mèo Mun đói rồi đó em.\nB: Em vừa cho ăn lúc nãy mà.", "vn_b": "A: Vậy chắc nó nũng nịu thôi.\nB: Y như anh vậy.", "jp": "", "jp_a": "A: ムン猫はお腹が空いています。\nB: 先ほど餌をあげたばかりです。", "jp_b": "A: だからそれはおそらくただ甘やかしているだけです。\nB: あなたと同じように。", "en": "take care of cats", "en_a": "A: The Mun cat is hungry.\nB: I just fed it a while ago.", "en_b": "A: So it's probably just coddling.\nB: Just like you.", "tag": "일상생활"}, {"no": 913, "cat": "친구 대화", "vn": "Khi tủ lạnh trống rỗng", "vn_a": "B: Tủ lạnh trống không, không có gì ăn.\nA: Mình ra siêu thị mua liền nhé.", "vn_b": "B: Em làm danh sách trước đã.\nA: Em chuyên nghiệp ghê.", "jp": "", "jp_a": "B: 冷蔵庫は空で、食べるものは何もありません。\nA: すぐにスーパーに行って買ってきます。", "jp_b": "B: まずはリストを作りました。\nA: 私はとてもプロフェッショナルです。", "en": "When the refrigerator is empty", "en_a": "B: The refrigerator is empty, there's nothing to eat.\nA: I'll go to the supermarket and buy it right away.", "en_b": "B: I made a list first.\nA: I'm very professional.", "tag": "일상생활"}, {"no": 914, "cat": "친구 대화", "vn": "pin điện thoại di động", "vn_a": "B: Điện thoại em sắp hết pin rồi.\nA: Lấy cục sạc của anh dùng tạm đi.", "vn_b": "B: Anh luôn chuẩn bị sẵn cho em.\nA: Vì anh biết em hay quên.", "jp": "", "jp_a": "B: 携帯電話のバッテリーが切れそうになっています。\nA: 充電器を取り出して一時的に使用してください。", "jp_b": "B: 私はいつでもあなたのために準備をしています。\nA: あなたがよく忘れることを知っているからです。", "en": "mobile phone battery", "en_a": "B: My phone is about to run out of battery.\nA: Take your charger and use it temporarily.", "en_b": "B: I'm always prepared for you.\nA: Because I know you often forget.", "tag": "일상생활"}, {"no": 915, "cat": "친구 대화", "vn": "thức ăn đường phố", "vn_a": "A: Mình mua bánh mì ăn đi.\nB: Em muốn thêm pate và đồ chua.", "vn_b": "A: Cô ơi, cho hai ổ đầy đủ.\nB: Ngon quá, đáng tiền lắm.", "jp": "", "jp_a": "A: パンを買って食べましょう。\nB: パテとピクルスをもっと食べたいです。", "jp_b": "A: お嬢さん、いっぱいのパンを 2 つください。\nB: とても美味しいので、お金を払う価値があります。", "en": "street food", "en_a": "A: Let's buy bread to eat.\nB: I want more pate and pickles.", "en_b": "A: Miss, give me two full loaves.\nB: So delicious, worth the money.", "tag": "일상생활"}, {"no": 916, "cat": "친구 대화", "vn": "mua giày", "vn_a": "B: Đôi giày này anh thấy sao?\nA: Em mang thử đi, anh nhìn hợp không.", "vn_b": "B: Hơi chật, nhưng đẹp.\nA: Lấy size lớn hơn đi, đừng ép chân.", "jp": "", "jp_a": "B: この靴についてどう思いますか?\nA: 試着して、自分に合うかどうかを確認してください。", "jp_b": "B: 少しタイトですが、美しいです。\nA: 大きめのサイズを購入し、足を締め付けないでください。", "en": "buy shoes", "en_a": "B: What do you think of these shoes?\nA: Try it on, see if it suits you.", "en_b": "B: A bit tight, but beautiful.\nA: Get a larger size, don't squeeze your feet.", "tag": "일상생활"}, {"no": 917, "cat": "친구 대화", "vn": "bôi dầu", "vn_a": "B: Xăng sắp hết rồi anh.\nA: Để anh ghé cây xăng đầu phố.", "vn_b": "B: Đổ đầy bình luôn nhé.\nA: Ok, hôm nay anh mời.", "jp": "", "jp_a": "B: もうすぐガス欠になります。\nA: 通りの向かいにあるガソリンスタンドに立ち寄らせてください。", "jp_b": "B: 必ずタンクを満タンにしてください。\nA: さて、今日はあなたを招待します。", "en": "oil", "en_a": "B: You're about to run out of gas.\nA: Let me stop by the gas station across the street.", "en_b": "B: Always fill the tank.\nA: Ok, today I invite you.", "tag": "일상생활"}, {"no": 918, "cat": "친구 대화", "vn": "gửi ảnh", "vn_a": "B: Em vừa gửi ảnh selfie cho anh kìa.\nA: Đẹp ghê, để anh làm hình nền luôn.", "vn_b": "B: Anh cũng gửi cho em một tấm đi.\nA: Anh chụp xấu lắm, sợ em chê.", "jp": "", "jp_a": "B: たった今セルフィーを送りました。\nA: とても美しいので壁紙にさせてください。", "jp_b": "B: 私にも送ってください。\nA: 私の写真はとても下手なので、批判されるのではないかと思います。", "en": "send photos", "en_a": "B: I just sent you a selfie.\nA: So beautiful, let me make it your wallpaper.", "en_b": "B: Please send me one too.\nA: My photos are so bad, I'm afraid you'll criticize me.", "tag": "애정 표현"}, {"no": 919, "cat": "친구 대화", "vn": "cuộc gọi video", "vn_a": "B: Anh gọi video cho em đi, em nhớ mặt anh.\nA: Đợi anh chút, anh đang ngoài quán.", "vn_b": "B: Vậy về phòng rồi gọi nhé.\nA: Ok, năm phút nữa anh gọi.", "jp": "", "jp_a": "B: ビデオ電話してください、あなたの顔が恋しいです。\nA: ちょっと待ってください、私は店の外にいます。", "jp_b": "B: それで部屋に戻って電話してください。\nA: わかりました、5分以内に電話します。", "en": "video call", "en_a": "B: Please video call me, I miss your face.\nA: Wait a minute, I'm outside the shop.", "en_b": "B: So go back to your room and call.\nA: Ok, I'll call in five minutes.", "tag": "애정 표현"}, {"no": 920, "cat": "친구 대화", "vn": "gọi điện trước khi đi ngủ", "vn_a": "B: Em buồn ngủ rồi, anh kể chuyện đi.\nA: Ngày xửa ngày xưa, có một cô gái xinh đẹp.", "vn_b": "B: Là em đúng không?\nA: Ai nữa ngoài em.", "jp": "", "jp_a": "B: 眠いので話を聞かせてください。\nA: 昔々、美しい女の子がいました。", "jp_b": "B: あなたですか？\nA: 私以外に誰がいますか？", "en": "Call before going to bed", "en_a": "B: I'm sleepy, tell me the story.\nA: Once upon a time, there was a beautiful girl.", "en_b": "B: Is it you?\nA: Who else but me?", "tag": "애정 표현"}, {"no": 921, "cat": "친구 대화", "vn": "tin nhắn ngọt ngào", "vn_a": "B: Anh đang nghĩ gì vậy?\nA: Anh đang nghĩ tại sao mình may mắn vậy.", "vn_b": "B: Tại sao vậy?\nA: Vì có em yêu anh.", "jp": "", "jp_a": "B: 何を考えているのですか？\nA: なぜ私はこんなに幸運なのか考えています。", "jp_b": "B: なぜそうなるのでしょうか？\nA: なぜなら私はあなたを愛しているから。", "en": "sweet message", "en_a": "B: What are you thinking?\nA: I'm thinking why I'm so lucky.", "en_b": "B: Why so?\nA: Because I love you.", "tag": "애정 표현"}, {"no": 922, "cat": "친구 대화", "vn": "lá thư viết tay", "vn_a": "B: Anh viết thư tay cho em à?\nA: Ừ, anh muốn em đọc lại lúc buồn.", "vn_b": "B: Em sẽ giữ mãi.\nA: Chữ anh xấu, cười nha.", "jp": "", "jp_a": "B: あなたは私に手書きの手紙を書きましたか？\nA: そう、悲しいときにもう一度読んでほしい。", "jp_b": "B: 永久に保管します。\nA: 字が汚いです、笑。", "en": "handwritten letter", "en_a": "B: Did you write me a handwritten letter?\nA: Yes, I want you to read it again when you're sad.", "en_b": "B: I will keep it forever.\nA: Your handwriting is bad, laugh.", "tag": "애정 표현"}, {"no": 923, "cat": "친구 대화", "vn": "chia sẻ bí mật", "vn_a": "B: Em kể anh một bí mật được không?\nA: Tất nhiên rồi, em nói đi.", "vn_b": "B: Em đã thích anh từ trước khi anh tỏ tình.\nA: Vậy à, anh cũng thế.", "jp": "", "jp_a": "B: 秘密を教えてもらえますか？\nA: もちろん、あなたはそれを言います。", "jp_b": "B: 告白される前からずっと好きでした。\nA: それで、あなたもです。", "en": "share secrets", "en_a": "B: Can I tell you a secret?\nA: Of course, you say it.", "en_b": "B: I've liked you since before you confessed.\nA: So, you too.", "tag": "애정 표현"}, {"no": 924, "cat": "친구 대화", "vn": "dựa vào vai", "vn_a": "B: Cho em tựa vào vai anh chút.\nA: Vai anh là của em mà.", "vn_b": "B: Em mệt lắm, có anh dễ chịu thật.\nA: Em cứ ngủ đi, anh thức cho.", "jp": "", "jp_a": "B: ちょっと肩にもたれさせてください。\nA: あなたの役割は私のものです。", "jp_b": "B: とても疲れているのに、あなたがいるととても安心します。\nA: あなたはただ寝てください、私は起きていてください。", "en": "lean on your shoulder", "en_a": "B: Let me lean on your shoulder for a bit.\nA: Your role is mine.", "en_b": "B: I'm so tired, having you is so comforting.\nA: You just go to sleep, I'll stay awake.", "tag": "애정 표현"}, {"no": 925, "cat": "친구 대화", "vn": "vuốt ve đầu", "vn_a": "A: Lại đây anh xoa đầu cho.\nB: Anh xoa nhẹ thôi nha, đau đầu lắm.", "vn_b": "A: Tại sao đau đầu vậy em?\nB: Hôm nay em làm việc nhiều quá.", "jp": "", "jp_a": "A: こっちに来て、頭を撫でてあげましょう。\nB: 軽くこするだけで、頭が痛くなります。", "jp_b": "A: 頭が痛いのはなぜですか?\nB: 今日は働きすぎました。", "en": "caress the head", "en_a": "A: Come here, let me pat your head.\nB: Just rub it gently, it's a headache.", "en_b": "A: Why do I have a headache?\nB: I worked too much today.", "tag": "애정 표현"}, {"no": 926, "cat": "친구 대화", "vn": "chuyến thăm bất ngờ", "vn_a": "B: Trời ơi, sao anh lại ở đây?\nA: Anh nhớ em quá nên chạy qua.", "vn_b": "B: Anh điên rồi, mưa to thế kia.\nA: Vì em xứng đáng được như vậy.", "jp": "", "jp_a": "B: ああ、神様、なぜここにいるのですか？\nA: とても寂しかったので駆け寄ってしまいました。", "jp_b": "B: おかしいよ、雨がすごく降っているんだ。\nA: あなたはそれに値するからです。", "en": "surprise visit", "en_a": "B: Oh god, why are you here?\nA: I missed you so much that I ran over.", "en_b": "B: You're crazy, it's raining so hard.\nA: Because you deserve it.", "tag": "애정 표현"}, {"no": 927, "cat": "친구 대화", "vn": "Anh yêu em 100 lần", "vn_a": "A: Anh yêu em.\nB: Em biết rồi, anh nói cả trăm lần.", "vn_b": "A: Một trăm lẻ một lần thì sao?\nB: Em cũng yêu anh, cả triệu lần.", "jp": "", "jp_a": "A: 愛してます。\nB: わかっています、あなたは何百回も言いました。", "jp_b": "A: 111回はどうでしょうか？\nB: 私もあなたを何百万回も愛しています。", "en": "I love you 100 times", "en_a": "A: I love you.\nB: I know, you said it a hundred times.", "en_b": "A: How about one hundred and one times?\nB: I love you too, a million times over.", "tag": "애정 표현"}, {"no": 928, "cat": "친구 대화", "vn": "ôm", "vn_a": "B: Hôm nay em không muốn rời anh.\nA: Vậy mình ôm nhau cả ngày luôn.", "vn_b": "B: Vậy anh không đi đâu hết nha.\nA: Anh chỉ ở đây thôi, với em.", "jp": "", "jp_a": "B: 今日は君と離れたくない。\nA: それで私たちは一日中抱き合っていました。", "jp_b": "B: だからあなたはどこにも行かないのです。\nA: 私はただここにいます、あなたと一緒に。", "en": "hug", "en_a": "B: I don't want to leave you today.\nA: So we hug each other all day.", "en_b": "B: So you're not going anywhere.\nA: I'm just here, with you.", "tag": "애정 표현"}, {"no": 929, "cat": "친구 대화", "vn": "cảm giác như số phận", "vn_a": "B: Em cảm giác mình sinh ra để dành cho nhau.\nA: Anh cũng nghĩ vậy ngay từ đầu.", "vn_b": "B: May mà anh nói chuyện với em hôm đó.\nA: Đó là quyết định đúng nhất đời anh.", "jp": "", "jp_a": "B: 私たちはお互いのために生まれてきたような気がします。\nA: 私も最初からそう思っていました。", "jp_b": "B: 幸運なことに、その日あなたは私に話しかけてくれました。\nA: それは彼の人生で最良の決断でした。", "en": "feels like fate", "en_a": "B: I feel like we were born for each other.\nA: I also thought so from the beginning.", "en_b": "B: Luckily you talked to me that day.\nA: It was the best decision of his life.", "tag": "애정 표현"}, {"no": 930, "cat": "친구 대화", "vn": "gian lận khớp nối", "vn_a": "B: Mình mua nhẫn đôi đi anh.\nA: Em chọn kiểu nào hợp với mình?", "vn_b": "B: Cái đơn giản này được không?\nA: Đẹp mà không lòe loẹt, anh thích.", "jp": "", "jp_a": "B: カップルリングを買いましょう。\nA: 自分に合ったスタイルはどれを選べばいいのでしょうか？", "jp_b": "B: これは簡単ですか？\nA: 綺麗だけど派手じゃなくて気に入ってます。", "en": "coupling fraud", "en_a": "B: Let's buy a couple ring.\nA: Which style should I choose that suits me?", "en_b": "B: Is this simple?\nA: Beautiful but not flashy, I like it.", "tag": "데이트"}, {"no": 931, "cat": "친구 대화", "vn": "sở thú", "vn_a": "B: Anh nhìn con khỉ kia kìa, dễ thương ghê.\nA: Nó nhìn em rồi này, chắc nó thích em.", "vn_b": "B: Đừng giỡn nha, em sợ.\nA: Có anh đây, đừng sợ.", "jp": "", "jp_a": "B: あの猿を見てください、とてもかわいいです。\nA: 彼はあなたを見て、おそらくあなたのことが好きです。", "jp_b": "B: 冗談は言わないでください、怖いんです。\nA: 私はここにいるよ、怖がらないで。", "en": "zoo", "en_a": "B: Look at that monkey, it's so cute.\nA: He looked at you, he probably likes you.", "en_b": "B: Don't joke, I'm scared.\nA: I'm here, don't be afraid.", "tag": "데이트"}, {"no": 932, "cat": "친구 대화", "vn": "bể cá", "vn_a": "A: Cá heo đẹp quá em ơi.\nB: Em mơ được bơi cùng cá heo một lần.", "vn_b": "A: Vậy mình đi Nha Trang nhé.\nB: Anh hứa rồi đó!", "jp": "", "jp_a": "A: イルカはとても美しいです、愛する人。\nB: 一度はイルカと一緒に泳いでみたいと夢見ています。", "jp_b": "A: ということで、ニャチャンへ行きましょう。\nB: 約束したよ！", "en": "fish tank", "en_a": "A: Dolphins are so beautiful, my dear.\nB: I dream of swimming with dolphins once.", "en_b": "A: So let's go to Nha Trang.\nB: I promised!", "tag": "데이트"}, {"no": 933, "cat": "친구 대화", "vn": "Bảo tàng nghệ thuật Ngày", "vn_a": "B: Bức tranh này đẹp quá.\nA: Em hiểu nghệ thuật hơn anh.", "vn_b": "B: Anh chỉ cần ngắm em là được.\nA: Em mới là tác phẩm đẹp nhất.", "jp": "", "jp_a": "B: この写真はとても美しいです。\nA: 私はあなたより芸術をよく理解しています。", "jp_b": "B: ただ私を見ていればいいのです。\nA: あなたは最も美しい作品です。", "en": "Day Art Museum", "en_a": "B: This picture is so beautiful.\nA: I understand art better than you.", "en_b": "B: You just need to look at me.\nA: You are the most beautiful work.", "tag": "데이트"}, {"no": 934, "cat": "친구 대화", "vn": "buổi hòa nhạc", "vn_a": "B: Concert bắt đầu rồi, hồi hộp quá.\nA: Em là fan cứng của ca sĩ này mà.", "vn_b": "B: Cảm ơn anh đã mua vé tặng em.\nA: Em vui là anh đủ rồi.", "jp": "", "jp_a": "B: コンサートが始まりました、とても楽しみです。\nA: 私はこの歌手の熱心なファンです。", "jp_b": "B: チケットを買ってくれてありがとう。\nA: 十分だと思います。", "en": "concert", "en_a": "B: The concert has started, I'm so excited.\nA: I am a die-hard fan of this singer.", "en_b": "B: Thank you for buying me a ticket.\nA: I'm glad you're enough.", "tag": "데이트"}, {"no": 935, "cat": "친구 대화", "vn": "cắm trại", "vn_a": "A: Mình cắm trại bên hồ nhé.\nB: Em chưa cắm trại bao giờ.", "vn_b": "A: Anh dạy em dựng lều.\nB: Anh thật là người đàn ông đa năng.", "jp": "", "jp_a": "A: 湖のほとりでキャンプしましょう。\nB: 私はこれまでキャンプをしたことがありません。", "jp_b": "A: テントの張り方を教えてもらいました。\nB: 彼は本当に多才な人だ。", "en": "camp", "en_a": "A: Let's camp by the lake.\nB: I have never camped before.", "en_b": "A: He taught me how to set up a tent.\nB: He is truly a versatile man.", "tag": "데이트"}, {"no": 936, "cat": "친구 대화", "vn": "ngày đi xe đạp", "vn_a": "B: Đạp xe quanh hồ đi anh.\nA: Em đạp được không, có mệt không?", "vn_b": "B: Em đạp giỏi mà, anh đừng coi thường.\nA: Vậy mình đua nhé, ai thắng được hôn.", "jp": "", "jp_a": "B: 湖の周りを自転車で一周しましょう。\nA: ペダルをこぐことができますか？疲れましたか？", "jp_b": "B: 私は乗り心地が良いので、過小評価しないでください。\nA: さあ、レースをしましょう。勝った人にはキスが与えられます。", "en": "cycling day", "en_a": "B: Let's cycle around the lake.\nA: Can you pedal? Are you tired?", "en_b": "B: I ride well, don't underestimate me.\nA: So let's race, whoever wins gets a kiss.", "tag": "데이트"}, {"no": 937, "cat": "친구 대화", "vn": "đi thuyền", "vn_a": "B: Đi thuyền lãng mạn ghê.\nA: Anh chỉ biết chèo thôi, không lái được.", "vn_b": "B: Vậy anh chèo, em ngắm cảnh.\nA: Em là nữ hoàng, anh là thuyền trưởng.", "jp": "", "jp_a": "B: ボートに乗るのはとてもロマンチックです。\nA: 漕ぐことしかできず、操縦はできません。", "jp_b": "B: それで漕いで、景色を眺めます。\nA: あなたは女王、私はキャプテンです。", "en": "take a boat", "en_a": "B: The boat ride is so romantic.\nA: I can only row, I can't steer.", "en_b": "B: So you row, I admire the scenery.\nA: You're the queen, I'm the captain.", "tag": "데이트"}, {"no": 938, "cat": "친구 대화", "vn": "ngắm sao", "vn_a": "B: Sao trên trời đẹp quá.\nA: Em là ngôi sao sáng nhất của anh.", "vn_b": "B: Lần nào anh cũng có câu nói ngọt.\nA: Vì em xứng đáng nghe điều đó.", "jp": "", "jp_a": "B: 空の星はとても美しいです。\nA: あなたは私の最も輝く星です。", "jp_b": "B: 彼はいつも何か甘いことを言います。\nA: あなたにはそれを聞く資格があるからです。", "en": "Stargazing", "en_a": "B: The stars in the sky are so beautiful.\nA: You are my brightest star.", "en_b": "B: Every time he has something sweet to say.\nA: Because you deserve to hear that.", "tag": "데이트"}, {"no": 939, "cat": "친구 대화", "vn": "cảnh mặt trời mọc", "vn_a": "B: Mình thức dậy ngắm bình minh nhé.\nA: Phải dậy sớm 4 giờ đấy.", "vn_b": "B: Có anh em không sợ thức khuya dậy sớm.\nA: Vậy anh ôm em ngủ trước.", "jp": "", "jp_a": "B: 日の出を見るために起きましょう。\nA: 4時に早く起きなければなりません。", "jp_b": "B: 夜更かしや早起きを恐れない兄弟もいます。\nA: だから私はあなたを最初に抱きしめて寝ます。", "en": "sunrise scene", "en_a": "B: Let's wake up to watch the sunrise.\nA: Have to get up 4 o'clock early.", "en_b": "B: Some brothers are not afraid of staying up late and waking up early.\nA: So I hug you to sleep first.", "tag": "데이트"}, {"no": 940, "cat": "친구 대화", "vn": "đua xe kart", "vn_a": "B: Em chưa lái go-kart bao giờ, hồi hộp.\nA: Đừng lo, anh chạy trước em theo sau.", "vn_b": "B: Em mà thắng anh thì sao?\nA: Anh sẽ mua kem cho em.", "jp": "", "jp_a": "B: ゴーカートを運転したことがないので緊張しています。\nA: 心配しないでください、私が先に走ります、そしてあなたはその後に続きます。", "jp_b": "B: もし私があなたに勝ったらどうなりますか？\nA: アイスクリームを買ってあげます。", "en": "kart racing", "en_a": "B: I've never driven a go-kart before, so I'm nervous.\nA: Don't worry, I'll run first and you'll follow.", "en_b": "B: What if I win against you?\nA: I will buy you ice cream.", "tag": "데이트"}, {"no": 941, "cat": "친구 대화", "vn": "bowling", "vn_a": "B: Em không biết chơi bowling đâu.\nA: Để anh chỉ em cách cầm bóng.", "vn_b": "B: Strike rồi! Anh thấy chưa!\nA: Em là tài năng ẩn giấu mà anh chưa biết.", "jp": "", "jp_a": "B: 私はボウリングの遊び方がわかりません。\nA: ボールの持ち方を教えてください。", "jp_b": "B: ストライク！見たことがありますか？\nA: あなたは私がまだ知らない隠れた才能です。", "en": "bowling", "en_a": "B: I don't know how to play bowling.\nA: Let me show you how to hold the ball.", "en_b": "B: Strike! Have you seen it?\nA: You are the hidden talent that I don't know yet.", "tag": "데이트"}, {"no": 942, "cat": "친구 대화", "vn": "bạn bè đến trước", "vn_a": "B: Lúc nào anh cũng ưu tiên bạn bè.\nA: Anh chỉ đi nhậu thỉnh thoảng thôi.", "vn_b": "B: Thỉnh thoảng gì, tuần nào cũng có.\nA: Anh xin lỗi, từ giờ ưu tiên em hơn.", "jp": "", "jp_a": "B: 彼はいつも友達を優先します。\nA: たまにしか飲みに行きません。", "jp_b": "B: 時々、毎週。\nA: 申し訳ありませんが、これからはあなたを優先させていただきます。", "en": "Friends come first", "en_a": "B: He always prioritizes his friends.\nA: I only go out drinking occasionally.", "en_b": "B: Every once in a while, every week.\nA: I'm sorry, from now on I give you priority.", "tag": "갈등/화해"}, {"no": 943, "cat": "친구 대화", "vn": "được so sánh", "vn_a": "B: Sao anh hay so sánh em với người yêu cũ?\nA: Anh không có ý đó đâu.", "vn_b": "B: Lời anh nói làm em tổn thương.\nA: Anh xin lỗi thật lòng.", "jp": "", "jp_a": "B: なぜあなたは私をあなたの元とよく比較するのですか？\nA: そういう意味ではありません。", "jp_b": "B: あなたが言ったことは私を傷つけました。\nA: 心よりお詫び申し上げます。", "en": "is compared", "en_a": "B: Why do you often compare me to your ex?\nA: I don't mean that.", "en_b": "B: What you said hurt me.\nA: I sincerely apologize.", "tag": "갈등/화해"}, {"no": 944, "cat": "친구 대화", "vn": "Bắt nói dối", "vn_a": "B: Anh đã nói dối em à?\nA: Anh không muốn em lo, nên nói vậy.", "vn_b": "B: Dù lý do gì, nói dối là không được.\nA: Anh hứa, từ nay luôn nói thật.", "jp": "", "jp_a": "B: 私に嘘をつきましたか？\nA: 心配させたくないからそう言いました。", "jp_b": "B: 理由が何であれ、嘘はよくありません。\nA: これからは常に真実を話すことを約束します。", "en": "Caught lying", "en_a": "B: Did you lie to me?\nA: I don't want you to worry, so I said so.", "en_b": "B: Whatever the reason, lying is not okay.\nA: I promise, from now on I will always tell the truth.", "tag": "갈등/화해"}, {"no": 945, "cat": "친구 대화", "vn": "thất hứa", "vn_a": "B: Anh hứa nay không nhậu mà.\nA: Sếp ép anh, anh không từ chối được.", "vn_b": "B: Lần nào cũng có lý do!\nA: Anh sai, lần này anh thật sự sai.", "jp": "", "jp_a": "B: 今日はお酒を飲まないと約束します。\nA: 上司が彼に強要した​​ので、彼は断ることができなかった。", "jp_b": "B: 毎回必ず理由があります！\nA: あなたは間違っています、今回は本当に間違っています。", "en": "broken promise", "en_a": "B: I promise not to drink today.\nA: The boss forced him, he couldn't refuse.", "en_b": "B: Every time there is a reason!\nA: You're wrong, this time you're really wrong.", "tag": "갈등/화해"}, {"no": 946, "cat": "친구 대화", "vn": "nghiện game", "vn_a": "B: Suốt ngày anh chỉ chơi game!\nA: Anh thư giãn chút thôi mà.", "vn_b": "B: Chút mà 5 tiếng?\nA: Anh giảm lại, anh dành thời gian cho em.", "jp": "", "jp_a": "B: 彼は一日中ゲームばかりしています！\nA: 少しだけリラックスしてください。", "jp_b": "B: ほんの少しですが5時間くらいでしょうか？\nA: ゆっくりと、あなたと一緒に時間を過ごします。", "en": "addicted to games", "en_a": "B: All day he just plays games!\nA: Just relax a little.", "en_b": "B: Little but 5 hours?\nA: I slow down, I spend time with you.", "tag": "갈등/화해"}, {"no": 947, "cat": "친구 대화", "vn": "đánh giá quần áo", "vn_a": "B: Bộ này xấu lắm hả?\nA: Không xấu, nhưng cái khác đẹp hơn.", "vn_b": "B: Nói thẳng đi, không cần khéo.\nA: Anh thích em mặc đầm hơn.", "jp": "", "jp_a": "B: このセットそんなにダメですか？\nA: 悪くはないが、もっと美しいものがある。", "jp_b": "B: 率直に言ってみましょう。賢くなる必要はありません。\nA: ドレスを着ている方が好きです。", "en": "Clothing reviews", "en_a": "B: Is this set so bad?\nA: Not bad, but something else is more beautiful.", "en_b": "B: Say it straight, no need to be clever.\nA: I prefer you wearing a dress.", "tag": "갈등/화해"}, {"no": 948, "cat": "친구 대화", "vn": "lập luận lái xe", "vn_a": "B: Anh đi chậm thôi, nguy hiểm lắm.\nA: Anh lái cẩn thận mà em.", "vn_b": "B: Anh vừa lấn tuyến đó!\nA: Ok ok, anh chậm lại đây.", "jp": "", "jp_a": "B: ゆっくり行ってください、危険です。\nA: 慎重に運転してください、愛する人。", "jp_b": "B: あなたはその一線を越えてしまったのです！\nA: わかりました、ここでゆっくりしてください。", "en": "driving argument", "en_a": "B: Go slowly, it's dangerous.\nA: Drive carefully, my dear.", "en_b": "B: You just crossed that line!\nA: Ok ok, slow down here.", "tag": "갈등/화해"}, {"no": 949, "cat": "친구 대화", "vn": "vấn đề tiền bạc", "vn_a": "B: Anh tiêu hoang quá đó.\nA: Anh chỉ mua cái cần thiết thôi.", "vn_b": "B: Mình phải tiết kiệm cho tương lai.\nA: Em nói đúng, anh sẽ ghi sổ chi tiêu.", "jp": "", "jp_a": "B: お金を使いすぎます。\nA: 必要なものだけを買います。", "jp_b": "B: 将来のために貯蓄しなければなりません。\nA: そうですね、経費を書き留めておきます。", "en": "money problem", "en_a": "B: You spend too much money.\nA: I only buy what is necessary.", "en_b": "B: I have to save for the future.\nA: You're right, I will write down the expenses.", "tag": "갈등/화해"}, {"no": 950, "cat": "친구 대화", "vn": "hương vị thức ăn", "vn_a": "B: Sao anh không thích đồ chay?\nA: Anh quen ăn thịt từ nhỏ rồi.", "vn_b": "B: Mình tuần ăn chay 1 ngày được không?\nA: Vì em, anh thử.", "jp": "", "jp_a": "B: なぜベジタリアン料理が好きではないのですか？\nA: 私は小さい頃から肉を食べることに慣れていました。", "jp_b": "B: 週に1日断食してもいいですか？\nA: あなたのために、私は努力します。", "en": "food taste", "en_a": "B: Why don't you like vegetarian food?\nA: I've been used to eating meat since I was little.", "en_b": "B: Can I fast one day a week?\nA: For you, I try.", "tag": "갈등/화해"}, {"no": 951, "cat": "친구 대화", "vn": "mật khẩu điện thoại di động", "vn_a": "B: Sao anh đặt mật khẩu điện thoại?\nA: Vì anh sợ rớt mất.", "vn_b": "B: Cho em biết mật khẩu đi.\nA: 1234, đơn giản thôi mà.", "jp": "", "jp_a": "B: なぜ電話パスワードを設定したのですか?\nA: 落ちるのが怖かったからです。", "jp_b": "B: パスワードを教えてください。\nA: 1234、それは簡単です。", "en": "mobile phone password", "en_a": "B: Why did you set a phone password?\nA: Because he was afraid of falling.", "en_b": "B: Tell me the password.\nA: 1234, it's simple.", "tag": "갈등/화해"}, {"no": 952, "cat": "친구 대화", "vn": "Phê Bình Kiểu Tóc", "vn_a": "B: Tóc em mới cắt, anh không khen à?\nA: Anh chưa kịp để ý.", "vn_b": "B: Anh vô tâm thật.\nA: Em đẹp dù tóc thế nào.", "jp": "", "jp_a": "B: 髪を切ったばかりですが、褒めてくれませんか？\nA: 彼はまだ気づいていませんでした。", "jp_b": "B: 本当に心無い人だね。\nA: あなたはどんな髪であっても美しいです。", "en": "Hairstyle Critique", "en_a": "B: I just cut my hair, don't you compliment me?\nA: He hadn't noticed yet.", "en_b": "B: You're really heartless.\nA: You are beautiful no matter what your hair is.", "tag": "갈등/화해"}, {"no": 953, "cat": "친구 대화", "vn": "Con rể/con rể được ưu tiên", "vn_a": "B: Anh ưu tiên ba mẹ anh quá.\nA: Vì ba mẹ anh ở xa, ít gặp.", "vn_b": "B: Em hiểu, nhưng cũng phải để ý ba mẹ em.\nA: Em đúng, anh sẽ cân bằng hơn.", "jp": "", "jp_a": "B: 親を優先しすぎます。\nA: 彼の両親は遠くに住んでいるので、めったに会うことができません。", "jp_b": "B: 分かりますが、親にも気を配らなければなりません。\nA: そうです、私はもっとバランスが取れるようになります。", "en": "Priority is given to sons-in-law/son-in-law", "en_a": "B: I prioritize my parents too much.\nA: Because his parents live far away, they rarely see each other.", "en_b": "B: I understand, but I also have to pay attention to my parents.\nA: You're right, I'll be more balanced.", "tag": "갈등/화해"}, {"no": 954, "cat": "친구 대화", "vn": "kế hoạch học tập", "vn_a": "B: Em muốn học thạc sĩ.\nA: Anh ủng hộ em hết mình.", "vn_b": "B: Phải vắng nhà nhiều, anh chịu được không?\nA: Tương lai em quan trọng hơn.", "jp": "", "jp_a": "B: 修士号取得のために勉強したいです。\nA: 心から応援しています。", "jp_b": "B: 家を空けることが多いのですが、耐えられますか？\nA: 私の将来の方が大切です。", "en": "study plan", "en_a": "B: I want to study for a master's degree.\nA: I support you wholeheartedly.", "en_b": "B: Having to be away from home a lot, can you handle it?\nA: My future is more important.", "tag": "미래 계획"}, {"no": 955, "cat": "친구 대화", "vn": "Nhập cư/Du học", "vn_a": "A: Mình đi định cư nước ngoài nhé.\nB: Em sợ xa gia đình lắm.", "vn_b": "A: Mình sẽ thường xuyên về thăm.\nB: Để em suy nghĩ thêm nhé.", "jp": "", "jp_a": "A: 海外に定住するつもりです。\nB: 家族と離れるのが怖いです。", "jp_b": "A: また頻繁に遊びに来ます。\nB: もっと考えさせてください。", "en": "Immigration/Study Abroad", "en_a": "A: I'm going to settle abroad.\nB: I'm afraid of being away from my family.", "en_b": "A: I will come back to visit often.\nB: Let me think more.", "tag": "미래 계획"}, {"no": 956, "cat": "친구 대화", "vn": "Nuôi thú cưng", "vn_a": "B: Mình nuôi mèo nhé anh.\nA: Anh thích chó hơn.", "vn_b": "B: Vậy mình nuôi cả hai.\nA: Em sẵn sàng dọn vệ sinh chưa?", "jp": "", "jp_a": "B: 猫を育てます。\nA: 犬がもっと好きになりました。", "jp_b": "B: ということで両方育ててみました。\nA: 掃除の準備はできていますか？", "en": "Raise pets", "en_a": "B: I'll raise a cat.\nA: I like dogs more.", "en_b": "B: So I raised both.\nA: Are you ready to clean up?", "tag": "미래 계획"}, {"no": 957, "cat": "친구 대화", "vn": "gian lận xe hơi", "vn_a": "A: Mình mua xe hơi đi em.\nB: Mình đủ tiền chưa?", "vn_b": "A: Mua trả góp được mà.\nB: Vậy chọn xe tiết kiệm xăng nhé.", "jp": "", "jp_a": "A: 車を買いましょう。\nB: お金は足りていますか？", "jp_b": "A: 分割払いでご購入いただけます。\nB: ですので、燃費の良い車を選びましょう。", "en": "car fraud", "en_a": "A: Let's buy a car.\nB: Do I have enough money?", "en_b": "A: You can buy in installments.\nB: So choose a gas-efficient car.", "tag": "미래 계획"}, {"no": 958, "cat": "친구 대화", "vn": "Bảo hiểm", "vn_a": "A: Mình mua bảo hiểm sức khỏe nhé.\nB: Loại nào tốt anh tìm chưa?", "vn_b": "A: Anh đã so sánh vài hãng rồi.\nB: Anh chu đáo thật.", "jp": "", "jp_a": "A: 私は健康保険を購入します。\nB: もういいものは見つかりましたか？", "jp_b": "A: いくつかのブランドを比較してみました。\nB: 本当に思慮深いですね。", "en": "Insurance", "en_a": "A: I buy health insurance.\nB: Have you found a good one yet?", "en_b": "A: I have compared several brands.\nB: You're really thoughtful.", "tag": "미래 계획"}, {"no": 959, "cat": "친구 대화", "vn": "Chăm sóc bố mẹ tôi", "vn_a": "B: Sau này mình đón ba mẹ về ở chung nhé.\nA: Anh cũng nghĩ vậy, nhất là khi ba mẹ già.", "vn_b": "B: Vậy nhà phải có nhiều phòng.\nA: Mình lập kế hoạch dài hạn.", "jp": "", "jp_a": "B: その後、両親を家に連れて帰って一緒に暮らすつもりです。\nA: 私も特に両親が年老いたときはそう思います。", "jp_b": "B: したがって、家にはたくさんの部屋があるはずです。\nA: 私は長期的な計画を立てます。", "en": "Take care of my parents", "en_a": "B: Later, I'll take my parents home to live with me.\nA: I also think so, especially when my parents are old.", "en_b": "B: So the house must have many rooms.\nA: I make a long-term plan.", "tag": "미래 계획"}, {"no": 960, "cat": "친구 대화", "vn": "địa điểm tổ chức đám cưới", "vn_a": "B: Mình làm đám cưới ở đâu?\nA: Em thích biển hay khách sạn?", "vn_b": "B: Em thích biển, lãng mạn.\nA: Vậy đặt resort ở Phú Quốc đi.", "jp": "", "jp_a": "B: どこで結婚すればいいの？\nA: ビーチとホテルどちらが好きですか？", "jp_b": "B: 私は海が好きで、ロマンチックです。\nA: そこでフーコックのリゾートを予約しましょう。", "en": "wedding venue", "en_a": "B: Where do I get married?\nA: Do you like the beach or the hotel?", "en_b": "B: I like the sea, romantic.\nA: So book a resort in Phu Quoc.", "tag": "미래 계획"}, {"no": 961, "cat": "친구 대화", "vn": "Nội thất nhà mới cưới", "vn_a": "B: Mình mua sofa màu gì?\nA: Anh thích màu xám, dễ vệ sinh.", "vn_b": "B: Em muốn màu be cho ấm.\nA: Vậy mình chọn cùng tại cửa hàng.", "jp": "", "jp_a": "B: 何色のソファを買えばいいですか？\nA: グレー色が掃除しやすくて気に入ってます。", "jp_b": "B: 温かみのあるベージュが欲しいです。\nA: なのでお店でも同じものを選びます。", "en": "Newlywed home interior", "en_a": "B: What color sofa should I buy?\nA: I like the gray color, easy to clean.", "en_b": "B: I want beige for warmth.\nA: So I choose the same at the store.", "tag": "미래 계획"}, {"no": 962, "cat": "친구 대화", "vn": "chia sẻ sở thích", "vn_a": "B: Mình học chung môn gì đi.\nA: Học khiêu vũ nhé, lãng mạn.", "vn_b": "B: Em vụng về lắm, anh chịu được không?\nA: Anh sẽ kiên nhẫn dạy em.", "jp": "", "jp_a": "B: どの科目を一緒に勉強すべきですか?\nA: ロマンチックなダンスを学びましょう。", "jp_b": "B: 私はとても不器用なのですが、我慢できますか？\nA: 根気よく教えます。", "en": "Share interests", "en_a": "B: What subjects should we study together?\nA: Learn to dance, romantic.", "en_b": "B: I'm so clumsy, can you stand it?\nA: I will patiently teach you.", "tag": "미래 계획"}, {"no": 963, "cat": "친구 대화", "vn": "sự khác biệt tôn giáo", "vn_a": "B: Em theo Phật giáo, anh thì sao?\nA: Anh không theo tôn giáo nào.", "vn_b": "B: Sau này con mình theo gì?\nA: Mình tôn trọng nhau, để con tự chọn.", "jp": "", "jp_a": "B: 私は仏教を信仰していますが、あなたはどうですか？\nA: 彼はいかなる宗教も信じていません。", "jp_b": "B: うちの子は将来どうなるんだろう？\nA: 私たちはお互いを尊重し、子供たちに自分で選ばせます。", "en": "religious differences", "en_a": "B: I follow Buddhism, what about you?\nA: He does not follow any religion.", "en_b": "B: What will my child follow in the future?\nA: We respect each other, let the children choose for themselves.", "tag": "미래 계획"}, {"no": 964, "cat": "친구 대화", "vn": "Khi bạn trượt một bài kiểm tra", "vn_a": "B: Em thi rớt rồi anh.\nA: Không sao em, lần sau cố gắng.", "vn_b": "B: Em làm anh thất vọng.\nA: Em đã cố hết sức, anh tự hào về em.", "jp": "", "jp_a": "B: 私は試験に落ちました。\nA: 大丈夫、次回試してください。", "jp_b": "B: あなたは私を失望させます。\nA: あなたはベストを尽くしました、私はあなたを誇りに思います。", "en": "When you fail a test", "en_a": "B: I failed the exam.\nA: It's okay, try next time.", "en_b": "B: You disappoint me.\nA: You tried your best, I'm proud of you.", "tag": "감정/위로"}, {"no": 965, "cat": "친구 대화", "vn": "cãi nhau với một người bạn", "vn_a": "B: Em cãi nhau với bạn thân rồi.\nA: Vì chuyện gì vậy?", "vn_b": "B: Cô ấy hiểu lầm em.\nA: Để em bình tĩnh rồi nói chuyện sau.", "jp": "", "jp_a": "B: 親友と口論になりました。\nA: どうしたの？", "jp_b": "B: 彼女は私を誤解しました。\nA: 落ち着いてから話しましょう。", "en": "quarreled with a friend", "en_a": "B: I had an argument with my best friend.\nA: What's the matter?", "en_b": "B: She misunderstood me.\nA: Let me calm down and talk later.", "tag": "감정/위로"}, {"no": 966, "cat": "친구 대화", "vn": "cha mẹ cằn nhằn", "vn_a": "B: Mẹ em la em hoài, mệt quá.\nA: Mẹ lo cho em mà.", "vn_b": "B: Em biết, nhưng nghe nhiều cũng nản.\nA: Cuối tuần anh đưa em đi chơi cho khuây.", "jp": "", "jp_a": "B: 母はいつも私に怒鳴るので、とても疲れます。\nA: お母さんがあなたの世話をします。", "jp_b": "B: わかってるけど、そんなに聞くとイライラする。\nA: 週末、私はあなたを遊びに連れて行きました。", "en": "parents grumble", "en_a": "B: My mother yells at me all the time, it's so tiring.\nA: Mom takes care of you.", "en_b": "B: I know, but hearing it so much is frustrating.\nA: On the weekend, I took you out to have fun.", "tag": "감정/위로"}, {"no": 967, "cat": "친구 대화", "vn": "xung đột đồng nghiệp", "vn_a": "A: Đồng nghiệp anh khó chịu quá.\nB: Anh chịu đựng vì công việc nhé.", "vn_b": "A: Anh muốn cãi lại lắm.\nB: Im lặng cũng là sức mạnh.", "jp": "", "jp_a": "A: あなたの同僚はとても動揺しています。\nB: 仕事のため我慢してください。", "jp_b": "A: 本当は議論したいんです。\nB: 沈黙は強さでもある。", "en": "colleague conflict", "en_a": "A: Your colleagues are so upset.\nB: Please bear with it for work.", "en_b": "A: I really want to argue.\nB: Silence is also strength.", "tag": "감정/위로"}, {"no": 968, "cat": "친구 대화", "vn": "Giảm lòng tự trọng", "vn_a": "B: Em thấy mình vô dụng quá.\nA: Đừng nói vậy, em đặc biệt với anh.", "vn_b": "B: Em không tin chính mình nữa.\nA: Anh tin em, đó là đủ.", "jp": "", "jp_a": "B: とても無駄だと感じます。\nA: そんなこと言わないで、あなたは私にとって特別なのよ。", "jp_b": "B: もう自分を信じられません。\nA: 信じます、それで十分です。", "en": "Reduced self-esteem", "en_a": "B: I feel so useless.\nA: Don't say that, you're special to me.", "en_b": "B: I don't believe in myself anymore.\nA: I believe you, that's enough.", "tag": "감정/위로"}, {"no": 969, "cat": "친구 대화", "vn": "lo lắng tương lai", "vn_a": "B: Em lo cho tương lai quá.\nA: Mình lập kế hoạch từng bước.", "vn_b": "B: Em sợ không kịp.\nA: Có anh đồng hành, đừng sợ.", "jp": "", "jp_a": "B: 将来がとても心配です。\nA: 段階的に計画していきます。", "jp_b": "B: 間に合わないのではないかと思います。\nA: あなたがそばにいるから、恐れないでください。", "en": "worry about the future", "en_a": "B: I'm so worried about the future.\nA: I plan step by step.", "en_b": "B: I'm afraid I won't make it in time.\nA: With you by my side, don't be afraid.", "tag": "감정/위로"}, {"no": 970, "cat": "친구 대화", "vn": "nhớ nhà", "vn_a": "A: Anh nhớ quê quá em.\nB: Cuối tuần mình về quê nhé.", "vn_b": "A: Bận quá, không về được.\nB: Vậy gọi video cho ba mẹ đi.", "jp": "", "jp_a": "A: 故郷がとても恋しいです。\nB: 今週末家に帰ります。", "jp_b": "A: 忙しすぎて帰れません。\nB: そこで、両親にビデオ電話をかけます。", "en": "homesick", "en_a": "A: I miss my hometown so much.\nB: I'll go home this weekend.", "en_b": "A: Too busy, can't come back.\nB: So make a video call to your parents.", "tag": "감정/위로"}, {"no": 971, "cat": "친구 대화", "vn": "khao khát gia đình", "vn_a": "B: Em nhớ ba em quá.\nA: Tuần này về thăm ba đi.", "vn_b": "B: Em sợ ba mệt vì em vắng nhà.\nA: Mình về cùng, anh chở em.", "jp": "", "jp_a": "B: お父さんがいなくてとても寂しいです。\nA: 今週私は父を訪ねるつもりです。", "jp_b": "B: 私が家にいないのでお父さんは疲れていると思います。\nA: 一緒に家に帰りましょう、私が車で送ります。", "en": "longing for family", "en_a": "B: I miss my dad so much.\nA: This week I'm going to visit my dad.", "en_b": "B: I'm afraid my dad is tired because I'm not home.\nA: Let's go home together, I'll drive you.", "tag": "감정/위로"}, {"no": 972, "cat": "친구 대화", "vn": "được so sánh", "vn_a": "B: Mẹ so sánh em với chị họ.\nA: Em là duy nhất, không ai sánh được.", "vn_b": "B: Anh nói vậy em đỡ buồn.\nA: Vì đó là sự thật.", "jp": "", "jp_a": "B: 母は私をいとこと比較します。\nA: あなたはユニークで、誰も比較できません。", "jp_b": "B: そうすれば悲しくなくなると言いました。\nA: それは本当だから。", "en": "is compared", "en_a": "B: Mom compares me to my cousin.\nA: You are unique, no one can compare.", "en_b": "B: I said that makes you less sad.\nA: Because it's true.", "tag": "감정/위로"}, {"no": 973, "cat": "친구 대화", "vn": "ăn mừng thành công", "vn_a": "A: Anh được thăng chức rồi em!\nB: Trời ơi, mừng quá!", "vn_b": "A: Tối nay mình ăn mừng nhé.\nB: Em đặt nhà hàng ngon nha.", "jp": "", "jp_a": "A: 昇進したよ！\nB: いやー、本当に嬉しいです！", "jp_b": "A: 今夜祝いましょう。\nB: 良いレストランを予約します。", "en": "Celebrate success", "en_a": "A: I got promoted!\nB: Oh my god, I'm so happy!", "en_b": "A: Let's celebrate tonight.\nB: I'll book a good restaurant.", "tag": "감정/위로"}, {"no": 974, "cat": "친구 대화", "vn": "mức lương đầu tiên", "vn_a": "B: Em mới nhận lương đầu tiên!\nA: Chúc mừng em! Cảm giác sao?", "vn_b": "B: Em sẽ mua quà cho ba mẹ và anh.\nA: Em chu đáo quá, ba mẹ sẽ tự hào.", "jp": "", "jp_a": "B: 初めての給料を受け取りました！\nA: おめでとう！それはどんな感じですか？", "jp_b": "B: 両親とあなたにプレゼントを買います。\nA: あなたはとても思慮深いので、ご両親は誇りに思うでしょう。", "en": "first salary", "en_a": "B: I just received my first salary!\nA: Congratulations! How does it feel?", "en_b": "B: I will buy gifts for my parents and you.\nA: You are so thoughtful, your parents will be proud.", "tag": "감정/위로"}, {"no": 975, "cat": "친구 대화", "vn": "thành tựu nhỏ", "vn_a": "B: Em chạy được 5km hôm nay!\nA: Quá giỏi! Em kiên trì thật.", "vn_b": "B: Mục tiêu là 10km tháng sau.\nA: Anh sẽ chạy cùng em.", "jp": "", "jp_a": "B: 今日は5km走りました！\nA: とても良い！本当にしつこいんです。", "jp_b": "B: 目標は来月の10kmです。\nA: 私はあなたと一緒に走
