const STATE_KEY = "vn3k_v2_state";

// Audio playback: prefer pre-generated MP3 from audio/, fall back to Web Speech.
let viVoice = null, jpVoice = null;
function loadVoices() {
  if (!("speechSynthesis" in window)) return;
  const voices = speechSynthesis.getVoices();
  const vi = voices.filter(v => /^vi[-_]|^vi$/i.test(v.lang) || /vietnam/i.test(v.name));
  const jp = voices.filter(v => /^ja[-_]/i.test(v.lang) || /japan/i.test(v.name));
  viVoice = vi.find(v => v.localService) || vi[0] || null;
  jpVoice = jp.find(v => v.localService) || jp[0] || null;
}
if ("speechSynthesis" in window) {
  loadVoices();
  speechSynthesis.addEventListener?.("voiceschanged", loadVoices);
}

let currentAudio = null;
let playToken = 0;

function setPlaying(on) {
  document.getElementById("audioToggle")?.classList.toggle("playing", on);
}

function speakWebSpeech(text, lang) {
  return new Promise((resolve) => {
    if (!("speechSynthesis" in window) || !text) return resolve();
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.replace(/<[^>]+>/g, ""));
    u.lang = lang;
    if (lang === "vi-VN" && viVoice) u.voice = viVoice;
    else if (lang === "ja-JP" && jpVoice) u.voice = jpVoice;
    u.rate = 0.9;
    u.onend = resolve;
    u.onerror = resolve;
    speechSynthesis.speak(u);
  });
}

// Single reused Audio element — iOS Safari/Chrome blocks new Audio()
// playback when not directly initiated by user gesture, but allows
// reusing the same element after first unlock.
let _audioEl = null;
function getAudioEl() {
  if (!_audioEl) {
    _audioEl = new Audio();
    _audioEl.preload = "auto";
  }
  return _audioEl;
}
function unlockAudio() {
  // Call this from a user-gesture handler to "unlock" audio on iOS.
  const a = getAudioEl();
  a.src = "audio/0001_vn_a.mp3";
  a.muted = true;
  a.play().then(() => { a.pause(); a.muted = false; a.currentTime = 0; }).catch(() => { a.muted = false; });
}

function playMp3(no, field) {
  return new Promise((resolve, reject) => {
    const url = `audio/${String(no).padStart(4, "0")}_${field}.mp3`;
    const audio = getAudioEl();
    currentAudio = audio;
    const cleanup = () => {
      audio.removeEventListener("ended", onEnd);
      audio.removeEventListener("error", onErr);
    };
    const onEnd = () => { cleanup(); resolve(true); };
    const onErr = () => { cleanup(); reject(new Error("mp3 load failed")); };
    audio.addEventListener("ended", onEnd);
    audio.addEventListener("error", onErr);
    audio.src = url;
    audio.play().catch(err => { cleanup(); reject(err); });
  });
}

async function playOne(no, field, text, lang) {
  try {
    await playMp3(no, field);
  } catch (e) {
    // Fallback to Web Speech if MP3 missing
    await speakWebSpeech(text, lang);
  }
}

async function playSequence(no, items) {
  // items: [{field, text, lang, gap?}, ...]
  // Returns the playToken used (truthy) on success, 0 if interrupted.
  const myToken = ++playToken;
  setPlaying(true);
  for (const it of items) {
    if (myToken !== playToken) return 0;
    await playOne(no, it.field, it.text, it.lang);
    if (myToken !== playToken) return 0;
    await new Promise(r => setTimeout(r, it.gap ?? 250));
  }
  if (myToken !== playToken) return 0;
  setPlaying(false);
  return myToken;
}

function speak(text) {
  // Manual speak (no MP3 lookup) — used by audio button only if needed
  speakWebSpeech(text, "vi-VN");
}

async function autoPlayCurrent() {
  if (!S.audioOn || current.length === 0) return;
  const d = current[idx];
  const isBack = document.getElementById("card").classList.contains("flipped");
  const side = isBack ? "b" : "a";
  const vnText = isBack ? d.vn_b : d.vn_a;
  const jpText = isBack ? d.jp_b : d.jp_a;
  const isDialog = (vnText || "").includes("\n");

  let items;
  if (isDialog) {
    // Couple/dialog cards: 2 VN lines (different speakers) + 2 JP lines.
    // Filenames: {no}_{a|b}_{1|2}.mp3  and  {no}_{a|b}_{1|2}_jp.mp3
    const vnLines = vnText.split("\n").map(s => s.replace(/^[AB]:\s*/, ""));
    const jpLines = (jpText || "").split("\n").map(s => s.replace(/^[AB]:\s*/, ""));
    items = [];
    for (let i = 0; i < vnLines.length; i++) {
      items.push({ field: `${side}_${i+1}`, text: vnLines[i], lang: "vi-VN", gap: 350 });
    }
    for (let i = 0; i < jpLines.length; i++) {
      items.push({ field: `${side}_${i+1}_jp`, text: jpLines[i], lang: "ja-JP", gap: 350 });
    }
  } else {
    // v2 cards: VN ×2 then JP ×1, single voice per language
    items = [
      { field: "vn_" + side, text: vnText, lang: "vi-VN", gap: 400 },
      { field: "vn_" + side, text: vnText, lang: "vi-VN", gap: 400 },
      { field: "jp_" + side, text: jpText, lang: "ja-JP", gap: 400 },
    ];
  }
  const ourToken = await playSequence(d.no, items);
  if (!ourToken) return;                         // interrupted by user
  if (!S.autoAdvance || !S.audioOn) return;
  await new Promise(r => setTimeout(r, 500));
  if (ourToken !== playToken) return;            // interrupted during pause
  if (!S.autoAdvance || !S.audioOn) return;
  const nowBack = document.getElementById("card").classList.contains("flipped");
  if (!nowBack) {
    toggleFlip();                                 // -> triggers autoPlayCurrent for B
  } else if (idx < current.length - 1) {
    nav(1);                                       // -> triggers autoPlayCurrent for next front
  } else {
    // End of deck — show category-completion modal
    openCompletionModal();
  }
}

function stopSpeak() {
  playToken++;  // invalidates any in-flight sequence
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  if (currentAudio) {
    try { currentAudio.pause(); } catch(e) {}
    // Don't clear src or null currentAudio — keep the singleton element
    // unlocked for iOS; just stop playback.
  }
  setPlaying(false);
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STATE_KEY) || "{}");
    // Migrate legacy "mastered" array to ratings (mastered items → rating 3)
    let ratings = (s.ratings && typeof s.ratings === "object") ? s.ratings : {};
    if (Array.isArray(s.mastered)) {
      for (const no of s.mastered) if (!ratings[no]) ratings[no] = 3;
    }
    const validRatings = ["all", "1", "2", "3", "unrated"];
    return {
      version: 2,
      position: typeof s.position === "number" ? s.position : 1,
      category: s.category || "all",
      ratingFilter: validRatings.includes(s.ratingFilter) ? s.ratingFilter : "all",
      onlyBookmarked: !!s.onlyBookmarked,
      order: s.order === "random" ? "random" : "sequential",
      audioOn: !!s.audioOn,
      autoAdvance: !!s.autoAdvance,
      ratings: ratings,
      bookmarked: Array.isArray(s.bookmarked) ? s.bookmarked : [],
      theme: s.theme || null,
    };
  } catch(e) {
    return { version:2, position:1, category:"all", ratingFilter:"all", onlyBookmarked:false, order:"sequential", audioOn:false, autoAdvance:false, ratings:{}, bookmarked:[], theme:null };
  }
}

function saveState() {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      version: S.version,
      position: S.position,
      category: S.category,
      onlyBookmarked: S.onlyBookmarked,
      order: S.order,
      audioOn: S.audioOn,
      autoAdvance: S.autoAdvance,
      ratingFilter: S.ratingFilter,
      ratings: S.ratings,
      bookmarked: S.bookmarked,
      theme: S.theme,
    }));
  } catch(e) {}
}

const S = loadState();
// ratings: {no: 1|2|3}
const bookmarkedSet = new Set(S.bookmarked);

let current = [];
let idx = 0;

function applyFilter() {
  current = D.filter(d => {
    if (S.category !== "all" && d.cat !== S.category) return false;
    if (S.onlyBookmarked && !bookmarkedSet.has(d.no)) return false;
    if (S.ratingFilter !== "all") {
      const r = S.ratings[d.no] || 0;
      if (S.ratingFilter === "unrated") { if (r !== 0) return false; }
      else if (String(r) !== S.ratingFilter) return false;
    }
    return true;
  });
  if (S.order === "random") {
    for (let i = current.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [current[i], current[j]] = [current[j], current[i]];
    }
  }
}

function syncIdx() {
  const i = current.findIndex(d => d.no === S.position);
  idx = i >= 0 ? i : 0;
  if (current.length > 0) S.position = current[idx].no;
}

function render(resetFlip = true) {
  const card = document.getElementById("card");
  const navBar = document.querySelector(".nav-bar");
  const sceneEmpty = document.getElementById("sceneEmpty");
  const flipHint = document.querySelector(".flip-hint");

  if (current.length === 0) {
    card.style.visibility = "hidden";
    navBar.style.display = "none";
    flipHint.style.display = "none";
    sceneEmpty.classList.add("show");
    document.getElementById("progress").textContent = "0 / 0";
    updateRatingCount();
    return;
  }

  card.style.visibility = "";
  navBar.style.display = "";
  flipHint.style.display = "";
  sceneEmpty.classList.remove("show");

  syncIdx();
  const d = current[idx];
  if (resetFlip) card.classList.remove("flipped");

  // Detect dialog cards (multi-line VN with newline)
  const isDialog = (d.vn_a || "").includes("\n");

  document.getElementById("fCat").textContent = d.cat;
  document.getElementById("fCat").title = d.cat;
  document.getElementById("fNum").textContent = "#" + String(d.no).padStart(4, "0");
  document.getElementById("fVn").textContent = d.vn;
  document.getElementById("fVnEx").textContent = d.vn_a || "";
  document.getElementById("fVnEx").classList.toggle("dialog", isDialog);
  document.getElementById("fJp").innerHTML = d.jp || "";
  document.getElementById("fJp").style.display = d.jp ? "" : "none";
  document.getElementById("fJpEx").innerHTML = d.jp_a || "";
  document.getElementById("fJpEx").classList.toggle("dialog", isDialog);
  document.getElementById("fJpEx").style.display = d.jp_a ? "" : "none";
  document.getElementById("fEn").textContent = d.en || "";
  document.getElementById("fEnEx").textContent = d.en_a || "";
  document.getElementById("fEnEx").classList.toggle("dialog", isDialog);
  document.getElementById("fEnEx").style.display = d.en_a ? "" : "none";

  document.getElementById("bCat").textContent = d.cat;
  document.getElementById("bCat").title = d.cat;
  document.getElementById("bNum").textContent = "#" + String(d.no).padStart(4, "0");
  document.getElementById("bVn").textContent = d.vn;
  document.getElementById("bVnEx").textContent = d.vn_b || "";
  document.getElementById("bVnEx").classList.toggle("dialog", isDialog);
  document.getElementById("bJp").innerHTML = d.jp || "";
  document.getElementById("bJp").style.display = d.jp ? "" : "none";
  document.getElementById("bJpEx").innerHTML = d.jp_b || "";
  document.getElementById("bJpEx").classList.toggle("dialog", isDialog);
  document.getElementById("bJpEx").style.display = d.jp_b ? "" : "none";
  document.getElementById("bEn").textContent = d.en || "";
  document.getElementById("bEnEx").textContent = d.en_b || "";
  document.getElementById("bEnEx").classList.toggle("dialog", isDialog);
  document.getElementById("bEnEx").style.display = d.en_b ? "" : "none";

  const isBm = bookmarkedSet.has(d.no);
  const rating = S.ratings[d.no] || 0;
  ["fBm", "bBm"].forEach(id => {
    const el = document.getElementById(id);
    el.classList.toggle("on", isBm);
    el.textContent = isBm ? "★" : "☆";
  });
  ["fRate", "bRate"].forEach(gid => {
    document.querySelectorAll(`#${gid} .rate-btn`).forEach(b => {
      b.classList.toggle("on", parseInt(b.dataset.rate) === rating);
    });
  });

  document.getElementById("progress").textContent = `${idx + 1} / ${current.length}`;
  updateRatingCount();

  document.getElementById("prevBtn").disabled = idx === 0;
  document.getElementById("nextBtn").disabled = idx === current.length - 1;
}

function updateRatingCount() {
  const c = {1: 0, 2: 0, 3: 0};
  for (const no in S.ratings) {
    const r = S.ratings[no];
    if (c[r] !== undefined) c[r]++;
  }
  document.getElementById("ratingCount").textContent = `1:${c[1]} · 2:${c[2]} · 3:${c[3]}`;
}

function setCategory(c) {
  S.category = c;
  applyFilter();
  if (current.length > 0) S.position = current[0].no;
  updateCatButton();
  render(true);
  saveState();
}

function updateCatButton() {
  const total = S.category === "all"
    ? D.length
    : D.filter(d => d.cat === S.category).length;
  const label = S.category === "all" ? "전체" : S.category;
  const labelEl = document.getElementById("catBtnLabel");
  if (labelEl) labelEl.textContent = `${label} · ${total}`;
  document.getElementById("catBtn").title = `${label} (${total})`;
}

function buildCatList(filter = "") {
  const list = document.getElementById("catList");
  const q = filter.trim().toLowerCase();
  const counts = new Map();
  for (const d of D) counts.set(d.cat, (counts.get(d.cat) || 0) + 1);
  const cats = [...counts.entries()].sort((a, b) => b[1] - a[1]);
  const items = [["all", D.length], ...cats];
  const filtered = items.filter(([name]) =>
    !q || name === "all" || name.toLowerCase().includes(q)
  );
  list.innerHTML = filtered.map(([name, n]) => {
    const label = name === "all" ? "전체 (All)" : name;
    const active = name === S.category ? " active" : "";
    return `<div class="cat-item${active}" data-cat="${name.replace(/"/g,"&quot;")}">
      <span>${label}</span><span class="cat-item-count">${n}</span>
    </div>`;
  }).join("");
  list.querySelectorAll(".cat-item").forEach(el => {
    el.addEventListener("click", () => {
      const wasCompletion = modalMode === "completion";
      setCategory(el.dataset.cat);
      // Suppress closeCatModal's auto-advance kill (we want to continue)
      modalMode = "normal";
      document.getElementById("catModal").hidden = true;
      if (wasCompletion && S.autoAdvance && current.length > 0) {
        setTimeout(autoPlayCurrent, 250);
      }
    });
  });
}

let modalMode = "normal"; // "normal" | "completion"

function openCatModal() {
  modalMode = "normal";
  document.getElementById("catModalTitle").textContent = "카테고리 선택";
  document.getElementById("catModalSubtitle").style.display = "none";
  buildCatList("");
  document.getElementById("catSearch").value = "";
  document.getElementById("catModal").hidden = false;
  setTimeout(() => document.getElementById("catSearch").focus(), 50);
}

function openCompletionModal() {
  modalMode = "completion";
  const prevCat = S.category === "all" ? "전체" : S.category;
  const prevCount = current.length;
  document.getElementById("catModalTitle").textContent = "학습 완료! ✅";
  const sub = document.getElementById("catModalSubtitle");
  sub.textContent = `「${prevCat}」 ${prevCount}개 완료`;
  sub.style.display = "";
  document.getElementById("catSearch").value = "";
  buildCatList("");
  // Prepend "replay current" item
  const list = document.getElementById("catList");
  const replayHtml = `<div class="cat-item replay" data-cat="__replay__">
    <span>🔁 이 카테고리 다시 재생</span><span class="cat-item-count">↻</span>
  </div>`;
  list.insertAdjacentHTML("afterbegin", replayHtml);
  list.querySelector(".cat-item.replay").addEventListener("click", () => {
    closeCatModal();
    // Restart from first card in current category
    if (current.length > 0) {
      idx = 0;
      S.position = current[0].no;
      stopSpeak();
      render(true);
      saveState();
      if (S.autoAdvance) setTimeout(autoPlayCurrent, 200);
    }
  });
  document.getElementById("catModal").hidden = false;
}

function closeCatModal() {
  document.getElementById("catModal").hidden = true;
  // If user dismissed the completion modal without choosing, stop auto-advance
  if (modalMode === "completion" && S.autoAdvance) {
    S.autoAdvance = false;
    updateAutoButton();
    stopSpeak();
    saveState();
  }
  modalMode = "normal";
}

function toggleFlip() {
  document.getElementById("card").classList.toggle("flipped");
  stopSpeak();
  if (S.audioOn) setTimeout(autoPlayCurrent, 120);
}

function toggleAudio() {
  S.audioOn = !S.audioOn;
  updateAudioButton();
  saveState();
  if (S.audioOn) {
    unlockAudio();           // iOS: prime the audio element on user gesture
    autoPlayCurrent();
  } else {
    stopSpeak();
  }
}

function updateAudioButton() {
  const btn = document.getElementById("audioToggle");
  const cap = document.getElementById("audioToggleCap");
  btn.textContent = S.audioOn ? "🔊" : "🔇";
  btn.classList.toggle("on", S.audioOn);
  btn.title = S.audioOn ? "음성 켜짐" : "음성 꺼짐";
  if (cap) cap.textContent = S.audioOn ? "음성" : "음성";
}

function toggleAuto() {
  S.autoAdvance = !S.autoAdvance;
  if (S.autoAdvance && !S.audioOn) {
    // Auto-advance needs audio on; turn it on too
    S.audioOn = true;
    updateAudioButton();
  }
  updateAutoButton();
  saveState();
  if (S.autoAdvance) {
    unlockAudio();           // iOS: prime audio on user gesture
    autoPlayCurrent();
  } else {
    stopSpeak();
  }
}

function updateAutoButton() {
  const btn = document.getElementById("autoToggle");
  const icon = document.getElementById("autoIcon");
  const label = document.getElementById("autoLabel");
  btn.classList.toggle("on", S.autoAdvance);
  btn.title = S.autoAdvance ? "자동 재생 중" : "자동 재생";
  if (icon) icon.textContent = S.autoAdvance ? "⏸️" : "▶️";
  if (label) label.textContent = S.autoAdvance ? "정지" : "자동";
}

function nav(delta) {
  if (current.length === 0) return;
  const ni = Math.max(0, Math.min(current.length - 1, idx + delta));
  if (ni === idx) return;
  idx = ni;
  S.position = current[idx].no;
  stopSpeak();
  render(true);
  saveState();
  if (S.audioOn) setTimeout(autoPlayCurrent, 120);
}

function toggleOrder() {
  S.order = S.order === "random" ? "sequential" : "random";
  updateOrderButton();
  applyFilter();
  if (current.length > 0) S.position = current[0].no;
  render(true);
  saveState();
}

function updateOrderButton() {
  const btn = document.getElementById("orderToggle");
  const cap = document.getElementById("orderToggleCap");
  btn.textContent = S.order === "random" ? "🔀" : "📋";
  btn.classList.toggle("on", S.order === "random");
  btn.title = S.order === "random" ? "랜덤" : "순서대로";
  if (cap) cap.textContent = S.order === "random" ? "랜덤" : "순서";
}

function toggleBookmark() {
  if (current.length === 0) return;
  const d = current[idx];
  if (bookmarkedSet.has(d.no)) bookmarkedSet.delete(d.no);
  else bookmarkedSet.add(d.no);
  S.bookmarked = [...bookmarkedSet];
  if (S.onlyBookmarked) applyFilter();
  saveState();
  render(false);
}

function setRating(rating) {
  if (current.length === 0) return;
  const d = current[idx];
  const cur = S.ratings[d.no] || 0;
  const next = cur === rating ? 0 : rating;
  if (next === 0) delete S.ratings[d.no];
  else S.ratings[d.no] = next;
  if (S.ratingFilter !== "all") applyFilter();
  saveState();
  render(false);
}

function toggleOnlyBm() {
  S.onlyBookmarked = !S.onlyBookmarked;
  const btn = document.getElementById("onlyBm");
  btn.classList.toggle("on", S.onlyBookmarked);
  btn.textContent = S.onlyBookmarked ? "★" : "☆";
  btn.title = S.onlyBookmarked ? "즐겨찾기만" : "전체 보기";
  applyFilter();
  render(true);
  saveState();
}

const RATING_CYCLE = ["all", "1", "2", "3", "unrated"];
const RATING_LABELS = {
  "all": "📊",
  "1": "1",
  "2": "2",
  "3": "3",
  "unrated": "?",
};
const RATING_TITLES = {
  "all": "등급 전체",
  "1": "1 · 모름",
  "2": "2 · 인상",
  "3": "3 · 장악",
  "unrated": "미평가",
};
function cycleRatingFilter() {
  const i = RATING_CYCLE.indexOf(S.ratingFilter);
  S.ratingFilter = RATING_CYCLE[(i + 1) % RATING_CYCLE.length];
  updateRatingFilterBtn();
  applyFilter();
  if (current.length > 0) S.position = current[0].no;
  render(true);
  saveState();
}

function updateRatingFilterBtn() {
  const btn = document.getElementById("rateFilter");
  const cap = document.getElementById("rateFilterCap");
  btn.textContent = RATING_LABELS[S.ratingFilter];
  btn.title = RATING_TITLES[S.ratingFilter];
  btn.classList.remove("level-1", "level-2", "level-3", "unrated");
  if (S.ratingFilter === "unrated") btn.classList.add("unrated");
  else if (S.ratingFilter !== "all") btn.classList.add("level-" + S.ratingFilter);
  if (cap) {
    const capLabels = {"all":"등급","1":"1만","2":"2만","3":"3만","unrated":"미평가"};
    cap.textContent = capLabels[S.ratingFilter];
  }
}

function setTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  document.getElementById("themeBtn").textContent = t === "dark" ? "☀️ Light" : "🌙 Dark";
  S.theme = t;
  saveState();
}

function initTheme() {
  let t = S.theme;
  if (!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
  setTheme(t);
}

document.getElementById("card").addEventListener("click", (e) => {
  if (e.target.closest(".icon-btn")) return;
  toggleFlip();
});

document.getElementById("catBtn").addEventListener("click", openCatModal);
document.getElementById("catModalClose").addEventListener("click", closeCatModal);
document.getElementById("catModal").addEventListener("click", (e) => {
  if (e.target.id === "catModal") closeCatModal();
});
document.getElementById("catSearch").addEventListener("input", (e) => {
  buildCatList(e.target.value);
});

document.getElementById("onlyBm").addEventListener("click", toggleOnlyBm);
document.getElementById("rateFilter").addEventListener("click", cycleRatingFilter);

document.getElementById("prevBtn").addEventListener("click", () => nav(-1));
document.getElementById("nextBtn").addEventListener("click", () => nav(1));
document.getElementById("orderToggle").addEventListener("click", toggleOrder);

["fBm", "bBm"].forEach(id => {
  document.getElementById(id).addEventListener("click", (e) => {
    e.stopPropagation();
    toggleBookmark();
  });
});
["fRate", "bRate"].forEach(gid => {
  document.querySelectorAll(`#${gid} .rate-btn`).forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      setRating(parseInt(btn.dataset.rate));
    });
  });
});
document.getElementById("audioToggle").addEventListener("click", toggleAudio);
document.getElementById("autoToggle").addEventListener("click", toggleAuto);

document.getElementById("themeBtn").addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
});

document.getElementById("clearBtn").addEventListener("click", () => {
  if (!confirm("모든 「즐겨찾기」와 「1/2/3 평가」를 초기화할까요? 되돌릴 수 없습니다.")) return;
  bookmarkedSet.clear();
  S.bookmarked = [];
  S.ratings = {};
  applyFilter();
  saveState();
  render(false);
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && !document.getElementById("catModal").hidden) {
    e.preventDefault();
    closeCatModal();
    return;
  }
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  if (e.key === " " || e.key === "ArrowUp" || e.key === "ArrowDown") {
    e.preventDefault();
    toggleFlip();
  } else if (e.key === "ArrowLeft") {
    e.preventDefault();
    nav(-1);
  } else if (e.key === "ArrowRight") {
    e.preventDefault();
    nav(1);
  }
});

let touchStartX = 0, touchStartY = 0;
document.addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx > 0) nav(-1); else nav(1);
  }
}, { passive: true });

// Reset category if stored value is no longer valid
if (S.category !== "all" && !D.some(d => d.cat === S.category)) {
  S.category = "all";
}
(() => {
  const btn = document.getElementById("onlyBm");
  btn.classList.toggle("on", S.onlyBookmarked);
  btn.textContent = S.onlyBookmarked ? "★" : "☆";
  btn.title = S.onlyBookmarked ? "즐겨찾기만" : "전체 보기";
})();
updateRatingFilterBtn();
updateOrderButton();
updateAudioButton();
updateAutoButton();
updateCatButton();
initTheme();
applyFilter();
// If saved filters happen to leave 0 cards on load, reset all filters automatically
if (current.length === 0) {
  S.category = "all";
  S.ratingFilter = "all";
  S.onlyBookmarked = false;
  document.getElementById("onlyBm").classList.remove("on");
  document.getElementById("onlyBm").textContent = "☆";
  updateRatingFilterBtn();
  updateCatButton();
  applyFilter();
  saveState();
}
render(true);
</script>
</body>
</html>
