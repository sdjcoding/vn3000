"suspected pregnancy", "en_a": "B: My period is more than a week late.\nA: I'll try it and see how it goes.", "en_b": "B: I'm so nervous.\nA: Whatever the outcome, I'm with you.", "tag": "건강/돌봄"}, {"no": 984, "cat": "친구 대화", "vn": "chuyến đi gia đình", "vn_a": "A: Hè này cả nhà mình đi du lịch nhé.\nB: Đi đâu cho ba mẹ thoải mái?", "vn_b": "A: Resort biển Đà Nẵng đi.\nB: Em book phòng cho cả nhà.", "jp": "", "jp_a": "A: この夏、家族全員で旅行に行きます。\nB: どこに行けば両親が安心できるでしょうか？", "jp_b": "A: ダナンのビーチリゾート。\nB: 家族全員で部屋を予約しました。", "en": "family trip", "en_a": "A: This summer, my whole family will go on a trip.\nB: Where to go to make your parents feel comfortable?", "en_b": "A: Da Nang beach resort.\nB: I booked a room for the whole family.", "tag": "가족/사회"}, {"no": 985, "cat": "친구 대화", "vn": "em trai lấy vợ", "vn_a": "B: Em gái em sắp cưới rồi.\nA: Mình mua quà cưới gì?", "vn_b": "B: Phong bì lì xì là được.\nA: Anh bỏ thêm chút thể hiện tình cảm.", "jp": "", "jp_a": "B: 私の妹はもうすぐ結婚します。\nA: 結婚祝いは何を買うべきですか?", "jp_b": "B: 幸運の封筒は大丈夫です。\nA: 彼は愛情を示すために少し追加しました。", "en": "younger brother gets married", "en_a": "B: My sister is about to get married.\nA: What wedding gift should I buy?", "en_b": "B: Lucky envelopes are fine.\nA: He added a little extra to show his affection.", "tag": "가족/사회"}, {"no": 986, "cat": "친구 대화", "vn": "gặp cháu trai của tôi", "vn_a": "B: Cháu mới sinh dễ thương quá.\nA: Để anh bế thử nha.", "vn_b": "B: Bế nhẹ thôi, sợ rớt.\nA: Anh sẽ là người bố tốt sau này.", "jp": "", "jp_a": "B: 生まれたばかりの赤ちゃんはとてもかわいいです。\nA: 試しに握ってみます。", "jp_b": "B: 落ちると思うので軽く持ってください。\nA: 彼は将来良い父親になるだろう。", "en": "meet my nephew", "en_a": "B: The newborn baby is so cute.\nA: Let me try holding it.", "en_b": "B: Just hold it lightly, I'm afraid it will fall.\nA: He will be a good father in the future.", "tag": "가족/사회"}, {"no": 987, "cat": "친구 대화", "vn": "bữa ăn gia đình", "vn_a": "A: Tối nay cả nhà ăn cơm chung.\nB: Em nấu món gì cho ba mẹ?", "vn_b": "A: Mẹ thích cá kho tộ.\nB: Vậy em đi chợ mua nguyên liệu.", "jp": "", "jp_a": "A: 今夜は家族全員が一緒に食事をします。\nB: 両親に何を料理しますか？", "jp_b": "A: 母は煮魚が好きです。\nB: そこで食材を買いに市場へ行きます。", "en": "family meal", "en_a": "A: Tonight the whole family eats together.\nB: What do you cook for your parents?", "en_b": "A: Mom likes braised fish.\nB: So I go to the market to buy ingredients.", "tag": "가족/사회"}, {"no": 988, "cat": "친구 대화", "vn": "Cuộc gặp gỡ đầu tiên của người thợ thủ công", "vn_a": "A: Lần đầu gặp ba em, anh hồi hộp quá.\nB: Anh cứ tự nhiên, ba dễ tính.", "vn_b": "A: Quà nên mua gì?\nB: Trà ngon là được.", "jp": "", "jp_a": "A: 初めてあなたのお父さんに会ったとき、とても緊張しました。\nB: やってもいいよ、お父さんは気楽な人だから。", "jp_b": "A: どのような贈り物を買えばいいでしょうか？\nB: 美味しいお茶はいいですね。", "en": "The first meeting of the craftsman", "en_a": "A: The first time I met your father, I was so nervous.\nB: You can go ahead, dad is easy-going.", "en_b": "A: What gift should I buy?\nB: Good tea is fine.", "tag": "가족/사회"}, {"no": 989, "cat": "친구 대화", "vn": "Chị dâu (em trai chồng)", "vn_a": "B: Em chồng em hay xét nét.\nA: Vậy à, để anh nói chuyện với nó.", "vn_b": "B: Đừng làm to chuyện, em chịu được.\nA: Em hiền quá, anh thương em.", "jp": "", "jp_a": "B: 私の夫はよく批判的です。\nA: それで、彼に話しましょう。", "jp_b": "B: 大したことは考えないでください、私は大丈夫です。\nA: あなたはとても優しいです、私はあなたを愛しています。", "en": "Sister-in-law (husband's younger brother)", "en_a": "B: My husband is often judgmental.\nA: So, let me talk to him.", "en_b": "B: Don't make a big deal out of it, I can handle it.\nA: You are so gentle, I love you.", "tag": "가족/사회"}, {"no": 990, "cat": "친구 대화", "vn": "tân gia bạn bè", "vn_a": "B: Bạn em mới mua nhà, mời tân gia.\nA: Mình mua gì làm quà?", "vn_b": "B: Cây cảnh nhỏ và bánh ngọt được không?\nA: Ý hay, vừa đẹp vừa thực tế.", "jp": "", "jp_a": "B: 私の友人は家を購入したので、新築祝いのパーティーを招待しました。\nA: 贈り物として何を買えばいいですか？", "jp_b": "B: 小さな植物やケーキは大丈夫ですか？\nA: 美しく実用的な、良いアイデアです。", "en": "housewarming friends", "en_a": "B: My friend just bought a house and invited a housewarming party.\nA: What should I buy as a gift?", "en_b": "B: Are small plants and cakes okay?\nA: Good idea, both beautiful and practical.", "tag": "가족/사회"}, {"no": 991, "cat": "친구 대화", "vn": "đoàn tụ", "vn_a": "A: Tối nay anh đi họp lớp.\nB: Có người yêu cũ anh không?", "vn_b": "A: Có thể có, nhưng anh chỉ có em thôi.\nB: Vậy em yên tâm, vui vẻ nhé.", "jp": "", "jp_a": "A: 今夜は同窓会に行きます。\nB: 元恋人はいますか？", "jp_b": "A: そうかもしれませんが、私にはあなたしかいません。\nB: だから安心して楽しんでください。", "en": "reunion", "en_a": "A: Tonight I'm going to a class reunion.\nB: Do you have an ex-lover?", "en_b": "A: Maybe yes, but I only have you.\nB: So rest assured and have fun.", "tag": "가족/사회"}, {"no": 992, "cat": "친구 대화", "vn": "Phòng trò chuyện nhóm gia đình", "vn_a": "B: Mẹ anh nhắn trong nhóm gia đình kìa.\nA: Mẹ hỏi gì em?", "vn_b": "B: Mẹ hỏi cuối tuần mình có về không.\nA: Nhắn lại là mình về tối thứ 7 nhé.", "jp": "", "jp_a": "B: あなたのお母さんが家族グループにテキストメッセージを送りました。\nA: お母さんは何を尋ねましたか？", "jp_b": "B: 母は私に今週末帰ってくるか尋ねました。\nA: メールで返信してください。土曜日の夜に戻ります。", "en": "Family group chat room", "en_a": "B: Your mother texted in the family group.\nA: What did mom ask?", "en_b": "B: Mom asked if I would come home this weekend.\nA: Text me back and I'll be back Saturday night.", "tag": "가족/사회"}, {"no": 993, "cat": "친구 대화", "vn": "ngày đôi", "vn_a": "A: Cuối tuần đi đôi với vợ chồng anh Tuấn nhé.\nB: Em chưa quen chị Tuấn.", "vn_b": "A: Chị ấy hiền lắm, em sẽ thích.\nB: Vậy mình đi nhà hàng nhé.", "jp": "", "jp_a": "A: 今週末、トゥアンさんと奥さんと一緒に行きましょう。\nB: 私はトゥアンさんのことをまだ知りません。", "jp_b": "A: 彼女はとても優しいので、気に入ると思います。\nB: それでレストランに行きましょう。", "en": "double day", "en_a": "A: Let's go with Mr. Tuan and his wife this weekend.\nB: I don't know Ms. Tuan yet.", "en_b": "A: She is very gentle, I will like it.\nB: So let's go to the restaurant.", "tag": "가족/사회"}, {"no": 994, "cat": "친구 대화", "vn": "Tư vấn về mối quan tâm của bạn bè", "vn_a": "B: Bạn em đang thất tình, em qua an ủi.\nA: Em đi đi, anh ăn tối một mình được.", "vn_b": "B: Em xin lỗi, để dịp khác bù.\nA: Bạn em quan trọng mà, không sao.", "jp": "", "jp_a": "B: 私の友人が傷心しているので、私は彼女を慰めに来ました。\nA: 行ってください、私は一人で夕食を食べることができます。", "jp_b": "B: ごめんなさい、また今度話しましょう。\nA: 友達は大事だよ、大丈夫だよ。", "en": "Advice on your friends' concerns", "en_a": "B: My friend is heartbroken, I came to comfort her.\nA: You go, I can have dinner alone.", "en_b": "B: I'm sorry, let's make up for it another time.\nA: Your friend is important, it's okay.", "tag": "가족/사회"}, {"no": 995, "cat": "친구 대화", "vn": "Tiệc sinh nhật đầu tiên của cháu trai", "vn_a": "A: Mai dự thôi nôi cháu anh.\nB: Mình tặng vàng được không?", "vn_b": "A: Một chỉ vàng là phong tục rồi.\nB: Em đi tiệm vàng đặt liền.", "jp": "", "jp_a": "A: 明日、孫を出産する予定です。\nB: ゴールドをあげてもいいですか？", "jp_b": "A: ゴールドのテールが 1 つあるのが習慣です。\nB: 早速金買取店に行って注文しました。", "en": "Grandson's first birthday party", "en_a": "A: Tomorrow, I'm planning on giving birth to my grandchild.\nB: Can I give you gold?", "en_b": "A: One tael of gold is the custom.\nB: I went to the gold store to order immediately.", "tag": "가족/사회"}, {"no": 996, "cat": "친구 대화", "vn": "nụ hôn đầu tiên", "vn_a": "B: Lần đầu mình hôn nhau anh nhớ không?\nA: Nhớ chứ, dưới mưa đó.", "vn_b": "B: Tim em đập loạn xạ.\nA: Anh cũng vậy, đó là khoảnh khắc đẹp nhất.", "jp": "", "jp_a": "B: 私たちが初めてキスしたときのことを覚えていますか?\nA: 雨の中でも覚えておいてください。", "jp_b": "B: 心臓が高鳴ります。\nA: 私も、それが最も美しい瞬間でした。", "en": "first kiss", "en_a": "B: Do you remember the first time we kissed?\nA: Remember, in the rain.", "en_b": "B: My heart beats wildly.\nA: Me too, that was the most beautiful moment.", "tag": "특별한 순간"}, {"no": 997, "cat": "친구 대화", "vn": "lời tỏ tình đầu tiên", "vn_a": "A: Em nhớ ngày anh tỏ tình không?\nB: Anh run đến nỗi không nói được.", "vn_b": "A: Anh sợ em từ chối.\nB: May mà em đồng ý.", "jp": "", "jp_a": "A: 私が愛を告白した日のことを覚えていますか?\nB: 彼は話すことができないほど震えていた。", "jp_b": "A: 断られるのではないかと思います。\nB: 幸いにも私は同意します。", "en": "first love confession", "en_a": "A: Do you remember the day I confessed my love?\nB: He was shaking so much that he couldn't speak.", "en_b": "A: I'm afraid you'll refuse.\nB: Luckily I agree.", "tag": "특별한 순간"}, {"no": 998, "cat": "친구 대화", "vn": "Hòa giải sau lần cãi vã đầu tiên", "vn_a": "B: Lần cãi nhau đầu tiên, em đã khóc nhiều.\nA: Anh hối hận lắm, đến tận nhà em.", "vn_b": "B: Anh đứng ngoài cửa hai tiếng đồng hồ.\nA: Vì anh không thể mất em.", "jp": "", "jp_a": "B: 初めて口論したとき、私は大泣きしました。\nA: とても後悔しているので、あなたの家に来ました。", "jp_b": "B: 彼はドアの外に2時間立っていた。\nA: あなたを失うわけにはいかないから。", "en": "Reconciliation after the first argument", "en_a": "B: The first time we argued, I cried a lot.\nA: I regret it so much, I came to your house.", "en_b": "B: He stood outside the door for two hours.\nA: Because I can't lose you.", "tag": "특별한 순간"}, {"no": 999, "cat": "친구 대화", "vn": "bữa tiệc bất ngờ", "vn_a": "B: Trời ơi, sao mọi người đều ở đây?\nA: Sinh nhật em mà, anh chuẩn bị bí mật.", "vn_b": "B: Em cảm động đến rơi nước mắt.\nA: Anh muốn em là người hạnh phúc nhất hôm nay.", "jp": "", "jp_a": "B: ああ、なんてことだ、どうしてみんなここにいるの？\nA: あなたの誕生日なので、こっそり用意しました。", "jp_b": "B: 私は感動して涙が出ました。\nA: 今日はあなたが一番幸せな人になってほしいです。", "en": "surprise party", "en_a": "B: Oh my god, why is everyone here?\nA: It's your birthday, I prepared it secretly.", "en_b": "B: I was moved to tears.\nA: I want you to be the happiest person today.", "tag": "특별한 순간"}, {"no": 1000, "cat": "친구 대화", "vn": "sinh con", "vn_a": "B: Em đau quá anh ơi!\nA: Cố lên em, anh ở bên em.", "vn_b": "B: Con mình ra rồi anh!\nA: Cảm ơn em đã sinh con cho anh.", "jp": "", "jp_a": "B: すごく痛いんです、おい！\nA: さあ、ベイビー、私はあなたと一緒です。", "jp_b": "B: 私の赤ちゃんが出てきました！\nA: 私の子を産んでくれてありがとう。", "en": "give birth", "en_a": "B: I'm in so much pain, man!\nA: Come on baby, I'm with you.", "en_b": "B: My baby is out!\nA: Thank you for giving birth to my child.", "tag": "특별한 순간"}, {"no": 1001, "cat": "친구 대화", "vn": "Trồng cây trồng trong chậu", "vn_a": "B: Cây xanh nhà mình héo rồi anh.\nA: Em quên tưới nước hả?", "vn_b": "B: Em bận quá, anh giúp em chăm sóc.\nA: Để anh tưới mỗi sáng cho.", "jp": "", "jp_a": "B: 我が家の緑の植物が枯れてしまいました。\nA: 水やりを忘れましたか？", "jp_b": "B: あなたはとても忙しいので、私が手伝ってあげるよ。\nA: 毎朝水やりをさせてください。", "en": "Grow potted plants", "en_a": "B: My house's green plants have withered.\nA: Did you forget to water?", "en_b": "B: You're so busy, I'll help you take care of it.\nA: Let me water it every morning.", "tag": "일상생활"}, {"no": 1002, "cat": "친구 대화", "vn": "đọc tạp chí", "vn_a": "A: Em đang đọc gì vậy?\nB: Tạp chí thời trang, bài về xu hướng năm nay.", "vn_b": "A: Em mê thời trang dữ vậy.\nB: Phụ nữ mà, anh hiểu đi.", "jp": "", "jp_a": "A: 何を読んでいますか？\nB: ファッション雑誌、今年のトレンドに関する記事。", "jp_b": "A: ファッションがとても大好きです。\nB: 女性の皆さん、わかりますね。", "en": "read magazines", "en_a": "A: What are you reading?\nB: Fashion magazine, article about this year's trends.", "en_b": "A: I love fashion so much.\nB: Women, you understand.", "tag": "일상생활"}, {"no": 1003, "cat": "친구 대화", "vn": "dọn giường", "vn_a": "B: Anh ơi, dọn giường giúp em.\nA: Anh dọn rồi, em xem có ngay ngắn không.", "vn_b": "B: Gối lệch rồi, sửa lại đi.\nA: Em khó tính ghê.", "jp": "", "jp_a": "B: ハニー、ベッドメイキングを手伝ってください。\nA: 掃除はしたので、きれいかどうか見てみましょう。", "jp_b": "B: 枕がずれているので直してください。\nA: とても難しいです。", "en": "make the bed", "en_a": "B: Honey, help me make my bed.\nA: I've cleaned it up, let's see if it's neat.", "en_b": "B: The pillow is misaligned, please fix it.\nA: I'm so difficult.", "tag": "일상생활"}, {"no": 1004, "cat": "친구 대화", "vn": "quay nhà vệ sinh", "vn_a": "B: Anh tắm lâu quá, em chờ hoài.\nA: Anh ra liền đây.", "vn_b": "B: Sao đàn ông tắm còn lâu hơn phụ nữ?\nA: Vì anh muốn thơm cho em.", "jp": "", "jp_a": "B: シャワーを浴びるのに時間がかかりすぎたので、私は永遠に待ちました。\nA: すぐに行きます。", "jp_b": "B: なぜ男性は女性よりもシャワーに時間がかかるのでしょうか?\nA: いい匂いを嗅ぎたいから。", "en": "spin the toilet", "en_a": "B: You took too long to shower, I waited forever.\nA: I'll be right out here.", "en_b": "B: Why do men take longer to shower than women?\nA: Because I want to smell good for you.", "tag": "일상생활"}, {"no": 1005, "cat": "친구 대화", "vn": "Mối quan tâm về thực đơn bữa tối", "vn_a": "A: Tối nay ăn gì hả em?\nB: Em hết ý tưởng rồi, anh quyết đi.", "vn_b": "A: Mì gói được không?\nB: Lại mì gói nữa hả!", "jp": "", "jp_a": "A: 今夜は何を食べましょうか？\nB: アイデアが尽きました、あなたが決めてください。", "jp_b": "A: インスタントラーメンは入手できますか？\nB: またしてもインスタントラーメン！", "en": "Concerns about the dinner menu", "en_a": "A: What to eat tonight?\nB: I'm out of ideas, you decide.", "en_b": "A: Can instant noodles be available?\nB: Instant noodles again!", "tag": "일상생활"}, {"no": 1006, "cat": "친구 대화", "vn": "kính bị mất", "vn_a": "B: Em không tìm thấy kính của em đâu cả.\nA: Em đang đeo trên đầu kìa.", "vn_b": "B: Trời, em đãng trí quá.\nA: Em yêu anh quá nên mất tập trung.", "jp": "", "jp_a": "B: メガネがどこにも見つかりません。\nA: 頭にかぶってます。", "jp_b": "B: 神様、私はとてもぼんやりしています。\nA: 好きすぎて集中力が途切れてしまいます。", "en": "lost glasses", "en_a": "B: I can't find my glasses anywhere.\nA: I'm wearing it on my head.", "en_b": "B: God, I'm so absent-minded.\nA: I love you so much that I lose focus.", "tag": "일상생활"}, {"no": 1007, "cat": "친구 대화", "vn": "Sắp xếp tủ quần áo của bạn", "vn_a": "B: Tủ quần áo lộn xộn quá, mình dọn đi.\nA: Em ơi, sao nhiều áo thế?", "vn_b": "B: Áo nào em cũng cần mà.\nA: Vậy thì sắp xếp theo màu nhé.", "jp": "", "jp_a": "B: 洋服ダンスがとても散らかっているので、掃除します。\nA: ハニー、なぜそんなにシャツが多いのですか？", "jp_b": "B: どんなシャツでも必要です。\nA: 次に色ごとに分類します。", "en": "Organize your wardrobe", "en_a": "B: The wardrobe is so messy, I'll clean it out.\nA: Honey, why so many shirts?", "en_b": "B: I need any shirt.\nA: Then sort by color.", "tag": "일상생활"}, {"no": 1008, "cat": "친구 대화", "vn": "sắp xếp ảnh", "vn_a": "A: Mình lưu hình lại trên Cloud nhé.\nB: Nhiều ảnh đôi mình quá!", "vn_b": "A: Hơn 5 năm rồi mà.\nB: In ra làm album đi anh.", "jp": "", "jp_a": "A: 画像をクラウド上に保存させていただきます。\nB: 一緒に写った写真がたくさん！", "jp_b": "A: 5年以上経ちました。\nB: プリントアウトしてアルバムを作りましょう。", "en": "arrange photos", "en_a": "A: I will save the image on the Cloud.\nB: So many pictures of us together!", "en_b": "A: It's been more than 5 years.\nB: Print it out and make an album.", "tag": "일상생활"}, {"no": 1009, "cat": "친구 대화", "vn": "Sự cố thiết bị gia dụng", "vn_a": "B: Tủ lạnh hư rồi anh, không lạnh nữa.\nA: Để anh gọi thợ sửa.", "vn_b": "B: Đồ ăn hỏng hết mất.\nA: Mình ra ăn ngoài rồi mua tủ mới đi.", "jp": "", "jp_a": "B: 冷蔵庫が壊れたので、もう冷たくない。\nA: 修理業者を呼びましょう。", "jp_b": "B: 食べ物はすべて腐ってしまいました。\nA: 食事に行って、それから新しいワードローブを買いましょう。", "en": "Home appliance problems", "en_a": "B: The refrigerator is broken, it's not cold anymore.\nA: Let me call a repairman.", "en_b": "B: The food is all spoiled.\nA: Let's go out to eat and then buy a new wardrobe.", "tag": "일상생활"}, {"no": 1010, "cat": "친구 대화", "vn": "Đi đến hiệu thuốc", "vn_a": "A: Em đi cùng anh ra hiệu thuốc.\nB: Anh không khỏe à?", "vn_b": "A: Anh muốn mua thuốc cảm.\nB: Em đi cùng để chọn thuốc tốt.", "jp": "", "jp_a": "A: 薬局まで一緒に行きます。\nB: 体調が悪いですか？", "jp_b": "A: 風邪薬を買いたいです。\nB: 良い薬を選ぶために私も一緒に行きます。", "en": "Go to the pharmacy", "en_a": "A: I'll go with you to the pharmacy.\nB: Are you unwell?", "en_b": "A: I want to buy cold medicine.\nB: I'll go with you to choose good medicine.", "tag": "일상생활"}, {"no": 1011, "cat": "친구 대화", "vn": "chia sẻ một chiếc ô", "vn_a": "B: Anh che ô cho em đi.\nA: Em bị ướt vai rồi.", "vn_b": "B: Anh nghiêng về phía em.\nA: Anh ướt cũng được, miễn em không ướt.", "jp": "", "jp_a": "B: 傘をかぶせてください。\nA: 肩が濡れています。", "jp_b": "B: 私はあなたに寄りかかります。\nA: 私が濡れても大丈夫です、あなたが濡れていない限り。", "en": "share an umbrella", "en_a": "B: Please cover the umbrella for me.\nA: My shoulder is wet.", "en_b": "B: I lean towards you.\nA: It's okay if I'm wet, as long as you're not wet.", "tag": "일상생활"}, {"no": 1012, "cat": "친구 대화", "vn": "nghe nhạc", "vn_a": "B: Anh nghe nhạc gì vậy?\nA: Bài cũ thời mình mới quen.", "vn_b": "B: Nhớ ghê, hồi đó anh hay hát cho em nghe.\nA: Bây giờ anh vẫn hát được mà.", "jp": "", "jp_a": "B: どんな音楽を聴きますか?\nA: 古い曲ですが、慣れてきました。", "jp_b": "B: よく覚えています、あの頃、あなたはよく私に歌ってくれました。\nA: 今でも彼は歌うことができます。", "en": "listening to music", "en_a": "B: What music do you listen to?\nA: Old song, I just got used to it.", "en_b": "B: I remember so much, back then you used to sing to me.\nA: Now he can still sing.", "tag": "일상생활"}, {"no": 1013, "cat": "친구 대화", "vn": "cắt tóc", "vn_a": "B: Anh đi cắt tóc nhé, dài quá rồi.\nA: Em đi cùng và chọn kiểu cho anh nha.", "vn_b": "B: Anh để tóc kiểu Hàn Quốc đi.\nA: Em muốn anh giống idol à?", "jp": "", "jp_a": "B: 髪を切りに行きなさい、長すぎるよ。\nA: 私はあなたと一緒に来て、あなたに合ったスタイルを選びます。", "jp_b": "B: 髪型は韓国風にすべきです。\nA: アイドルみたいになってほしいですか？", "en": "hair cutting", "en_a": "B: Go get your hair cut, it's too long.\nA: I'll come with you and choose a style for you.", "en_b": "B: You should wear your hair Korean style.\nA: Do you want me to be like an idol?", "tag": "일상생활"}, {"no": 1014, "cat": "친구 대화", "vn": "ghi chú", "vn_a": "A: Em để giấy gì trên bàn anh vậy?\nB: Lời nhắn yêu thương cho anh.", "vn_b": "A: \"Anh là cả thế giới của em\" - ngọt thật.\nB: Em nhớ anh khi anh đi làm.", "jp": "", "jp_a": "A: 私の机の上に置いた紙は何ですか?\nB: あなたへの愛のメッセージ。", "jp_b": "A: 「あなたは私の世界のすべてです」 - とても素敵です。\nB: 仕事に行くと寂しいです。", "en": "note", "en_a": "A: What paper did you leave on my desk?\nB: Love message for you.", "en_b": "A: \"You are my whole world\" - so sweet.\nB: I miss you when you go to work.", "tag": "애정 표현"}, {"no": 1015, "cat": "친구 대화", "vn": "Nhìn bạn ngủ", "vn_a": "B: Hồi nãy anh ngắm em ngủ à?\nA: Em ngủ dễ thương lắm.", "vn_b": "B: Em mở miệng à?\nA: Có tí, mà em vẫn xinh.", "jp": "", "jp_a": "B: 今私が寝ているのを見ていましたか？\nA: とてもかわいく寝ていますね。", "jp_b": "B: 口を開けますか？\nA: ほんの少しですが、それでもあなたは美しいです。", "en": "Watching you sleep", "en_a": "B: Did you watch me sleep just now?\nA: You sleep so cutely.", "en_b": "B: Do you open your mouth?\nA: A little, but you're still beautiful.", "tag": "애정 표현"}, {"no": 1016, "cat": "친구 대화", "vn": "quà tặng nước hoa", "vn_a": "A: Anh tặng em chai nước hoa này.\nB: Mùi hương anh thích à?", "vn_b": "A: Đúng rồi, hoa lài, dịu dàng giống em.\nB: Em sẽ xịt mỗi ngày.", "jp": "", "jp_a": "A: 私はあなたにこの香水のボトルをあげました。\nB: 好きな香りは？", "jp_b": "A: そうだよ、ジャスミン、君みたいに優しいよ。\nB: 毎日スプレーしてみます。", "en": "perfume gifts", "en_a": "A: I gave you this bottle of perfume.\nB: The scent you like?", "en_b": "A: That's right, jasmine, gentle like you.\nB: I will spray every day.", "tag": "애정 표현"}, {"no": 1017, "cat": "친구 대화", "vn": "cống hiến bài hát", "vn_a": "B: Anh ơi, hát bài \"Em là của anh\" cho em đi.\nA: Anh hát dở lắm.", "vn_b": "B: Em không quan tâm, em chỉ muốn nghe anh thôi.\nA: Vậy được, em đừng cười anh nha.", "jp": "", "jp_a": "B: ハニー、私のために「I'm yours」の歌を歌ってください。\nA: 彼は歌うのがとても下手です。", "jp_b": "B: 気にしない、ただ話を聞きたいだけだ。\nA: さて、それでは笑わないでください。", "en": "dedicate song", "en_a": "B: Honey, sing the song \"I'm yours\" for me.\nA: He sings very badly.", "en_b": "B: I don't care, I just want to hear you.\nA: Okay then, don't laugh at me.", "tag": "애정 표현"}, {"no": 1018, "cat": "친구 대화", "vn": "Tạo biệt hiệu", "vn_a": "A: Anh đặt biệt danh cho em là \"Cún con\" nhé.\nB: Sao là cún con?", "vn_b": "A: Vì em hay nũng nịu, đáng yêu.\nB: Vậy anh là \"Mèo Mun\" của em.", "jp": "", "jp_a": "A: 「子犬」というあだ名をつけさせていただきます。\nB: なぜ子犬なのか？", "jp_b": "A: だってあなたはとても内気で愛らしいから。\nB: だから私はあなたの「黒檀の猫」です。", "en": "Create a nickname", "en_a": "A: I'll nickname you \"Puppy\".\nB: Why puppy?", "en_b": "A: Because you are so coy and adorable.\nB: So I'm your \"Ebony Cat\".", "tag": "애정 표현"}, {"no": 1019, "cat": "친구 대화", "vn": "Thăm một nơi đáng nhớ", "vn_a": "B: Mình đến lại quán cà phê đầu tiên đi.\nA: Quán còn không em?", "vn_b": "B: Còn đó, em đi qua tuần trước.\nA: Vậy chiều mai mình đi.", "jp": "", "jp_a": "B: 最初の喫茶店に戻りましょう。\nA: お店はまだありますか？", "jp_b": "B: そして先週通りかかったところです。\nA: ということで、明日の午後に行きます。", "en": "Visit a memorable place", "en_a": "B: Let's go back to the first coffee shop.\nA: Is the shop still available?", "en_b": "B: And there, I passed by last week.\nA: So I'll go tomorrow afternoon.", "tag": "애정 표현"}, {"no": 1020, "cat": "친구 대화", "vn": "đan xen các ngón tay", "vn_a": "A: Đan tay anh đi em.\nB: Tay anh to, ngón em nhỏ.", "vn_b": "A: Vừa khít với em mà.\nB: Đúng là dành cho nhau.", "jp": "", "jp_a": "A: 私の手を握ってください、ハニー。\nB: あなたの手は大きいですが、私の指は小さいです。", "jp_b": "A: 私にぴったりです。\nB: 本当にお互いのために作られました。", "en": "Interlace your fingers", "en_a": "A: Hold my hand, honey.\nB: Your hands are big, my fingers are small.", "en_b": "A: Fits me perfectly.\nB: Truly made for each other.", "tag": "애정 표현"}, {"no": 1021, "cat": "친구 대화", "vn": "tư thế ngủ chung", "vn_a": "B: Em thích ngủ áp vào ngực anh.\nA: Tim anh đập to lắm, em không khó ngủ à?", "vn_b": "B: Tiếng tim anh là bài hát ru em.\nA: Em ngọt ghê.", "jp": "", "jp_a": "B: 私はあなたの胸に寄りかかって寝るのが好きです。\nA: 心臓の鼓動がすごくうるさくて、眠れなくないですか？", "jp_b": "B: 私の心の音はあなたの子守唄です。\nA: あなたはとても優しいです。", "en": "common sleeping position", "en_a": "B: I like sleeping against your chest.\nA: My heart is beating so loudly, don't you have trouble sleeping?", "en_b": "B: The sound of my heart is your lullaby.\nA: You're so sweet.", "tag": "애정 표현"}, {"no": 1022, "cat": "친구 대화", "vn": "giao tiếp bằng mắt", "vn_a": "A: Em nhìn anh đi, đừng quay đi.\nB: Em thấy ngại lắm.", "vn_b": "A: Mắt em đẹp như sao trời.\nB: Anh nịnh hoài, em quen rồi.", "jp": "", "jp_a": "A: 私を見て、目を逸らさないでください。\nB: とても恥ずかしがります。", "jp_b": "A: あなたの目は星のように美しいです。\nB: あなたはいつも私にお世辞を言います、私はそれに慣れています。", "en": "eye contact", "en_a": "A: Look at me, don't look away.\nB: I feel very shy.", "en_b": "A: Your eyes are as beautiful as the stars.\nB: You flatter me all the time, I'm used to it.", "tag": "애정 표현"}, {"no": 1023, "cat": "친구 대화", "vn": "chia sẻ sự ấm áp", "vn_a": "B: Tay em lạnh quá, anh hơ tay cho em đi.\nA: Tay em lạnh nhưng tim em ấm là được.", "vn_b": "B: Anh là máy sưởi của em.\nA: Mãi mãi là máy sưởi của em.", "jp": "", "jp_a": "B: 私の手はとても冷たいので、温めてください。\nA: 手は冷たいけど心は温かい。", "jp_b": "B: あなたは私のヒーターです。\nA: 永遠に私のヒーター。", "en": "Share the warmth", "en_a": "B: My hands are so cold, please warm them for me.\nA: My hands are cold but my heart is warm.", "en_b": "B: You are my heater.\nA: Forever my heater.", "tag": "애정 표현"}, {"no": 1024, "cat": "친구 대화", "vn": "trải nghiệm làm gốm", "vn_a": "B: Lớp học làm gốm này thú vị quá.\nA: Em làm chiếc cốc này à?", "vn_b": "B: Vâng, em làm cho anh đó.\nA: Anh sẽ uống cà phê bằng cốc này mỗi ngày.", "jp": "", "jp_a": "B: この陶芸教室はとても面白いです。\nA: このカップはあなたが作りましたか？", "jp_b": "B: はい、やってみます。\nA: 私は毎日このカップでコーヒーを飲みます。", "en": "pottery making experience", "en_a": "B: This pottery class is so interesting.\nA: Did you make this cup?", "en_b": "B: Yes, I'll do it for you.\nA: I will drink coffee from this cup every day.", "tag": "데이트"}, {"no": 1025, "cat": "친구 대화", "vn": "lớp học nấu ăn", "vn_a": "A: Mình học làm sushi cùng nhau nhé.\nB: Em vụng dao kéo lắm.", "vn_b": "A: Anh sẽ cầm tay chỉ em.\nB: Vậy thì em đi học liền.", "jp": "", "jp_a": "A: 一緒にお寿司の作り方を学びましょう。\nB: 私は刃物を扱うのがとても不器用です。", "jp_b": "A: 手を握って見せてあげるよ。\nB: それからすぐに学校に行きます。", "en": "cooking class", "en_a": "A: Let's learn to make sushi together.\nB: I'm very clumsy with cutlery.", "en_b": "A: I will hold your hand and show you.\nB: Then I go to school right away.", "tag": "데이트"}, {"no": 1026, "cat": "친구 대화", "vn": "nếm rượu vang", "vn_a": "B: Em chưa uống vang bao giờ.\nA: Bắt đầu với loại nhẹ nhé, vang trắng.", "vn_b": "B: Thơm thật, anh chọn giỏi quá.\nA: Mỗi ngày uống chút sẽ tốt cho tim.", "jp": "", "jp_a": "B: 私はワインを飲んだことがありません。\nA: まずは軽い白ワインから始めましょう。", "jp_b": "B: とても美味しいです、よく選びましたね。\nA: 毎日少しずつ飲むと心臓に良いそうです。", "en": "wine tasting", "en_a": "B: I have never drank wine.\nA: Let's start with something light, white wine.", "en_b": "B: It's so delicious, you chose so well.\nA: Drinking a little every day is good for the heart.", "tag": "데이트"}, {"no": 1027, "cat": "친구 대화", "vn": "spa ngâm chân", "vn_a": "B: Mỏi chân quá, mình đi ngâm chân thư giãn nhé.\nA: Để anh đặt suất cho hai người.", "vn_b": "B: Anh tốt thật, biết em mệt.\nA: Mỗi tuần đưa em đi một lần nha.", "jp": "", "jp_a": "B: 足がとても疲れたので、足湯に入ってリラックスしましょう。\nA: 2人で予約させてください。", "jp_b": "B: あなたはとても優しいので、私が疲れていることを知っています。\nA: 週に一度は外に連れて行ってください。", "en": "foot spa", "en_a": "B: My feet are so tired, let's go take a foot bath to relax.\nA: Let me book a reservation for two people.", "en_b": "B: You're so kind, you know I'm tired.\nA: Take me out once a week.", "tag": "데이트"}, {"no": 1028, "cat": "친구 대화", "vn": "leo núi", "vn_a": "A: Mình leo Bà Đen nhé, view tuyệt đẹp.\nB: Em sợ cao lắm.", "vn_b": "A: Có anh, đừng sợ.\nB: Vậy mình lên cáp treo nha.", "jp": "", "jp_a": "A: Ba Denに登ってみましょう。景色は美しいです。\nB: 背が高いのが怖い。", "jp_b": "A: 私にはあなたがいます、恐れることはありません。\nB: それでは、ケーブルカーに乗りましょう。", "en": "climbing", "en_a": "A: Let's climb Ba Den, the view is beautiful.\nB: I'm afraid of being tall.", "en_b": "A: I have you, don't be afraid.\nB: So let's get on the cable car.", "tag": "데이트"}, {"no": 1029, "cat": "친구 대화", "vn": "thuyền kayak", "vn_a": "B: Em chèo thuyền kayak được không nhỉ?\nA: Em chèo bên trái, anh bên phải.", "vn_b": "B: Mình lệch hướng rồi anh!\nA: Hợp tác đi em, đừng vẫy lung tung.", "jp": "", "jp_a": "B: カヤックはできますか？\nA: あなたは左で漕ぎ、私は右で漕ぎます。", "jp_b": "B: 脱線してしまいました！\nA: 協力してください、振り回さないでください。", "en": "kayak", "en_a": "B: Can I kayak?\nA: You row on the left, I row on the right.", "en_b": "B: I'm off track!\nA: Cooperate, don't wave around.", "tag": "데이트"}, {"no": 1030, "cat": "친구 대화", "vn": "thăm chùa", "vn_a": "A: Mình đi chùa cầu duyên nhé.\nB: Mình đã có duyên rồi mà.", "vn_b": "A: Cầu cho duyên mãi bền chặt.\nB: Anh ngọt thật, em theo anh.", "jp": "", "jp_a": "A: 神社に行って愛を祈りましょう。\nB: 私にはすでに運命があります。", "jp_b": "A: 愛が永遠に続くように祈ってください。\nB: あなたはとても優しいので、フォローします。", "en": "visit the temple", "en_a": "A: Let's go to the temple to pray for love.\nB: I already have fate.", "en_b": "A: Pray for love to last forever.\nB: You're so sweet, I'll follow you.", "tag": "데이트"}, {"no": 1031, "cat": "친구 대화", "vn": "đi dạo đêm", "vn_a": "B: Đi bộ tối lãng mạn ghê.\nA: Khuya rồi, em không sợ à?", "vn_b": "B: Có anh, em không sợ gì hết.\nA: Anh ôm em chặt nha.", "jp": "", "jp_a": "B: 夜の散歩はとてもロマンチックです。\nA: もう遅いよ、怖くない？", "jp_b": "B: あなたがいれば、何も怖くない。\nA: ぎゅっと抱きしめてください。", "en": "night walk", "en_a": "B: Walking at night is so romantic.\nA: It's late, aren't you scared?", "en_b": "B: With you, I'm not afraid of anything.\nA: Please hug me tightly.", "tag": "데이트"}, {"no": 1032, "cat": "친구 대화", "vn": "Xem biểu diễn đường phố", "vn_a": "A: Anh nghệ sĩ đường phố hát hay quá.\nB: Mình bỏ tiền vào hộp đàn nhé.", "vn_b": "A: Em hào phóng quá.\nB: Tài năng phải được ủng hộ chứ.", "jp": "", "jp_a": "A: そのストリートアーティストはとても上手に歌います。\nB: ピアノの箱にお金を入れておきます。", "jp_b": "A: あなたはとても寛大です。\nB: 才能はサポートされなければなりません。", "en": "Watch street performances", "en_a": "A: The street artist sings so well.\nB: I'll put the money in the piano box.", "en_b": "A: You're so generous.\nB: Talent must be supported.", "tag": "데이트"}, {"no": 1033, "cat": "친구 대화", "vn": "chợ trời", "vn_a": "B: Anh xem chiếc nón cũ này dễ thương ghê.\nA: Em mua đi, hợp với em đó.", "vn_b": "B: Có 50 nghìn thôi, rẻ quá.\nA: Em mặc cả thử xem.", "jp": "", "jp_a": "B: この古い帽子を見てください、とてもかわいいです。\nA: 買ってください、それはあなたに合います。", "jp_b": "B: たったの5万ですから安いですね。\nA: 試してみます。", "en": "flea market", "en_a": "B: Look at this old hat, it's so cute.\nA: Buy it, it suits you.", "en_b": "B: It's only 50 thousand, so cheap.\nA: I'll give it a try and see.", "tag": "데이트"}, {"no": 1034, "cat": "친구 대화", "vn": "liên hoan phim", "vn_a": "A: Liên hoan phim sắp khai mạc rồi.\nB: Anh đặt vé chưa?", "vn_b": "A: Đặt rồi, ghế hàng B.\nB: Mình đi sớm để chụp ảnh thảm đỏ nhé.", "jp": "", "jp_a": "A: 映画祭がもうすぐ開幕します。\nB: チケットはもう予約しましたか？", "jp_b": "A: 予約済み、席はB列です。\nB: レッドカーペットの写真を撮りに早めに行きましょう。", "en": "film festival", "en_a": "A: The film festival is about to open.\nB: Have you booked your tickets yet?", "en_b": "A: Booked, seat row B.\nB: Let's go early to take red carpet photos.", "tag": "데이트"}, {"no": 1035, "cat": "친구 대화", "vn": "lái xe", "vn_a": "B: Mình lái xe ra ngoại ô đi.\nA: Em chọn nhạc trong xe nhé.", "vn_b": "B: Em mở list bài tủ của anh.\nA: Em hiểu anh ghê.", "jp": "", "jp_a": "B: 郊外まで車で行きましょう。\nA: 車内の音楽をお選びください。", "jp_b": "B: プレイリストを開いてみました。\nA: あなたの気持ちはよくわかります。", "en": "drive", "en_a": "B: Let's drive to the suburbs.\nA: Please choose the music in the car.", "en_b": "B: I opened your playlist.\nA: I understand you very well.", "tag": "데이트"}, {"no": 1036, "cat": "친구 대화", "vn": "Thích SNS", "vn_a": "B: Anh thả tim ảnh cô đó à?\nA: Bạn cũ thôi, vô tình bấm.", "vn_b": "B: Em không thích đâu.\nA: Anh hủy liền đây.", "jp": "", "jp_a": "B: 彼女の写真に興味を持ちましたか?\nA: 古い友人が偶然クリックしてしまいました。", "jp_b": "B: 私はそれが気に入りません。\nA: 今すぐキャンセルします。", "en": "Like SNS", "en_a": "B: Did you heart that photo of her?\nA: Just an old friend, accidentally clicked.", "en_b": "B: I don't like it.\nA: I'll cancel right now.", "tag": "갈등/화해"}, {"no": 1037, "cat": "친구 대화", "vn": "Tôi không giữ thời gian", "vn_a": "B: Hẹn 7 giờ mà giờ 8 giờ rồi!\nA: Anh xin lỗi, có việc gấp công ty.", "vn_b": "B: Lúc nào cũng có việc!\nA: Anh sẽ điều chỉnh thời gian biểu.", "jp": "", "jp_a": "B: 約束は7時だったのに、もう8時になってしまいました！\nA: 申し訳ありませんが、会社に急な用事がありまして。", "jp_b": "B: 常に仕事があるのです！\nA: スケジュールを調整させていただきます。", "en": "I don't keep time", "en_a": "B: Appointment was 7 o'clock but now it's 8 o'clock!\nA: I'm sorry, I have urgent company business.", "en_b": "B: There's always work!\nA: I will adjust the schedule.", "tag": "갈등/화해"}, {"no": 1038, "cat": "친구 대화", "vn": "thức ăn thừa", "vn_a": "A: Em sao bỏ thừa nhiều thế?\nB: Em no rồi, ăn không nổi.", "vn_b": "A: Lãng phí lắm.\nB: Lần sau em gọi ít hơn.", "jp": "", "jp_a": "A: どうしてそんなに食べ残しを残すのですか？\nB: お腹がいっぱいで食べられない。", "jp_b": "A: なんとももったいない。\nB: 次回からは電話の回数を減らします。", "en": "leftover food", "en_a": "A: Why do you leave so much leftover?\nB: I'm full, I can't eat.", "en_b": "A: What a waste.\nB: Next time I'll call less.", "tag": "갈등/화해"}, {"no": 1039, "cat": "친구 대화", "vn": "không dọn dẹp", "vn_a": "B: Phòng anh bừa bộn quá!\nA: Anh bận lắm, không có thời gian.", "vn_b": "B: Anh thuê người dọn đi.\nA: Em nói đúng, anh sẽ tự dọn cuối tuần.", "jp": "", "jp_a": "B: あなたの部屋はとても汚いです！\nA: とても忙しいので時間がありません。", "jp_b": "B: 彼は引っ越しのために人を雇った。\nA: そうです、今週末自分で掃除します。", "en": "no cleaning", "en_a": "B: Your room is so messy!\nA: I'm so busy, I don't have time.", "en_b": "B: He hired someone to move out.\nA: You're right, I'll clean it up myself this weekend.", "tag": "갈등/화해"}, {"no": 1040, "cat": "친구 대화", "vn": "ngủ quên", "vn_a": "B: Anh dậy đi, 11 giờ rồi!\nA: Cuối tuần mà, cho anh ngủ thêm.", "vn_b": "B: Mình hẹn ăn trưa với gia đình em mà!\nA: Trời ơi, anh quên!", "jp": "", "jp_a": "B: 起きて、もう11時だよ！\nA: 週末だ、もっと寝させてください。", "jp_b": "B: ご家族でランチデートしてきました！\nA: ああ、なんてことだ、忘れてた！", "en": "overslept", "en_a": "B: Wake up, it's 11 o'clock!\nA: It's the weekend, let me sleep more.", "en_b": "B: I have a lunch date with your family!\nA: Oh my god, I forgot!", "tag": "갈등/화해"}, {"no": 1041, "cat": "친구 대화", "vn": "làm việc trước", "vn_a": "B: Anh ăn tối với em đi, đừng làm việc nữa.\nA: Anh phải gửi báo cáo trước 10 giờ.", "vn_b": "B: Sức khỏe quan trọng hơn.\nA: Em đúng, anh tạm dừng đây.", "jp": "", "jp_a": "B: 一緒に夕食を食べに来てください、もう仕事はしないでください。\nA: レポートは10時までに提出しなければなりません。", "jp_b": "B: 健康はもっと大切です。\nA: そうですね、今回はここでやめておきます。", "en": "work first", "en_a": "B: Come have dinner with me, don't work anymore.\nA: You must submit the report before 10 o'clock.", "en_b": "B: Health is more important.\nA: You're right, I'll stop here for now.", "tag": "갈등/화해"}, {"no": 1042, "cat": "친구 대화", "vn": "Không trả lời điện thoại", "vn_a": "B: Sao anh không nghe điện thoại em?\nA: Anh đang họp nên để chế độ im lặng.", "vn_b": "B: Em lo cho anh muốn chết.\nA: Lần sau anh nhắn tin trước.", "jp": "", "jp_a": "B: なぜ私の電話に出てくれないのですか？\nA: 会議中なのでマナーモードにしています。", "jp_b": "B: 私はあなたのことが死ぬほど心配です。\nA: 次回からは最初にテキストを送信します。", "en": "Don't answer the phone", "en_a": "B: Why don't you answer my phone?\nA: I'm in a meeting so I'm on silent mode.", "en_b": "B: I'm worried about you to death.\nA: Next time, text first.", "tag": "갈등/화해"}, {"no": 1043, "cat": "친구 대화", "vn": "lái xe buồn ngủ", "vn_a": "B: Anh có buồn ngủ không, để em lái thay.\nA: Anh tỉnh mà.", "vn_b": "B: Mắt anh sụp xuống rồi kìa.\nA: Vậy thôi, mình dừng nghỉ chút.", "jp": "", "jp_a": "B: 眠いですか？代わりに私が運転させてください。\nA: 起きていますね。", "jp_b": "B: 目が垂れ下がっていますね。\nA: それはそれです、私は立ち止まって少し休憩します。", "en": "Drowsy driving", "en_a": "B: Are you sleepy? Let me drive instead.\nA: You're awake.", "en_b": "B: Your eyes are drooping.\nA: That's it, I'll stop and rest for a bit.", "tag": "갈등/화해"}, {"no": 1044, "cat": "친구 대화", "vn": "Quên ngày kỷ niệm", "vn_a": "B: Anh quên hôm nay là ngày kỷ niệm rồi à?\nA: Anh xin lỗi, công việc làm anh quá tải.", "vn_b": "B: Năm nào cũng vậy!\nA: Anh hứa năm sau anh nhớ chắc chắn.", "jp": "", "jp_a": "B: 今日が記念日だということを忘れていませんか？\nA: ごめんなさい、仕事が多忙です。", "jp_b": "B: 毎年同じですね！\nA: 来年は必ず覚えておくと誓います。", "en": "Forgot anniversaries", "en_a": "B: Did you forget that today is your anniversary?\nA: I'm sorry, work overloads me.", "en_b": "B: Every year is the same!\nA: I promise I'll remember for sure next year.", "tag": "갈등/화해"}, {"no": 1045, "cat": "친구 대화", "vn": "So sánh với người khác (mẹ)", "vn_a": "B: Mẹ anh hay khen cô Linh quá.\nA: Mẹ chỉ nói chơi thôi.", "vn_b": "B: Em buồn lắm, em cũng cố gắng mà.\nA: Để anh nói với mẹ.", "jp": "", "jp_a": "B: 彼の母親はよくリンさんを褒めます。\nA: お母さんはただ冗談を言っただけです。", "jp_b": "B: とても悲しいです、私は最善を尽くしました。\nA: お母さんに教えてあげましょう。", "en": "Comparison with others (mother)", "en_a": "B: His mother often compliments Ms. Linh.\nA: Mom was just joking.", "en_b": "B: I'm so sad, I tried my best.\nA: Let me tell mom.", "tag": "갈등/화해"}, {"no": 1046, "cat": "친구 대화", "vn": "Cân bằng giữa công việc và cuộc sống", "vn_a": "A: Mình phải cân bằng cuộc sống với công việc.\nB: Anh chăm việc quá, ít gặp em.", "vn_b": "A: Tuần này anh xin nghỉ một ngày.\nB: Vậy mình đi đâu xa nhé.", "jp": "", "jp_a": "A: 生活と仕事のバランスを取らなければなりません。\nB: 私はとても一生懸命働いているので、あなたに会うことはほとんどありません。", "jp_b": "A: 今週彼は休みを求めた。\nB: それで、どこに行けばいいでしょうか？", "en": "Balance between work and life", "en_a": "A: I have to balance life with work.\nB: I work so hard, I rarely see you.", "en_b": "A: This week he asked for a day off.\nB: So where should we go?", "tag": "미래 계획"}, {"no": 1047, "cat": "친구 대화", "vn": "Lừa đảo thiết bị gia dụng", "vn_a": "B: Mình mua máy giặt mới đi.\nA: Loại nào tốt em tìm chưa?", "vn_b": "B: Hãng LG đang khuyến mãi.\nA: Vậy mình đặt trên Tiki cho tiện.", "jp": "", "jp_a": "B: 新しい洗濯機を購入しました。\nA: もういいものは見つかりましたか？", "jp_b": "B: LGはプロモーションを提供しています。\nA: そこで便宜上Tikiに付けてみました。", "en": "Household appliance fraud", "en_a": "B: I bought a new washing machine.\nA: Have you found a good one yet?", "en_b": "B: LG is offering a promotion.\nA: So I put it on Tiki for convenience.", "tag": "미래 계획"}, {"no": 1048, "cat": "친구 대화", "vn": "làm kệ sách", "vn_a": "A: Phòng mới mình kê tủ sách lớn nhé.\nB: Em có nhiều tiểu thuyết Hàn Quốc.", "vn_b": "A: Anh thì sách kinh tế.\nB: Mình chia mỗi người một ngăn.", "jp": "", "jp_a": "A: 新しい部屋には大きな本棚があります。\nB: 韓国の小説をたくさん持っています。", "jp_b": "A: 私は経済学の本を読みます。\nB: 一人一人をコンパートメントに分けました。", "en": "make a bookshelf", "en_a": "A: I have a large bookcase in my new room.\nB: I have many Korean novels.", "en_b": "A: I read economics books.\nB: I divided each person into a compartment.", "tag": "미래 계획"}, {"no": 1049, "cat": "친구 대화", "vn": "chi phí giáo dục trẻ em", "vn_a": "B: Học phí tư thục đắt quá anh.\nA: Mình tích lũy quỹ giáo dục từ giờ.", "vn_b": "B: Mỗi tháng để 5 triệu được không?\nA: Hợp lý, mở tài khoản riêng.", "jp": "", "jp_a": "B: 個別指導は高すぎる。\nA: これから教育資金を貯めていきます。", "jp_b": "B: 毎月500万入れることは可能でしょうか？\nA: リーズナブルな別口座開設。", "en": "children's education costs", "en_a": "B: Private tuition is too expensive.\nA: I'll accumulate education funds from now on.", "en_b": "B: Is it possible to put in 5 million each month?\nA: Reasonable, open separate account.", "tag": "미래 계획"}, {"no": 1050, "cat": "친구 대화", "vn": "đầu tư bất động sản", "vn_a": "A: Em có nghĩ tới mua đất đầu tư không?\nB: Em sợ rủi ro lắm.", "vn_b": "A: Mình mua chỗ đang lên giá.\nB: Vậy nghiên cứu kỹ trước nhé.", "jp": "", "jp_a": "A: 投資用に土地を購入することをお考えですか?\nB: 私はリスクをとても恐れています。", "jp_b": "A: 値上がりしていたところを購入しました。\nB: したがって、最初に注意深く調べてください。", "en": "real estate investment", "en_a": "A: Are you thinking about buying land for investment?\nB: I'm very afraid of risks.", "en_b": "A: I bought a place that was going up in price.\nB: So research carefully first.", "tag": "미래 계획"}, {"no": 1051, "cat": "친구 대화", "vn": "đầu tư chứng khoán", "vn_a": "B: Cổ phiếu công ty anh đang lên kìa.\nA: Anh mua từ năm ngoái rồi.", "vn_b": "B: Lời nhiều không?\nA: Cũng tạm, đủ cho mình đi du lịch.", "jp": "", "jp_a": "B: あなたの会社の株は上がっています。\nA: 去年購入しました。", "jp_b": "B: 言葉がたくさんありますか？\nA: 一時的なもので、旅行するには十分です。", "en": "stock investment", "en_a": "B: Your company's stock is going up.\nA: I bought it last year.", "en_b": "B: Are there many words?\nA: It's temporary, enough for me to travel.", "tag": "미래 계획"}, {"no": 1052, "cat": "친구 대화", "vn": "quỹ khẩn cấp", "vn_a": "A: Mình lập quỹ khẩn cấp đi em.\nB: Bao nhiêu là đủ?", "vn_b": "A: Sáu tháng chi phí sinh hoạt.\nB: Vậy mình đặt lịch tự động chuyển khoản.", "jp": "", "jp_a": "A: 緊急基金を設立しましょう。\nB: いくらあれば十分ですか？", "jp_b": "A: 半年分の生活費。\nB: そこで、自動転送スケジュールを設定しました。", "en": "emergency fund", "en_a": "A: Let's set up an emergency fund.\nB: How much is enough?", "en_b": "A: Six months of living expenses.\nB: So I set up an automatic transfer schedule.", "tag": "미래 계획"}, {"no": 1053, "cat": "친구 대화", "vn": "tiết kiệm kỳ nghỉ", "vn_a": "B: Mình mở sổ tiết kiệm cho du lịch nhé.\nA: Mục tiêu đi đâu?", "vn_b": "B: Nhật Bản mùa hoa anh đào.\nA: Vậy hai năm nữa mình đi.", "jp": "", "jp_a": "B: 旅行用の貯金帳を開いてみましょう。\nA: どこに行きますか？", "jp_b": "B: 日本の桜の季節。\nA: だから2年後に行きます。", "en": "Vacation savings", "en_a": "B: Let's open a savings book for travel.\nA: Where to go?", "en_b": "B: Japan cherry blossom season.\nA: So I'll go in two years.", "tag": "미래 계획"}, {"no": 1054, "cat": "친구 대화", "vn": "quán cà phê sau khi nghỉ hưu", "vn_a": "A: Già rồi mình mở quán cà phê nhỏ nhé.\nB: Em pha cà phê, anh tiếp khách.", "vn_b": "A: Có chú chó nằm ở góc nữa.\nB: Đẹp quá, em mơ rồi đó.", "jp": "", "jp_a": "A: 老後は小さなコーヒーショップを開くつもりです。\nB: あなたはコーヒーを淹れ、私はゲストを迎えます。", "jp_b": "A: 隅っこには犬も寝ています。\nB: とても綺麗で、夢を見ていました。", "en": "Coffee shop after retirement", "en_a": "A: When I'm old, I'll open a small coffee shop.\nB: You make coffee, I receive guests.", "en_b": "A: There's a dog lying in the corner too.\nB: So beautiful, I was dreaming.", "tag": "미래 계획"}, {"no": 1055, "cat": "친구 대화", "vn": "Bảo hiểm y tế của cha mẹ", "vn_a": "B: Em lo bệnh ba mẹ già.\nA: Mình mua bảo hiểm sức khỏe cho ba mẹ đi.", "vn_b": "B: Anh chu đáo thật.\nA: Vì gia đình em cũng là của anh.", "jp": "", "jp_a": "B: 高齢の両親の病気が心配です。\nA: 私は両親のために健康保険に加入しました。", "jp_b": "B: 本当に思慮深いですね。\nA: あなたの家族も私の家族だから。", "en": "Parents' health insurance", "en_a": "B: I worry about my elderly parents' illness.\nA: I bought health insurance for my parents.", "en_b": "B: You're really thoughtful.\nA: Because your family is also mine.", "tag": "미래 계획"}, {"no": 1056, "cat": "친구 대화", "vn": "ghen tị với cuộc hôn nhân của bạn bè", "vn_a": "B: Bạn em cưới rồi, em cũng muốn.\nA: Mình từ từ mà em.", "vn_b": "B: Nhỡ em lỡ thì thì sao.\nA: Em không bao giờ là gánh nặng đâu.", "jp": "", "jp_a": "B: 友達が結婚することになったので、私も結婚したいと思っています。\nA: ゆっくりやってみます。", "jp_b": "B: 見逃してしまったらどうすればいいですか？\nA: 私は決して負担にはなりません。", "en": "Jealous of your friends' marriages", "en_a": "B: My friend is getting married, I want it too.\nA: I'll take it slow.", "en_b": "B: What if I miss it?\nA: I will never be a burden.", "tag": "감정/위로"}, {"no": 1057, "cat": "친구 대화", "vn": "So sánh Instagram", "vn_a": "B: Bạn em sống sang ghê.\nA: Đó là họ chỉ chia sẻ phần đẹp.", "vn_b": "B: Em ghen tị quá.\nA: Mỗi người có hạnh phúc khác nhau.", "jp": "", "jp_a": "B: 私の友人はとても贅沢に住んでいます。\nA: つまり、美しい部分だけを共有するということです。", "jp_b": "B: とても羨ましいです。\nA: 人それぞれ幸せは異なります。", "en": "Compare Instagram", "en_a": "B: My friend lives very luxuriously.\nA: That is they only share the beautiful part.", "en_b": "B: I'm so jealous.\nA: Each person has different happiness.", "tag": "감정/위로"}, {"no": 1058, "cat": "친구 대화", "vn": "kỳ nghỉ căng thẳng", "vn_a": "B: Tết này em mệt mỏi quá.\nA: Vì sao em?", "vn_b": "B: Quá nhiều nghi lễ với họ hàng.\nA: Mình rút gọn lại đi.", "jp": "", "jp_a": "B: このテトはとても疲れた。\nA: なぜ私が？", "jp_b": "B: 親戚との儀式が多すぎる。\nA: 短くしましょう。", "en": "stressful vacation", "en_a": "B: I'm so tired this Tet.\nA: Why me?", "en_b": "B: Too many rituals with relatives.\nA: Let's shorten it.", "tag": "감정/위로"}, {"no": 1059, "cat": "친구 대화", "vn": "Mối quan tâm về sức khỏe của cha mẹ", "vn_a": "A: Ba anh dạo này hay đau lưng.\nB: Mình đưa ba đi khám tổng quát đi.", "vn_b": "A: Anh sợ ba phát hiện bệnh nặng.\nB: Phát hiện sớm để chữa, đừng sợ.", "jp": "", "jp_a": "A: 私の父は最近腰痛を患っています。\nB: 父を一般健康診断に連れて行きましょう。", "jp_b": "A: 彼は自分が重病であることが父親に知られるのを恐れていた。\nB: 早期発見して治療しましょう、恐れることはありません。", "en": "Parents' health concerns", "en_a": "A: My father has been having back pain lately.\nB: Let's take my dad for a general checkup.", "en_b": "A: He was afraid that his father would find out he was seriously ill.\nB: Detect early to cure, don't be afraid.", "tag": "감정/위로"}, {"no": 1060, "cat": "친구 대화", "vn": "mâu thuẫn anh chị em", "vn_a": "B: Em với em trai em cãi nhau.\nA: Vì việc gì?", "vn_b": "B: Tiền bạc thôi.\nA: Anh em ruột thì nên nhường nhịn nhau.", "jp": "", "jp_a": "B: 兄と私は喧嘩した。\nA: 何のために？", "jp_b": "B: ただお金。\nA: 兄弟はお互いに寛容でなければなりません。", "en": "sibling conflict", "en_a": "B: My brother and I quarreled.\nA: For what?", "en_b": "B: Just money.\nA: Siblings should tolerate each other.", "tag": "감정/위로"}, {"no": 1061, "cat": "친구 대화", "vn": "sợ những thử thách mới", "vn_a": "A: Em sợ chuyển công ty không?\nB: Sợ chứ, lương cao mà áp lực.", "vn_b": "A: Em giỏi mà, anh tin em.\nB: Có anh em yên tâm hơn.", "jp": "", "jp_a": "A: 会社を変えるのが怖いですか？\nB: 怖いし、給料は高いけどプレッシャーもある。", "jp_b": "A: あなたは大丈夫です、私はあなたを信じています。\nB: 兄弟がいると安心感が増します。", "en": "afraid of new challenges", "en_a": "A: Are you afraid of changing companies?\nB: Scared, high salary but pressure.", "en_b": "A: You're good, I believe in you.\nB: Having brothers makes me feel more secure.", "tag": "감정/위로"}, {"no": 1062, "cat": "친구 대화", "vn": "già đi", "vn_a": "B: Em phát hiện tóc bạc rồi.\nA: Một sợi thôi mà, dễ thương ghê.", "vn_b": "B: Em sợ già.\nA: Già cùng em là điều anh mong nhất.", "jp": "", "jp_a": "B: 自分の髪が白髪であることに気づきました。\nA: 1本だけでも、とても可愛いです。", "jp_b": "B: 年をとるのが怖いです。\nA: あなたと一緒に歳を重ねていくことが私が一番望んでいることです。", "en": "grow old", "en_a": "B: I discovered my hair is gray.\nA: Just one strand, so cute.", "en_b": "B: I'm afraid of getting old.\nA: Growing old with you is what I hope for the most.", "tag": "감정/위로"}, {"no": 1063, "cat": "친구 대화", "vn": "vẻ ngoài phức tạp", "vn_a": "B: Em xấu quá, mặt đầy mụn.\nA: Anh thấy em vẫn đáng yêu.", "vn_b": "B: Anh nói cho em vui thôi.\nA: Anh nói thật, em đẹp tự nhiên.", "jp": "", "jp_a": "B: 私はとても醜くて、顔はニキビだらけです。\nA: あなたはまだ可愛いと思います。", "jp_b": "B: ただ楽しんでくださいと言ったばかりです。\nA: 本当のことを言うと、あなたは生まれつき美しいのです。", "en": "complex appearance", "en_a": "B: I'm so ugly, my face is full of acne.\nA: I think you're still adorable.", "en_b": "B: I just told you to have fun.\nA: I tell the truth, you are naturally beautiful.", "tag": "감정/위로"}, {"no": 1064, "cat": "친구 대화", "vn": "nỗi buồn mất đi một người bạn", "vn_a": "B: Bạn em mất rồi anh.\nA: Trời ơi, sao xảy ra vậy?", "vn_b": "B: Tai nạn xe.\nA: Em khóc đi, anh ở đây.", "jp": "", "jp_a": "B: 私の友人が亡くなりました。\nA: ああ、一体なぜこんなことになってしまったのでしょうか？", "jp_b": "B: 車の事故。\nA: あなたは泣いています、私はここにいます。", "en": "the sadness of losing a friend", "en_a": "B: My friend has passed away.\nA: Oh my god, why did this happen?", "en_b": "B: Car accident.\nA: You cry, I'm here.", "tag": "감정/위로"}, {"no": 1065, "cat": "친구 대화", "vn": "thuyết trình cổ vũ", "vn_a": "B: Mai em phải thuyết trình trước hội đồng.\nA: Em luyện tập với anh đi.", "vn_b": "B: Anh nghe và góp ý nha.\nA: Anh là khán giả khắt khe nhất đó.", "jp": "", "jp_a": "B: 明日は議会に提出しなければなりません。\nA: あなたは私と一緒に練習します。", "jp_b": "B: ぜひ聞いてフィードバックをお寄せください。\nA: あなたは最も要求の厳しい聴衆です。", "en": "motivational presentation", "en_a": "B: Tomorrow I have to present to the council.\nA: You practice with me.", "en_b": "B: Please listen and give your feedback.\nA: You are the most demanding audience.", "tag": "감정/위로"}, {"no": 1066, "cat": "친구 대화", "vn": "Độ khó từ chối", "vn_a": "B: Em không biết từ chối lời mời của bạn.\nA: Em phải biết bảo vệ thời gian mình.", "vn_b": "B: Em sợ mất bạn.\nA: Bạn thật sự sẽ hiểu em.", "jp": "", "jp_a": "B: あなたの誘いを断る方法がわかりません。\nA: 自分の時間を守る方法を知らなければなりません。", "jp_b": "B: あなたを失うのが怖いです。\nA: あなたは本当に私のことを理解してくれるでしょう。", "en": "Difficulty of refusal", "en_a": "B: I don't know how to refuse your invitation.\nA: You must know how to protect your time.", "en_b": "B: I'm afraid of losing you.\nA: You will really understand me.", "tag": "감정/위로"}, {"no": 1067, "cat": "친구 대화", "vn": "Tôi không muốn thức dậy sớm", "vn_a": "A: Em ơi, dậy đi, hôm nay đi sớm.\nB: Em không muốn dậy, cho em ngủ.", "vn_b": "A: Vậy anh bế em ra.\nB: Đừng đừng, em dậy.", "jp": "", "jp_a": "A: ハニー、起きて、今日は早く出発します。\nB: 起きたくないので寝させてください。", "jp_b": "A: だから私はあなたを連れて行きます。\nB: やめて、起きてください。", "en": "I don't want to wake up early", "en_a": "A: Honey, wake up, leave early today.\nB: I don't want to wake up, let me sleep.", "en_b": "A: So I carry you out.\nB: Don't don't, wake up.", "tag": "감정/위로"}, {"no": 1068, "cat": "친구 대화", "vn": "thiếu ngủ", "vn_a": "B: Em ngủ không đủ giấc, đầu óc nặng nề.\nA: Em đi ngủ trưa chút đi.", "vn_b": "B: Còn nhiều việc lắm.\nA: Sức khỏe trên hết, làm việc sau.", "jp": "", "jp_a": "B: 十分に眠れず、頭が重いです。\nA: 昼寝をします。", "jp_b": "B: まだまだやるべきことはたくさんあります。\nA: 健康が第一、仕事は後です。", "en": "lack of sleep", "en_a": "B: I don't sleep enough, my mind is heavy.\nA: I'm going to take a nap.", "en_b": "B: There's still a lot of work.\nA: Health first, work later.", "tag": "건강/돌봄"}, {"no": 1069, "cat": "친구 대화", "vn": "đau lưng", "vn_a": "A: Anh đau lưng quá em.\nB: Anh ngồi máy tính nhiều quá.", "vn_b": "A: Em xoa lưng cho anh đi.\nB: Mai anh đi vật lý trị liệu nhé.", "jp": "", "jp_a": "A: 腰がとても痛いです。\nB: コンピューターの前に座りすぎます。", "jp_b": "A: あなたの背中をさすってあげましょう。\nB: 明日は理学療法に行きます。", "en": "back-ache", "en_a": "A: My back hurts so much.\nB: You sit at the computer too much.", "en_b": "A: Let me rub your back for you.\nB: I'll go to physical therapy tomorrow.", "tag": "건강/돌봄"}, {"no": 1070, "cat": "친구 대화", "vn": "đau chân", "vn_a": "B: Đôi giày này đau chân quá.\nA: Em tháo ra, đi dép tổ ong đi.", "vn_b": "B: Em ngại mặc đầm với dép.\nA: Anh bế em luôn cho.", "jp": "", "jp_a": "B: この靴は私の足をとても痛めます。\nA: 脱いでハニカムサンダルを履きます。", "jp_b": "B: ドレスやサンダルを履くのが怖いです。\nA: 私もあなたを連れて行きます。", "en": "foot pain", "en_a": "B: These shoes hurt my feet so much.\nA: Take them off and wear honeycomb sandals.", "en_b": "B: I'm afraid to wear dresses and sandals.\nA: I'll carry you too.", "tag": "건강/돌봄"}, {"no": 1071, "cat": "친구 대화", "vn": "dị ứng", "vn_a": "B: Em ăn tôm bị dị ứng rồi.\nA: Mặt em sưng đỏ kìa, đi viện ngay.", "vn_b": "B: Em sợ tiêm dữ lắm.\nA: Có anh, đừng sợ.", "jp": "", "jp_a": "B: エビを食べたらアレルギーが出ました。\nA: 顔が赤く腫れているのですぐに病院へ行きましょう。", "jp_b": "B: 私は注射がとても怖いです。\nA: 私にはあなたがいます、恐れることはありません。", "en": "allergy", "en_a": "B: I was allergic to shrimp when I ate it.\nA: My face is red and swollen, go to the hospital right away.", "en_b": "B: I'm very afraid of injections.\nA: I have you, don't be afraid.", "tag": "건강/돌봄"}, {"no": 1072, "cat": "친구 대화", "vn": "ngộ độc thực phẩm", "vn_a": "A: Bụng anh đau quặn từ tối qua.\nB: Anh ăn gì hư rồi à?", "vn_b": "A: Hải sản ngoài quán hôm qua.\nB: Mình đi cấp cứu liền.", "jp": "", "jp_a": "A: 昨夜からお腹が痛いです。\nB: 何か悪いものを食べましたか？", "jp_b": "A: 昨日のレストランの外でのシーフード。\nB: 私はすぐに救急治療室に行きました。", "en": "food poisoning", "en_a": "A: His stomach hurts since last night.\nB: Did you eat something bad?", "en_b": "A: Seafood outside the restaurant yesterday.\nB: I went to the emergency room immediately.", "tag": "건강/돌봄"}, {"no": 1073, "cat": "친구 대화", "vn": "viêm mũi", "vn_a": "B: Em hắt xì hoài, mũi nghẹt.\nA: Em bị viêm mũi dị ứng à?", "vn_b": "B: Mỗi mùa giao thoa.\nA: Để anh mua máy lọc không khí.", "jp": "", "jp_a": "B: くしゃみがずっと出て、鼻が詰まっています。\nA: アレルギー性鼻炎はありますか？", "jp_b": "B: それぞれの季節が交差する。\nA: 空気清浄機を買いましょう。", "en": "rhinitis", "en_a": "B: I sneeze all the time, my nose is stuffy.\nA: Do you have allergic rhinitis?", "en_b": "B: Each season intersects.\nA: Let me buy an air purifier.", "tag": "건강/돌봄"}, {"no": 1074, "cat": "친구 대화", "vn": "triệu chứng trầm cảm", "vn_a": "B: Em không có động lực gì hết.\nA: Em có muốn gặp chuyên gia tâm lý không?", "vn_b": "B: Em sợ người ta nghĩ em yếu đuối.\nA: Tâm lý cũng là sức khỏe, đừng giấu.", "jp": "", "jp_a": "B: 全くやる気がありません。\nA: 心理学者に診てもらいたいですか？", "jp_b": "B: 人々は私を弱いと思うのではないかと心配しています。\nA: 心理学も健康です、隠さないでください。", "en": "depression symptoms", "en_a": "B: I have no motivation at all.\nA: Do you want to see a psychologist?", "en_b": "B: I'm afraid people will think I'm weak.\nA: Psychology is also health, don't hide it.", "tag": "건강/돌봄"}, {"no": 1075, "cat": "친구 대화", "vn": "kéo dài", "vn_a": "A: Mình cùng giãn cơ buổi sáng nhé.\nB: Em cứng người lắm.", "vn_b": "A: Tập từ từ, lâu dài sẽ dẻo.\nB: Có anh em cố gắng.", "jp": "", "jp_a": "A: 朝、一緒にストレッチしましょう。\nB: とても体が硬いんです。", "jp_b": "A: ゆっくりと練習して、時間をかけて柔軟になっていきましょう。\nB: 試みる兄弟もいます。", "en": "lengthen", "en_a": "A: Let's stretch together in the morning.\nB: I'm very stiff.", "en_b": "A: Practice slowly and over time you will be flexible.\nB: Some brothers try.", "tag": "건강/돌봄"}, {"no": 1076, "cat": "친구 대화", "vn": "sự dư thừa", "vn_a": "B: Em ăn nhiều quá, tức bụng.\nA: Mình ra ngoài đi bộ tiêu hóa nhé.", "vn_b": "B: Em đi không nổi, phình bụng rồi.\nA: Anh dìu em đi từ từ.", "jp": "", "jp_a": "B: 食べすぎてお腹が痛くなりました。\nA: 消化のために外に出て散歩しましょう。", "jp_b": "B: お腹が膨れて歩けない。\nA: 彼は私がゆっくり歩くのを手伝ってくれました。", "en": "redundancy", "en_a": "B: I eat too much, my stomach hurts.\nA: Let's go out and take a walk to digest.", "en_b": "B: I can't walk, my stomach is bloated.\nA: He helped me walk slowly.", "tag": "건강/돌봄"}, {"no": 1077, "cat": "친구 대화", "vn": "chăm sóc da", "vn_a": "B: Da em xấu quá dạo này.\nA: Em uống nhiều nước và ngủ đủ chưa?", "vn_b": "B: Em hay thức khuya.\nA: Anh nhắc em ngủ sớm nha.", "jp": "", "jp_a": "B: 最近肌の調子がとても悪いです。\nA: 水をたくさん飲んで、十分な睡眠を取っていますか？", "jp_b": "B: 私はよく遅くまで起きています。\nA: 早く寝るように注意します。", "en": "skin care", "en_a": "B: My skin is so bad these days.\nA: Are you drinking lots of water and getting enough sleep?", "en_b": "B: I often stay up late.\nA: I remind you to go to bed early.", "tag": "건강/돌봄"}, {"no": 1078, "cat": "친구 대화", "vn": "mẹ chồng cằn nhằn", "vn_a": "B: Mẹ anh hôm nay nhắc nhở em nhiều.\nA: Mẹ thương em nên mới góp ý.", "vn_b": "B: Em hơi tủi thân.\nA: Để anh nói riêng với mẹ.", "jp": "", "jp_a": "B: 今日母は私にたくさんのことを思い出させてくれました。\nA: お母さんはあなたを愛しているので、私にアドバイスをくれました。", "jp_b": "B: ちょっとごめんなさい。\nA: 母と個人的に話させてください。", "en": "mother-in-law grumbled", "en_a": "B: My mother reminded me a lot today.\nA: Mom loves you so she gave me advice.", "en_b": "B: I'm a bit sorry.\nA: Let me talk to my mother privately.", "tag": "가족/사회"}, {"no": 1079, "cat": "친구 대화", "vn": "vay tiền anh rể", "vn_a": "A: Em trai em mượn tiền anh.\nB: Lại à, cứ vay không trả.", "vn_b": "A: Anh phải làm sao đây?\nB: Anh từ chối khéo nhé.", "jp": "", "jp_a": "A: 弟は私からお金を借りました。\nB: 繰り返しますが、返済せずに借り続けます。", "jp_b": "A: どうすればいいですか？\nB: 丁重にお断りしてください。", "en": "borrowed money from my brother-in-law", "en_a": "A: My younger brother borrowed money from me.\nB: Again, keep borrowing and not repaying.", "en_b": "A: What should I do?\nB: Please refuse politely.", "tag": "가족/사회"}, {"no": 1080, "cat": "친구 대화", "vn": "đám cưới anh họ", "vn_a": "A: Cuối tuần đi đám cưới chị họ em.\nB: Vâng, em mặc gì hợp?", "vn_b": "A: Áo dài đỏ đi, em đẹp lắm.\nB: Vậy em đặt may liền.", "jp": "", "jp_a": "A: 今週末、いとこの結婚式に出席します。\nB: はい、何を着ればいいですか？", "jp_b": "A: 赤いアオザイを着て、あなたはとても美しいです。\nB: それで、すぐに注文しました。", "en": "cousin's wedding", "en_a": "A: Going to my cousin's wedding this weekend.\nB: Yes, what should I wear?", "en_b": "A: Wear a red ao dai, you're very beautiful.\nB: So I ordered it right away.", "tag": "가족/사회"}, {"no": 1081, "cat": "친구 대화", "vn": "về thăm nhà bố mẹ", "vn_a": "B: Cuối tuần em về nhà mẹ đẻ.\nA: Anh đi cùng em nhé.", "vn_b": "B: Mẹ em làm món em thích.\nA: Anh háo hức ăn.", "jp": "", "jp_a": "B: 週末には母の家に行きます。\nA: 一緒に来てください。", "jp_b": "B: 母は私の好きな料理を作ります。\nA: 彼は熱心に食べた。", "en": "visit my parents' house", "en_a": "B: On weekends I go to my mother's house.\nA: Please come with me.", "en_b": "B: My mother makes my favorite dish.\nA: He eagerly ate.", "tag": "가족/사회"}, {"no": 1082, "cat": "친구 대화", "vn": "người bạn sinh con", "vn_a": "B: Bạn em sinh em bé rồi.\nA: Mình thăm bệnh viện hôm nào?", "vn_b": "B: Mai chiều, mình mua quà đi.\nA: Quần áo trẻ em được không?", "jp": "", "jp_a": "B: 私の友人が赤ちゃんを出産しました。\nA: 何日に病院に行けばいいですか？", "jp_b": "B: 明日の午後、プレゼントを買いましょう。\nA: 子供服は大丈夫ですか？", "en": "friend gives birth", "en_a": "B: My friend gave birth to a baby.\nA: What day should I visit the hospital?", "en_b": "B: Tomorrow afternoon, let's buy a gift.\nA: Are children's clothes okay?", "tag": "가족/사회"}, {"no": 1083, "cat": "친구 대화", "vn": "xưởng công ty", "vn_a": "A: Anh đi team building 3 ngày.\nB: Em ở nhà một mình buồn ghê.", "vn_b": "A: Anh gọi cho em mỗi tối.\nB: Vâng, anh đi vui vẻ nhé.", "jp": "", "jp_a": "A: 3日間チームビルディングに行ってきました。\nB: 家に一人でいるととても悲しいです。", "jp_b": "A: 私は毎晩あなたに電話します。\nB: はい、楽しんでください。", "en": "company workshop", "en_a": "A: I went to team building for 3 days.\nB: I'm so sad at home alone.", "en_b": "A: I call you every night.\nB: Yes, have fun.", "tag": "가족/사회"}, {"no": 1084, "cat": "친구 대화", "vn": "Giúp một người bạn di chuyển", "vn_a": "B: Bạn em cần giúp dọn nhà cuối tuần.\nA: Anh đi với em luôn.", "vn_b": "B: Anh đỡ tay nâng đồ nặng cho em.\nA: Có anh, em không phải lo.", "jp": "", "jp_a": "B: 私の友人は週末に家の掃除を手伝う必要があります。\nA: 私も一緒に行きます。", "jp_b": "B: 重いものを持ち上げるのを手伝ってくれます。\nA: 私がいれば、心配する必要はありません。", "en": "Help a friend move", "en_a": "B: My friend needs help cleaning the house over the weekend.\nA: I'll go with you too.", "en_b": "B: I help you lift heavy things for me.\nA: With me, you don't have to worry.", "tag": "가족/사회"}, {"no": 1085, "cat": "친구 대화", "vn": "sinh nhật bố mẹ", "vn_a": "A: Tuần sau sinh nhật mẹ anh.\nB: Mình tổ chức tiệc nhỏ nhé.", "vn_b": "A: Quà gì hợp với mẹ?\nB: Khăn lụa và một chiếc lắc tay.", "jp": "", "jp_a": "A: 来週は母の誕生日です。\nB: 小さなパーティーを企画しましょう。", "jp_b": "A: お母さんにぴったりのプレゼントは何ですか？\nB: シルクスカーフとブレスレット。", "en": "parents birthday", "en_a": "A: Next week is my mother's birthday.\nB: Let's organize a small party.", "en_b": "A: What gift is suitable for mom?\nB: Silk scarf and a bracelet.", "tag": "가족/사회"}, {"no": 1086, "cat": "친구 대화", "vn": "hàng xóm cãi nhau", "vn_a": "B: Hàng xóm khó chịu quá, gây ồn cả đêm.\nA: Để anh sang nói chuyện.", "vn_b": "B: Đừng cãi nhau nha anh.\nA: Anh nói nhẹ nhàng thôi.", "jp": "", "jp_a": "B: 近所の人がとても迷惑で、一晩中騒音を立てています。\nA: こっちに来て話しましょう。", "jp_b": "B: 議論しないでください、おい。\nA: 彼はそっと言いました。", "en": "Neighbors quarreled", "en_a": "B: The neighbors are so annoying, making noise all night.\nA: Let me come over and talk.", "en_b": "B: Don't argue, man.\nA: He said softly.", "tag": "가족/사회"}, {"no": 1087, "cat": "친구 대화", "vn": "hôn nhân đồng nghiệp", "vn_a": "A: Anh phải đi đám cưới đồng nghiệp.\nB: Em đi cùng được không?", "vn_b": "A: Tất nhiên rồi, em là vợ tương lai.\nB: Vậy em chọn váy đi.", "jp": "", "jp_a": "A: 同僚の結婚式に行かなければなりません。\nB: 一緒に行ってもいいですか？", "jp_b": "A: もちろん、私は将来の妻です。\nB: それでドレスを選びます。", "en": "colleague marriage", "en_a": "A: I have to go to a colleague's wedding.\nB: Can I go with you?", "en_b": "A: Of course, I'm the future wife.\nB: So I choose a dress.", "tag": "가족/사회"}, {"no": 1088, "cat": "친구 대화", "vn": "Nấu ăn ngày lễ", "vn_a": "B: Tết mình gói bánh chưng nhé.\nA: Em biết gói à?", "vn_b": "B: Mẹ em chỉ em rồi.\nA: Vậy năm nay nhà mình có bánh tự làm.", "jp": "", "jp_a": "B: テトにはバインチョンを作りましょう。\nA: パッケージをご存知ですか？", "jp_b": "B: 母が見せてくれました。\nA: ということで、今年は我が家では手作りケーキを作りました。", "en": "Holiday cooking", "en_a": "B: Let's make banh chung for Tet.\nA: Do you know the package?", "en_b": "
