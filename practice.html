<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>VN 3000 · 예문 A/B 연습</title>
<style>
:root{
  --bg:#f8fafc; --card:#fff; --soft:#f1f5f9; --text:#0f172a; --muted:#64748b;
  --border:#e2e8f0; --accent:#1e40af;
  --vn:#1e3a5f; --jp:#1a1a1a; --en:#64748b;
  --core-bg:#dbeafe; --core:#1e40af;
  --biz-bg:#fef3c7; --biz:#92400e;
  --daily-bg:#dcfce7; --daily:#166534;
  --gold:#f59e0b; --success:#16a34a;
  --fa:#dc2626; --fb:#ea580c; --fc:#16a34a;
  --sh:0 4px 16px rgba(0,0,0,.06);
}
[data-theme="dark"]{
  --bg:#0f172a; --card:#1e293b; --soft:#334155; --text:#f1f5f9; --muted:#94a3b8;
  --border:#334155; --accent:#60a5fa;
  --vn:#93c5fd; --jp:#e2e8f0; --en:#cbd5e1;
  --core-bg:#1e3a8a; --core:#93c5fd;
  --biz-bg:#78350f; --biz:#fde68a;
  --daily-bg:#14532d; --daily:#bbf7d0;
  --gold:#fbbf24; --success:#4ade80;
  --fa:#f87171; --fb:#fb923c; --fc:#4ade80;
  --sh:0 4px 16px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
  transition:background .2s,color .2s;
  display:flex;flex-direction:column;
  min-height:100dvh;min-height:100vh;
}
ruby{ruby-align:center}
rt{font-size:.5em;color:var(--muted);font-weight:normal}
header{
  position:sticky;top:0;z-index:100;background:var(--card);
  border-bottom:1px solid var(--border);padding:10px 12px;box-shadow:var(--sh);
}
.htop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:8px}
h1{font-size:16px;color:var(--accent);font-weight:700}
.theme-btn{
  background:var(--soft);border:1px solid var(--border);color:var(--text);
  padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;
}
.filters{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.ch{
  padding:5px 11px;border:1px solid var(--border);border-radius:14px;
  background:var(--soft);color:var(--text);font-size:11px;cursor:pointer;
  user-select:none;font-weight:600;
}
.ch.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.ch.toggle{background:transparent}
.ch.toggle.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.ch.toggle.rating.level-1{background:var(--fa);border-color:var(--fa);color:#fff}
.ch.toggle.rating.level-2{background:#f59e0b;border-color:#f59e0b;color:#fff}
.ch.toggle.rating.level-3{background:var(--fc);border-color:var(--fc);color:#fff}
.ch.toggle.rating.unrated{background:var(--accent);border-color:var(--accent);color:#fff}
.ch.toggle.order.on{background:var(--accent);border-color:var(--accent)}
.ch.toggle.audio.on{background:#ec4899;border-color:#ec4899;color:#fff}
.ch.toggle.audio.playing{animation:pulse 1.2s ease-in-out infinite}
.ch.toggle.auto.on{background:#0ea5e9;border-color:#0ea5e9;color:#fff;animation:pulse 1.2s ease-in-out infinite}
.cat-btn{background:var(--soft);border:1px solid var(--border);color:var(--text);cursor:pointer;
  font-family:inherit;font-weight:600;max-width:220px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-btn:hover{border-color:var(--accent)}
.cat-modal{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:16px}
.cat-modal[hidden]{display:none}
.cat-modal-inner{background:var(--card);border:1px solid var(--border);
  border-radius:14px;width:100%;max-width:460px;max-height:80vh;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.35)}
.cat-modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--border)}
.cat-modal-close{background:var(--soft);border:1px solid var(--border);color:var(--text);
  width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px}
.cat-search{margin:10px 16px 0;padding:8px 12px;border:1px solid var(--border);
  border-radius:8px;font-size:13px;background:var(--soft);color:var(--text);outline:none}
.cat-search:focus{border-color:var(--accent)}
.cat-list{flex:1;overflow-y:auto;padding:8px 8px 14px}
.cat-item{display:flex;justify-content:space-between;align-items:center;
  padding:9px 12px;border-radius:8px;cursor:pointer;user-select:none;font-size:13px;
  color:var(--text);margin:2px 0}
.cat-item:hover{background:var(--soft)}
.cat-item.active{background:var(--accent);color:#fff;font-weight:600}
.cat-item.replay{background:rgba(14,165,233,.15);color:#0ea5e9;font-weight:700;
  border:1px dashed #0ea5e9;margin-bottom:8px}
.cat-item.replay:hover{background:rgba(14,165,233,.25)}
.cat-item-count{font-size:11px;color:var(--muted);font-weight:500}
.cat-item.active .cat-item-count{color:rgba(255,255,255,.8)}
.status{
  padding:6px 12px;font-size:11px;color:var(--muted);
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;gap:12px;align-items:center;
}
.clear-btn{
  font-size:10px;color:var(--muted);background:none;border:none;
  cursor:pointer;text-decoration:underline;padding:2px 6px;
}
main{
  padding:14px 12px;max-width:640px;width:100%;margin:0 auto;
  flex:1;min-height:0;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.scene-empty{
  position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;
}
.scene-empty.show{display:flex}
.scene{
  perspective:1400px;width:100%;max-width:560px;
  flex:1;min-height:220px;max-height:720px;
  position:relative;
}
.filter-stack{
  position:absolute;left:12px;bottom:14px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px 12px;
  z-index:20;
}
.fs-cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.fs-cap{font-size:10px;color:var(--muted);white-space:nowrap;text-align:center}
.cat-pill{
  position:absolute;top:21px;left:50%;transform:translateX(-50%);
  z-index:25;
  display:inline-flex;align-items:center;gap:5px;
  background:var(--soft);border:1px solid var(--border);color:var(--text);
  height:26px;padding:0 12px;border-radius:13px;
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;
  user-select:none;-webkit-tap-highlight-color:transparent;
  box-shadow:0 1px 4px rgba(0,0,0,.08);
  max-width:calc(100% - 32px);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1;
}
.cat-pill:hover{border-color:var(--accent)}
.cat-pill:active{transform:translateX(-50%) scale(.95)}
.cat-pill .fs-icon{font-size:13px;flex-shrink:0}
.fs-btn{
  display:flex;align-items:center;justify-content:center;
  background:var(--soft);border:1px solid var(--border);color:var(--text);
  font-family:inherit;font-weight:600;cursor:pointer;
  user-select:none;-webkit-tap-highlight-color:transparent;
  transition:all .15s;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
}
.fs-btn.round{
  width:46px;height:46px;border-radius:50%;
  font-size:20px;padding:0;
}
.fs-btn:active{transform:scale(.9)}
/* on-states */
.fs-btn.on{color:#fff;border-color:transparent}
#onlyBm.fs-btn.on{background:var(--gold)}
#orderToggle.fs-btn.on{background:var(--accent)}
#audioToggle.fs-btn.on{background:#ec4899}
#audioToggle.fs-btn.playing{animation:pulse 1.2s ease-in-out infinite}
#rateFilter.fs-btn.level-1{background:var(--fa);color:#fff;border-color:transparent}
#rateFilter.fs-btn.level-2{background:#f59e0b;color:#fff;border-color:transparent}
#rateFilter.fs-btn.level-3{background:var(--fc);color:#fff;border-color:transparent}
#rateFilter.fs-btn.unrated{background:var(--accent);color:#fff;border-color:transparent}
@media (max-width:500px){
  .filter-stack{left:8px;bottom:10px;gap:6px 10px}
  .fs-btn.round{width:42px;height:42px;font-size:18px}
  .fs-cap{font-size:9px}
  .cat-pill{top:13px;height:24px;padding:0 10px;font-size:11px}
}
@media (max-width:360px){
  .fs-btn.round{width:38px;height:38px;font-size:16px}
  .fs-cap{font-size:8.5px}
}
.card{
  position:relative;width:100%;height:100%;
  transform-style:preserve-3d;-webkit-transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer;
}
.card.flipped{transform:rotateY(180deg)}
.face{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;box-shadow:var(--sh);
  padding:22px 20px;
  display:flex;flex-direction:column;overflow:hidden;
}
.back{transform:rotateY(180deg)}
.card-top{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;gap:8px;
}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;
  background:var(--core-bg);color:var(--core);max-width:60%;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-badge{font-size:10px;color:var(--muted);flex:1;text-align:center}
.ab-badge{display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:12px;font-size:12px;font-weight:800;
  margin-left:auto;margin-right:8px}
.ab-a{background:#dbeafe;color:#1e40af}
.ab-b{background:#fce7f3;color:#be185d}
[data-theme="dark"] .ab-a{background:#1e3a8a;color:#bfdbfe}
[data-theme="dark"] .ab-b{background:#831843;color:#fbcfe8}
.num{font-size:10px;color:var(--muted);font-weight:700}
.body{
  flex:1;display:flex;flex-direction:column;
  justify-content:flex-start;align-items:center;
  text-align:center;overflow-y:auto;padding:14px 0 8px;
}
/* Front: words, hierarchy VN > JP > EN */
/* VN largest, JP medium, EN small. Same on front (A) and back (B). */
.vn-word{
  font-size:36px;font-weight:700;color:var(--vn);
  line-height:1.1;word-wrap:break-word;
  margin-bottom:12px;width:100%;
}
.vn-ex{
  font-size:42px;font-weight:700;color:var(--vn);
  line-height:1.3;word-wrap:break-word;
  margin-bottom:20px;padding-bottom:18px;
  border-bottom:1px dashed var(--border);width:100%;
  white-space:pre-line;
}
/* Multi-line dialog: still big but room for two lines */
.vn-ex.dialog{font-size:32px;line-height:1.4;text-align:left;font-weight:600}
.jp-word{
  font-size:28px;font-weight:700;color:var(--jp);
  line-height:1.35;margin-bottom:6px;width:100%;
}
.jp-ex{
  font-size:21px;color:var(--jp);line-height:1.55;
  margin-bottom:16px;padding-bottom:12px;
  border-bottom:1px dashed var(--border);width:100%;
  white-space:pre-line;
}
.jp-ex.dialog{font-size:17px;line-height:1.55;text-align:left}
/* EN title (en field) is hidden — only en_a / en_b examples are shown,
   styled like jp-ex for visual parity. */
.en-word{display:none}
.en-ex{
  font-size:21px;color:var(--en);
  line-height:1.55;word-wrap:break-word;
  margin-bottom:16px;padding-bottom:12px;
  border-bottom:1px dashed var(--border);width:100%;
  white-space:pre-line;
}
.en-ex.dialog{font-size:17px;line-height:1.55;text-align:left}
.card-bottom{
  display:flex;gap:14px;justify-content:flex-end;align-items:center;margin-top:10px;
}
.icon-btn{
  background:var(--soft);border:1px solid var(--border);color:var(--muted);
  width:50px;height:50px;border-radius:25px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.icon-btn:hover{background:var(--border)}
.icon-btn:active{transform:scale(.92)}
.icon-btn.on[data-type="bookmark"]{background:var(--gold);color:#fff;border-color:var(--gold)}
.rate-group{display:flex;gap:8px}
.rate-btn{
  width:46px;height:46px;border-radius:23px;
  border:1.5px solid;
  font-size:18px;font-weight:800;cursor:pointer;user-select:none;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
  font-family:inherit;-webkit-tap-highlight-color:transparent;
}
.rate-btn:active{transform:scale(.92)}
.rate-btn.level-1{background:rgba(220,38,38,.12);border-color:var(--fa);color:var(--fa)}
.rate-btn.level-2{background:rgba(245,158,11,.14);border-color:#f59e0b;color:#b45309}
.rate-btn.level-3{background:rgba(22,163,74,.12);border-color:var(--fc);color:var(--fc)}
[data-theme="dark"] .rate-btn.level-1{background:rgba(248,113,113,.18);color:var(--fa)}
[data-theme="dark"] .rate-btn.level-2{background:rgba(251,146,60,.2);color:#fbbf24}
[data-theme="dark"] .rate-btn.level-3{background:rgba(74,222,128,.18);color:var(--fc)}
.rate-btn.level-1.on{background:var(--fa);color:#fff}
.rate-btn.level-2.on{background:#f59e0b;border-color:#f59e0b;color:#fff}
.rate-btn.level-3.on{background:var(--fc);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.flip-hint{
  font-size:10px;color:var(--muted);text-align:center;
  letter-spacing:.06em;margin:0;
}
.nav-bar{
  display:flex;gap:10px;width:100%;max-width:560px;flex:0 0 auto;
}
.nav-btn{
  flex:1;padding:14px;border:1px solid var(--border);
  border-radius:10px;background:var(--card);color:var(--text);
  font-size:14px;font-weight:600;cursor:pointer;
}
.nav-btn:active{background:var(--soft)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn-mid{
  flex:0 0 120px;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  white-space:nowrap;
}
.auto-icon{font-size:18px;line-height:1}
.auto-label{font-size:13px;color:var(--text);letter-spacing:.02em;font-weight:600;white-space:nowrap}
.nav-btn-mid.on{background:#0ea5e9;color:#fff;border-color:#0ea5e9;animation:pulse 1.2s ease-in-out infinite}
.nav-btn-mid.on .auto-label{color:#fff}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
@media (max-width:500px){
  header{padding:8px 10px}
  .htop{margin-bottom:6px}
  .status{padding:5px 10px}
  main{padding:10px 10px;gap:8px}
  .vn-word{font-size:28px;margin-bottom:10px}
  .vn-ex{font-size:34px;margin-bottom:16px;padding-bottom:14px}
  .vn-ex.dialog{font-size:26px}
  .jp-word{font-size:22px;margin-bottom:4px}
  .jp-ex{font-size:17px;margin-bottom:12px;padding-bottom:10px}
  .en-ex{font-size:17px;margin-bottom:12px;padding-bottom:10px}
  .en-ex.dialog{font-size:14px}
  .face{padding:14px 14px}
  h1{font-size:14px}
  .nav-btn{padding:12px;font-size:14px}
  .nav-btn-mid{flex:0 0 48px;font-size:18px}
  .theme-btn{padding:5px 8px;font-size:11px}
  .ch{padding:4px 9px;font-size:10.5px}
}
@media (max-width:360px){
  .filters{gap:3px}
  .ch{padding:3px 8px;font-size:10px}
  .vn-word{font-size:24px}
  .vn-ex{font-size:28px}
  .vn-ex.dialog{font-size:22px}
  .jp-word{font-size:19px}
  .jp-ex{font-size:15px}
  .en-ex{font-size:15px}
  .en-ex.dialog{font-size:13px}
}
@media (max-height:600px){
  .scene{min-height:180px}
  .vn-word{font-size:46px;margin-bottom:10px}
  .vn-ex{font-size:26px;margin-bottom:12px;padding-bottom:10px}
  .jp-word{font-size:19px;margin-bottom:3px}
  .jp-ex{font-size:15px;margin-bottom:8px;padding-bottom:6px}
  .face{padding:12px 14px}
}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>VN 3000 · 예문 A / B</h1>
    <div style="display:flex;gap:6px;align-items:center">
      <a href="./" class="theme-btn" style="text-decoration:none;color:var(--accent)">단어 →</a>
      <button class="theme-btn" id="themeBtn">🌙 Dark</button>
    </div>
  </div>
  <div class="cat-modal" id="catModal" hidden>
    <div class="cat-modal-inner">
      <div class="cat-modal-head">
        <div>
          <strong id="catModalTitle">카테고리 선택</strong>
          <div id="catModalSubtitle" style="font-size:11px;color:var(--muted);margin-top:2px;display:none"></div>
        </div>
        <button class="cat-modal-close" id="catModalClose" title="닫기">✕</button>
      </div>
      <input type="search" class="cat-search" id="catSearch" placeholder="검색..." autocomplete="off">
      <div class="cat-list" id="catList"></div>
    </div>
  </div>
</header>
<div class="status">
  <span id="progress">0 / 0</span>
  <span id="ratingCount">1:0 · 2:0 · 3:0</span>
  <button class="clear-btn" id="clearBtn">清除标记</button>
</div>
<main>
  <div class="scene" id="scene">
    <div class="card" id="card">
      <div class="face front">
        <div class="card-top">
          <span class="badge" id="fCat">Core</span>
          <span class="ab-badge ab-a">A</span>
          <span class="num" id="fNum">#001</span>
        </div>
        <div class="body">
          <div class="vn-word" id="fVn"></div>
          <div class="vn-ex" id="fVnEx"></div>
          <div class="jp-word" id="fJp"></div>
          <div class="jp-ex" id="fJpEx"></div>
          <div class="en-word" id="fEn"></div>
          <div class="en-ex" id="fEnEx"></div>
        </div>
        <div class="card-bottom">
          <button class="icon-btn" data-type="bookmark" id="fBm">☆</button>
          <div class="rate-group" id="fRate">
            <button class="rate-btn level-1" data-rate="1" title="1 · 모름">1</button>
            <button class="rate-btn level-2" data-rate="2" title="2 · 인상">2</button>
            <button class="rate-btn level-3" data-rate="3" title="3 · 장악">3</button>
          </div>
        </div>
      </div>
      <div class="face back">
        <div class="card-top">
          <span class="badge" id="bCat">Core</span>
          <span class="ab-badge ab-b">B</span>
          <span class="num" id="bNum">#001</span>
        </div>
        <div class="body">
          <div class="vn-word" id="bVn"></div>
          <div class="vn-ex" id="bVnEx"></div>
          <div class="jp-word" id="bJp"></div>
          <div class="jp-ex" id="bJpEx"></div>
          <div class="en-word" id="bEn"></div>
          <div class="en-ex" id="bEnEx"></div>
        </div>
        <div class="card-bottom">
          <button class="icon-btn" data-type="bookmark" id="bBm">☆</button>
          <div class="rate-group" id="bRate">
            <button class="rate-btn level-1" data-rate="1" title="1 · 모름">1</button>
            <button class="rate-btn level-2" data-rate="2" title="2 · 인상">2</button>
            <button class="rate-btn level-3" data-rate="3" title="3 · 장악">3</button>
          </div>
        </div>
      </div>
    </div>
    <button class="cat-pill" id="catBtn" title="카테고리"><span class="fs-icon">📂</span><span id="catBtnLabel">전체 · 800</span></button>
    <div class="filter-stack" id="filterStack">
      <div class="fs-cell">
        <button class="fs-btn round" id="onlyBm">☆</button>
        <span class="fs-cap">즐겨찾기</span>
      </div>
      <div class="fs-cell">
        <button class="fs-btn round" id="rateFilter">📊</button>
        <span class="fs-cap" id="rateFilterCap">등급</span>
      </div>
      <div class="fs-cell">
        <button class="fs-btn round" id="orderToggle">📋</button>
        <span class="fs-cap" id="orderToggleCap">순서</span>
      </div>
      <div class="fs-cell">
        <button class="fs-btn round" id="audioToggle">🔇</button>
        <span class="fs-cap" id="audioToggleCap">음성</span>
      </div>
    </div>

<rt>た</rt></ruby>べましたか。", "en": "Good evening", "en_a": "Good evening.", "en_b": "Hi, have you eaten yet?", "tag": "Greeting"}, {"no": 14, "cat": "Core Basic", "vn": "Chúc ngủ ngon", "vn_a": "Tối rồi, tôi về nhé.", "vn_b": "Chúc ngủ ngon, ngày mai gặp.", "jp": "おやすみなさい", "jp_a": "もう<ruby>遅<rt>おそ</rt></ruby>いので<ruby>帰<rt>かえ</rt></ruby>ります。", "jp_b": "おやすみなさい、<ruby>明日<rt>あした</rt></ruby>。", "en": "Good night", "en_a": "It's late, I'll head back.", "en_b": "Good night, see you tomorrow.", "tag": "Greeting"}, {"no": 15, "cat": "Core Basic", "vn": "Hẹn gặp lại", "vn_a": "Hôm nay vui quá.", "vn_b": "Hẹn gặp lại lần sau!", "jp": "また<ruby>会<rt>あ</rt></ruby>いましょう", "jp_a": "<ruby>今日<rt>きょう</rt></ruby>は<ruby>楽<rt>たの</rt></ruby>しかった。", "jp_b": "また<ruby>次回<rt>じかい</rt></ruby>！", "en": "See you again", "en_a": "Had a great time today.", "en_b": "See you next time!", "tag": "Greeting"}, {"no": 16, "cat": "Core Basic", "vn": "Rất vui được gặp", "vn_a": "Anh là đối tác mới phải không?", "vn_b": "Vâng, rất vui được gặp anh.", "jp": "お<ruby>会<rt>あ</rt></ruby>いできて<ruby>嬉<rt>うれ</rt></ruby>しい", "jp_a": "<ruby>新<rt>あたら</rt></ruby>しいパートナーですか。", "jp_b": "はい、お<ruby>会<rt>あ</rt></ruby>いできて<ruby>嬉<rt>うれ</rt></ruby>しいです。", "en": "Nice to meet you", "en_a": "Are you the new partner?", "en_b": "Yes, nice to meet you.", "tag": "Greeting"}, {"no": 17, "cat": "Core Basic", "vn": "Khỏe", "vn_a": "Anh có khỏe không?", "vn_b": "Khỏe, cảm ơn. Còn anh?", "jp": "<ruby>元気<rt>げんき</rt></ruby>", "jp_a": "お<ruby>元気<rt>げんき</rt></ruby>ですか。", "jp_b": "<ruby>元気<rt>げんき</rt></ruby>です、あなたは？", "en": "Well / Healthy", "en_a": "How are you?", "en_b": "Good, thanks. And you?", "tag": "Greeting"}, {"no": 18, "cat": "Core Basic", "vn": "Bình thường", "vn_a": "Dạo này thế nào?", "vn_b": "Bình thường thôi.", "jp": "まあまあ", "jp_a": "<ruby>最近<rt>さいきん</rt></ruby>どう？", "jp_b": "まあまあかな。", "en": "So-so", "en_a": "How've you been?", "en_b": "So-so.", "tag": "Greeting"}, {"no": 19, "cat": "Core Basic", "vn": "Lâu rồi không gặp", "vn_a": "Lâu rồi không gặp anh!", "vn_b": "Ừ, lâu lắm rồi nhỉ!", "jp": "<ruby>久<rt>ひさ</rt></ruby>しぶり", "jp_a": "お<ruby>久<rt>ひさ</rt></ruby>しぶりです！", "jp_b": "ほんと、<ruby>久<rt>ひさ</rt></ruby>しぶりですね！", "en": "Long time no see", "en_a": "Long time no see!", "en_b": "Yeah, it's been a while!", "tag": "Greeting"}, {"no": 20, "cat": "Core Basic", "vn": "Chúc mừng", "vn_a": "Nghe nói anh thăng chức?", "vn_b": "Cảm ơn, chúc mừng anh luôn!", "jp": "おめでとう", "jp_a": "<ruby>昇進<rt>しょうしん</rt></ruby>したんですって？", "jp_b": "ありがとう！", "en": "Congratulations", "en_a": "Heard you got promoted?", "en_b": "Thanks, congrats to you too!", "tag": "Greeting"}, {"no": 21, "cat": "Core Basic", "vn": "Không có gì", "vn_a": "Cảm ơn anh nhiều.", "vn_b": "Không có gì, đừng ngại.", "jp": "どういたしまして", "jp_a": "ありがとうございます。", "jp_b": "どういたしまして。", "en": "You're welcome", "en_a": "Thank you so much.", "en_b": "You're welcome.", "tag": "Response"}, {"no": 22, "cat": "Core Basic", "vn": "Mời", "vn_a": "Mời anh uống trà.", "vn_b": "Cảm ơn anh.", "jp": "どうぞ", "jp_a": "お<ruby>茶<rt>ちゃ</rt></ruby>をどうぞ。", "jp_b": "ありがとうございます。", "en": "Please (offer)", "en_a": "Please have some tea.", "en_b": "Thank you.", "tag": "Greeting"}, {"no": 23, "cat": "Core Basic", "vn": "Cảm ơn nhiều", "vn_a": "Anh giúp tôi nhiều quá.", "vn_b": "Cảm ơn nhiều lắm.", "jp": "どうもありがとう", "jp_a": "とても<ruby>助<rt>たす</rt></ruby>かりました。", "jp_b": "どうもありがとう。", "en": "Thanks a lot", "en_a": "You helped me a lot.", "en_b": "Thanks so much.", "tag": "Greeting"}, {"no": 24, "cat": "Core Basic", "vn": "Xin phép", "vn_a": "Tôi xin phép về trước.", "vn_b": "Vâng, anh về cẩn thận.", "jp": "<ruby>失礼<rt>しつれい</rt></ruby>します", "jp_a": "お<ruby>先<rt>さき</rt></ruby>に<ruby>失礼<rt>しつれい</rt></ruby>します。", "jp_b": "お<ruby>気<rt>き</rt></ruby>をつけて。", "en": "Excuse me (leaving)", "en_a": "I'll take my leave.", "en_b": "Take care.", "tag": "Greeting"}, {"no": 25, "cat": "Core Basic", "vn": "Chào anh", "vn_a": "Chào anh, mời ngồi.", "vn_b": "Cảm ơn, anh ngồi luôn nhé.", "jp": "こんにちは", "jp_a": "こんにちは、どうぞお<ruby>座<rt>すわ</rt></ruby>りください。", "jp_b": "ありがとう、どうぞ。", "en": "Hello (to male)", "en_a": "Hello, please sit.", "en_b": "Thanks, please sit too.", "tag": "Greeting"}, {"no": 26, "cat": "Core Basic", "vn": "Tôi", "vn_a": "Anh là ai?", "vn_b": "Tôi là DJ, từ Hàn Quốc.", "jp": "<ruby>私<rt>わたし</rt></ruby>", "jp_a": "どなたですか。", "jp_b": "<ruby>私<rt>わたし</rt></ruby>はDJ、<ruby>韓国<rt>かんこく</rt></ruby>から<ruby>来<rt>き</rt></ruby>ました。", "en": "I", "en_a": "Who are you?", "en_b": "I'm DJ, from Korea.", "tag": "Pronoun"}, {"no": 27, "cat": "Core Basic", "vn": "Anh", "vn_a": "Anh tên là gì?", "vn_b": "Tôi tên Minh.", "jp": "あなた（<ruby>男性<rt>だんせい</rt></ruby>）", "jp_a": "お<ruby>名前<rt>なまえ</rt></ruby>は？", "jp_b": "ミンです。", "en": "You (male)", "en_a": "What's your name?", "en_b": "I'm Minh.", "tag": "Pronoun"}, {"no": 28, "cat": "Core Basic", "vn": "Chị", "vn_a": "Chị có rảnh không?", "vn_b": "Rảnh, có việc gì anh?", "jp": "あなた（<ruby>女性<rt>じょせい</rt></ruby>）", "jp_a": "お<ruby>時間<rt>じかん</rt></ruby>ありますか。", "jp_b": "ありますよ、<ruby>何<rt>なに</rt></ruby>？", "en": "You (female)", "en_a": "Are you free?", "en_b": "Yes, what's up?", "tag": "Pronoun"}, {"no": 29, "cat": "Core Basic", "vn": "Em", "vn_a": "Em bao nhiêu tuổi?", "vn_b": "Em 25 tuổi.", "jp": "あなた（<ruby>年下<rt>としした</rt></ruby>）", "jp_a": "<ruby>何歳<rt>なんさい</rt></ruby>ですか。", "jp_b": "25<ruby>歳<rt>さい</rt></ruby>です。", "en": "You (younger)", "en_a": "How old are you?", "en_b": "I'm 25.", "tag": "Pronoun"}, {"no": 30, "cat": "Core Basic", "vn": "Bạn", "vn_a": "Bạn từ đâu đến?", "vn_b": "Tôi từ Seoul.", "jp": "<ruby>友達<rt>ともだち</rt></ruby>", "jp_a": "どこから<ruby>来<rt>き</rt></ruby>ましたか。", "jp_b": "ソウルからです。", "en": "Friend / You", "en_a": "Where are you from?", "en_b": "From Seoul.", "tag": "Pronoun"}, {"no": 31, "cat": "Core Basic", "vn": "Chúng tôi", "vn_a": "Các anh từ đâu?", "vn_b": "Chúng tôi từ Hàn Quốc.", "jp": "<ruby>私<rt>わたし</rt></ruby>たち", "jp_a": "どちらから？", "jp_b": "<ruby>韓国<rt>かんこく</rt></ruby>からです。", "en": "We", "en_a": "Where are you t></ruby>した<ruby>通<rt>とお</rt></ruby>り", "jp_a": "<ruby>昨日<rt>きのう</rt></ruby><ruby>話<rt>はな</rt></ruby>した<ruby>通<rt>とお</rt></ruby>り。", "jp_b": "はい、<ruby>覚<rt>おぼ</rt></ruby>えています。", "en": "As discussed", "en_a": "As we discussed yesterday.", "en_b": "Yes, I remember.", "tag": "EmailPhrase"}, {"no": 789, "cat": "Business Phrases", "vn": "Rất vui hợp tác", "vn_a": "Rất vui được hợp tác.", "vn_b": "Chúng tôi cũng vui.", "jp": "お<ruby>取引<rt>とりひき</rt></ruby>できて<ruby>嬉<rt>うれ</rt></ruby>しい", "jp_a": "お<ruby>取引<rt>とりひき</rt></ruby>できて<ruby>嬉<rt>うれ</rt></ruby>しいです。", "jp_b": "こちらこそ。", "en": "Pleasure doing business", "en_a": "Pleasure to work with you.", "en_b": "Likewise.", "tag": "ClientPhrase"}, {"no": 790, "cat": "Business Phrases", "vn": "Sẽ giải quyết ngay", "vn_a": "Có vấn đề phát sinh.", "vn_b": "Sẽ giải quyết ngay.", "jp": "すぐ<ruby>対応<rt>たいおう</rt></ruby>します", "jp_a": "<ruby>問題<rt>もんだい</rt></ruby>が<ruby>発生<rt>はっせい</rt></ruby>しました。", "jp_b": "すぐ<ruby>対応<rt>たいおう</rt></ruby>します。", "en": "We'll resolve it", "en_a": "There's an issue.", "en_b": "We'll handle it right away.", "tag": "ClientPhrase"}, {"no": 791, "cat": "Business Phrases", "vn": "Cảm ơn tin tưởng", "vn_a": "Cảm ơn anh đã tin tưởng.", "vn_b": "Vì chất lượng tốt.", "jp": "ご<ruby>信頼<rt>しんらい</rt></ruby>ありがとう", "jp_a": "ご<ruby>信頼<rt>しんらい</rt></ruby>ありがとうございます。", "jp_b": "<ruby>品質<rt>ひんしつ</rt></ruby>がいいからね。", "en": "Thanks for your trust", "en_a": "Thank you for trusting us.", "en_b": "Because of good quality.", "tag": "ClientPhrase"}, {"no": 792, "cat": "Business Phrases", "vn": "Phản hồi quan trọng", "vn_a": "Phản hồi của anh rất quan trọng.", "vn_b": "Cảm ơn, tôi sẽ góp ý thêm.", "jp": "フィードバックは<ruby>大切<rt>たいせつ</rt></ruby>", "jp_a": "ご<ruby>意見<rt>いけん</rt></ruby>はとても<ruby>重要<rt>じゅうよう</rt></ruby>です。", "jp_b": "ありがとう、また<ruby>意見<rt>いけん</rt></ruby>を<ruby>出<rt>だ</rt></ruby>します。", "en": "Feedback matters", "en_a": "Your feedback is important.", "en_b": "Thanks, I'll share more.", "tag": "ClientPhrase"}, {"no": 793, "cat":  "vn": "Ở bao lâu", "vn_a": "Ở Việt Nam bao lâu?", "vn_b": "1 tuần.", "jp": "どのくらい<ruby>滞在<rt>たいざい</rt></ruby>", "jp_a": "ベトナムにどのくらい？", "jp_b": "1<ruby>週間<rt>しゅうかん</rt></ruby>。", "en": "How long staying?", "en_a": "How long in Vietnam?", "en_b": "1 week.", "tag": "SmallTalk"}, {"no": 799, "cat": "Business Phrases", "vn": "Để tôi đưa đi", "vn_a": "Muốn đi thăm đâu không?", "vn_b": "Để tôi đưa anh đi.", "jp": "ご<ruby>案内<rt>あんない</rt></ruby>します", "jp_a": "どこか<ruby>行<rt>い</rt></ruby>きたい？", "jp_b": "ご<ruby>案内<rt>あんない</rt></ruby>しますよ。", "en": "Let me show you", "en_a": "Want to visit anywhere?", "en_b": "Let me show you around.", "tag": "SmallTalk"}, {"no": 800, "cat": "Business Phrases", "vn": "Lần sau ghé Hàn nhé", "vn_a": "Lần sau mời anh đến Hàn Quốc.", "vn_b": "Nhất định, cảm ơn!", "jp": "<ruby>今度<rt>こんど</rt></ruby><ruby>韓国<rt>かんこく</rt></ruby>にも", "jp_a": "<ruby>今度<rt>こんど</rt></ruby><ruby>韓国<rt>かんこく</rt></ruby>にも<ruby>来<rt>き</rt></ruby>てね。", "jp_b": "ぜひ、ありがとう！", "en": "Visit Korea next time", "en_a": "Come to Korea next time.", "en_b": "Definitely, thanks!", "tag": "SmallTalk"}, {"no": 801, "cat": "친구 대화", "vn": "lời chào buổi sáng", "vn_a": "A: Chào em yêu, em ngủ ngon không?\nB: Em ngủ ngon lắm. Còn anh thì sao?", "vn_b": "A: Anh cũng vậy. Em đẹp như thiên thần buổi sáng.\nB: Anh nịnh em hoài à!", "jp": "", "jp_a": "A: こんにちは、ハニー、よく眠れましたか？\nB: とてもよく眠れました。あなたはどうですか？", "jp_b": "A: あなたも。朝のあなたは天使のように美しいです。\nB: あなたはいつも私にお世辞を言っていますか？", "en": "good morning", "en_a": "A: Hello honey, did you sleep well?\nB: I slept very well. What about you?", "en_b": "A: You too. You are as beautiful as an angel in the morning.\nB: Are you always flattering me?", "tag": "일상생활"}, {"no": 802, "cat": "친구 대화", "vn": "chúc ngủ ngon", "vn_a": "B: Anh ơi, em buồn ngủ rồi.\nA: Vậy em đi ngủ đi, mơ đẹp nhé.", "vn_b": "B: Anh cũng ngủ sớm đi, đừng thức khuya.\nA: Ừ, anh yêu em. Chúc ngủ ngon.", "jp": "", "jp_a": "B: ハニー、眠いよ。\nA: だから寝てください、良い夢を見ましょう。", "jp_b": "B: 夜更かししないで、早めに寝ましょう。\nA: はい、愛しています。おやすみ。", "en": "Good night", "en_a": "B: Honey, I'm sleepy.\nA: So go to sleep, sweet dreams.", "en_b": "B: Go to bed early too, don't stay up late.\nA: Yes, I love you. Good night.", "tag": "일상생활"}, {"no": 803, "cat": "친구 대화", "vn": "bữa sáng", "vn_a": "B: Anh muốn ăn gì sáng nay?\nA: Cho anh phở đi, em nấu phở ngon nhất.", "vn_b": "B: Vậy đợi em một chút nhé.\nA: Để anh phụ em nha.", "jp": "", "jp_a": "B: 今朝は何を食べたいですか？\nA: フォーをください、私が最高のフォーを作ります。", "jp_b": "B: それで、少し待ってください。\nA: お手伝いさせてください。", "en": "breakfast", "en_a": "B: What do you want to eat this morning?\nA: Give me pho, I cook the best pho.", "en_b": "B: So wait for me a bit.\nA: Let me help you.", "tag": "일상생활"}, {"no": 804, "cat": "친구 대화", "vn": "Cùng nhau nấu ăn", "vn_a": "A: Em thái rau, anh nấu thịt nhé.\nB: Anh nhớ đừng cho nhiều muối quá đấy.", "vn_b": "A: Yên tâm đi, anh là đầu bếp mà.\nB: Đầu bếp gì! Lần trước cháy hết rồi.", "jp": "", "jp_a": "A: あなたが野菜を切って、私が肉を調理します。\nB: 塩を入れすぎないように注意してください。", "jp_b": "A: 心配しないでください、私はシェフです。\nB: なんとシェフだ！前回は燃え尽きました。", "en": "Cook together", "en_a": "A: You chop the vegetables, I'll cook the meat.\nB: Remember not to add too much salt.", "en_b": "A: Don't worry, I'm a chef.\nB: What chef! Last time it burned out.", "tag": "일상생활"}, {"no": 805, "cat": "친구 대화", "vn": "Vui lòng rửa bát", "vn_a": "B: Anh ơi, hôm nay anh rửa bát nhé.\nA: Anh vừa rửa hôm qua mà.", "vn_b": "B: Nhưng hôm nay em mệt lắm.\nA: Được rồi, em nghỉ đi, để anh làm.", "jp": "", "jp_a": "B: ハニー、今日はお皿を洗ってください。\nA: 昨日洗ったばかりです。", "jp_b": "B: でも今日はとても疲れています。\nA: さて、休憩して、やらせてください。", "en": "Please wash the dishes", "en_a": "B: Honey, please wash the dishes today.\nA: I just washed it yesterday.", "en_b": "B: But today I'm very tired.\nA: Okay, take a break and let me do it.", "tag": "일상생활"}, {"no": 806, "cat": "친구 대화", "vn": "rửa", "vn_a": "B: Quần áo nhiều quá, anh phụ em giặt nhé.\nA: Để anh cho vào máy, em phơi nhé.", "vn_b": "B: Nhớ phân loại quần áo trắng và màu nha.\nA: Anh biết rồi, không phải lần đầu đâu.", "jp": "", "jp_a": "B: 洋服が多すぎるので、洗うのを手伝ってください。\nA: 機械に入れて乾燥させます。", "jp_b": "B: 白と色物の服を分別することを忘れないでください。\nA: わかっています、これが初めてではありません。", "en": "wash", "en_a": "B: There are too many clothes, please help me wash them.\nA: Let me put it in the machine so you can dry it.", "en_b": "B: Remember to sort white and colored clothes.\nA: I know, it's not the first time.", "tag": "일상생활"}, {"no": 807, "cat": "친구 대화", "vn": "dọn dẹp cuối tuần", "vn_a": "A: Cuối tuần này mình dọn nhà nhé.\nB: Em quét nhà, anh lau sàn được không?", "vn_b": "A: Ok, sau đó mình ăn ngoài nha.\nB: Tuyệt! Em muốn ăn lẩu.", "jp": "", "jp_a": "A: 今週末に家の掃除をします。\nB: 床を掃除するのですが、床を掃除してもらえますか？", "jp_b": "A: よし、じゃあ外食しよう。\nB: 素晴らしい！鍋が食べたいです。", "en": "weekend cleaning", "en_a": "A: I'll clean the house this weekend.\nB: I sweep the floor, can you clean the floor?", "en_b": "A: Ok, then let's eat out.\nB: Great! I want to eat hot pot.", "tag": "일상생활"}, {"no": 808, "cat": "친구 대화", "vn": "siêu thị mua sắm", "vn_a": "B: Anh đẩy xe đi, em chọn đồ.\nA: Mình cần mua gì hôm nay?", "vn_b": "B: Sữa, trứng, rau và một ít trái cây.\nA: Đừng quên mua bia cho anh.", "jp": "", "jp_a": "B: 私はカートを押します、あなたは物を選びます。\nA: 今日は何を買う必要がありますか?", "jp_b": "B: 牛乳、卵、野菜、果物。\nA: ビールを買ってくるのを忘れないでね。", "en": "shopping supermarket", "en_a": "B: I push the cart, you choose the things.\nA: What do I need to buy today?", "en_b": "B: Milk, eggs, vegetables and some fruit.\nA: Don't forget to buy me beer.", "tag": "일상생활"}, {"no": 809, "cat": "친구 대화", "vn": "Chuẩn bị đi ra ngoài", "vn_a": "B: Anh ơi, em nên mặc cái nào?\nA: Cái váy đỏ đẹp hơn, hợp với em lắm.", "vn_b": "B: Thế anh đợi em trang điểm chút nhé.\nA: Em xinh sẵn rồi mà, nhanh lên kẻo trễ.", "jp": "", "jp_a": "B: ハニー、どれを着ればいいの？\nA: 赤いドレスの方が美しくて、とてもよく似合っています。", "jp_b": "B: それでは、お化粧してお待ちしております。\nA: あなたはすでにきれいです、早くしないと遅れてしまいます。", "en": "Prepare to go out", "en_a": "B: Honey, which one should I wear?\nA: The red dress is more beautiful, it suits you very well.", "en_b": "B: So I'll wait for you to put on some makeup.\nA: You're already pretty, hurry up or you'll be late.", "tag": "일상생활"}, {"no": 810, "cat": "친구 대화", "vn": "đi làm", "vn_a": "A: Anh đi làm đây, em ở nhà nhé.\nB: Lái xe cẩn thận, đến nơi nhắn em.", "vn_b": "A: Trưa anh sẽ gọi em ăn cơm cùng.\nB: Vâng, em chờ anh.", "jp": "", "jp_a": "A: 私は仕事に行くので、あなたは家にいてください。\nB: 慎重に運転して、到着したらメールしてください。", "jp_b": "A: 昼になったら、一緒に食事するために電話します。\nB: はい、お待ちしています。", "en": "go to work", "en_a": "A: I'm going to work, you stay home.\nB: Drive carefully, text me when you get there.", "en_b": "A: At noon, I will call you to eat with me.\nB: Yes, I'm waiting for you.", "tag": "일상생활"}, {"no": 811, "cat": "친구 대화", "vn": "Trở về nhà sau giờ làm việc", "vn_a": "B: Anh về rồi à? Hôm nay mệt không?\nA: Mệt lắm em, sếp giao nhiều việc quá.", "vn_b": "B: Em nấu canh nóng cho anh nhé.\nA: Em là thiên thần của anh.", "jp": "", "jp_a": "B: 戻ってきましたか？今日は疲れていますか？\nA: 上司が私に仕事を割り当てすぎて、とても疲れています。", "jp_b": "B: 温かいスープを作りますよ。\nA: あなたは私の天使です。", "en": "Return home after work", "en_a": "B: Are you back? Are you tired today?\nA: I'm so tired, my boss assigned me too much work.", "en_b": "B: I'll cook hot soup for you.\nA: You are my angel.", "tag": "일상생활"}, {"no": 812, "cat": "친구 대화", "vn": "Lập kế hoạch cuối tuần của bạn", "vn_a": "A: Cuối tuần này em muốn đi đâu?\nB: Mình đi biển đi anh, lâu rồi không đi.", "vn_b": "A: Vũng Tàu hay Phú Quốc?\nB: Vũng Tàu thôi, gần và tiết kiệm.", "jp": "", "jp_a": "A: 今週末どこに行きたいですか？\nB: ビーチに行きましょう、長いこと行っていないので。", "jp_b": "A: ブンタウかフーコックか？\nB: ちょうどブンタウ、近くて経済的です。", "en": "Plan your weekend", "en_a": "A: Where do you want to go this weekend?\nB: Let's go to the beach, I haven't been for a long time.", "en_b": "A: Vung Tau or Phu Quoc?\nB: Just Vung Tau, close and economical.", "tag": "일상생활"}, {"no": 813, "cat": "친구 대화", "vn": "thức dậy", "vn_a": "A: Em ơi, dậy đi em, trễ giờ rồi.\nB: Cho em ngủ thêm năm phút nữa.", "vn_b": "A: Năm phút thật nhé, không thì anh cù em đó.\nB: Hihi, em dậy rồi, dậy rồi.", "jp": "", "jp_a": "A: ハニー、起きて、もう遅いよ。\nB: あと5分寝させてください。", "jp_b": "A: 本当に 5 分、そうでないとくすぐられます。\nB: ハイハイ、起きてる、起きてる。", "en": "wake up", "en_a": "A: Honey, wake up, it's late.\nB: Let me sleep for five more minutes.", "en_b": "A: Five minutes really, otherwise I'll tickle you.\nB: Hihi, I'm awake, I'm awake.", "tag": "일상생활"}, {"no": 814, "cat": "친구 대화", "vn": "tách cà phê", "vn_a": "B: Anh uống cà phê không, em pha cho?\nA: Cho anh cà phê sữa đá nhé.", "vn_b": "B: Lúc nào cũng cà phê sữa đá!\nA: Vì em pha ngon nhất Sài Gòn.", "jp": "", "jp_a": "B: コーヒーは飲みますか？作ってもらえますか？\nA: アイスミルクコーヒーをください。", "jp_b": "B: いつもアイスミルクコーヒー！\nA: なぜなら私はサイゴンで最高のビールを醸造しているからです。", "en": "cup of coffee", "en_a": "B: Do you want some coffee? Can I make it for you?\nA: Please give me iced milk coffee.", "en_b": "B: Always iced milk coffee!\nA: Because I brew the best in Saigon.", "tag": "일상생활"}, {"no": 815, "cat": "친구 대화", "vn": "Đóng gói bữa trưa của bạn", "vn_a": "A: Trưa em ăn chưa?\nB: Chưa, em đợi anh gọi.", "vn_b": "A: Em ra ngoài ăn đi, đừng nhịn.\nB: Vâng, lát em đi với đồng nghiệp.", "jp": "", "jp_a": "A: もう昼食は食べましたか？\nB: いいえ、あなたからの電話を待っています。", "jp_b": "A: 我慢しないで外食しましょう。\nB: はい、後で同僚と行きます。", "en": "Pack your lunch", "en_a": "A: Have you eaten lunch yet?\nB: No, I'm waiting for you to call.", "en_b": "A: Go out to eat, don't hold back.\nB: Yes, I'll go with my colleagues later.", "tag": "일상생활"}, {"no": 816, "cat": "친구 대화", "vn": "nói anh yêu em", "vn_a": "A: Em biết anh yêu em nhiều lắm không?\nB: Em biết, anh nói mỗi ngày mà.", "vn_b": "A: Vì anh sợ em quên thôi.\nB: Em không bao giờ quên đâu, em cũng yêu anh.", "jp": "", "jp_a": "A: 私がどれだけあなたを愛しているか知っていますか？\nB: ご存知のように、私は毎日それを言います。", "jp_b": "A: 忘れてしまうのが怖いから。\nB: 私は決して忘れません、私もあなたを愛しています。", "en": "say I love you", "en_a": "A: Do you know how much I love you?\nB: You know, I say it every day.", "en_b": "A: Because I'm afraid you'll forget.\nB: I will never forget, I love you too.", "tag": "애정 표현"}, {"no": 817, "cat": "친구 대화", "vn": "nhớ bạn", "vn_a": "B: Anh ơi, em nhớ anh quá.\nA: Anh cũng nhớ em, công việc làm anh bận quá.", "vn_b": "B: Tối nay anh về sớm nhé.\nA: Anh hứa, anh sẽ về nhanh nhất có thể.", "jp": "", "jp_a": "B: ハニー、あなたがいなくてとても寂しいです。\nA: 私もあなたがいなくて寂しいです、仕事がとても忙しいので。", "jp_b": "B: 今夜は早く帰ってきてください。\nA: できるだけ早く戻ってくることを約束します。", "en": "miss you", "en_a": "B: Honey, I miss you so much.\nA: I miss you too, work keeps me so busy.", "en_b": "B: Please come home early tonight.\nA: I promise, I will return as quickly as possible.", "tag": "애정 표현"}, {"no": 818, "cat": "친구 대화", "vn": "Ôm", "vn_a": "B: Anh ôm em một cái đi.\nA: Em sao thế, có chuyện gì à?", "vn_b": "B: Không có gì, chỉ muốn được anh ôm thôi.\nA: Lại đây, anh ôm em mãi cũng được.", "jp": "", "jp_a": "B: 抱きしめてください。\nA: どうしたのですか、何か問題がありますか？", "jp_b": "B: 何もない、ただあなたに抱きしめられたいだけ。\nA: ここに来て、私はあなたを永遠に抱きしめることができます。", "en": "Hug", "en_a": "B: Give me a hug.\nA: What's wrong, is something wrong?", "en_b": "B: Nothing, just want to be hugged by you.\nA: Come here, I can hug you forever.", "tag": "애정 표현"}, {"no": 819, "cat": "친구 대화", "vn": "khen ngợi vẻ ngoài của một người", "vn_a": "A: Hôm nay em đẹp lắm đấy.\nB: Thật không hay là anh nịnh em?", "vn_b": "A: Anh nói thật, em luôn đẹp trong mắt anh.\nB: Anh là người đàn ông biết nói nhất!", "jp": "", "jp_a": "A: 今日のあなたはとても美しいですね。\nB: お世辞って本当ですか？", "jp_b": "A: 実を言うと、私の目にはあなたはいつも美しいです。\nB: あなたは一番おしゃべりな人です！", "en": "Compliment a person's appearance", "en_a": "A: You are very beautiful today.\nB: Is it true that you flatter me?", "en_b": "A: I tell the truth, you are always beautiful in my eyes.\nB: You are the most talkative man!", "tag": "애정 표현"}, {"no": 820, "cat": "친구 대화", "vn": "hồi tưởng lần đầu gặp gỡ", "vn_a": "B: Anh còn nhớ lần đầu mình gặp nhau không?\nA: Nhớ chứ, em mặc áo trắng, đẹp lắm.", "vn_b": "B: Lúc đó em đã thích anh rồi.\nA: Anh cũng vậy, đó là duyên trời định.", "jp": "", "jp_a": "B: 私たちが初めて会ったときのことを覚えていますか？\nA: 覚えておいてください、あなたは白いシャツを着ていました、とても美しいです。", "jp_b": "B: その時、私はもうあなたのことが好きでした。\nA: あなたも、それは運命です。", "en": "Reminisce about the first time we met", "en_a": "B: Do you remember the first time we met?\nA: Remember, you wore a white shirt, very beautiful.", "en_b": "B: At that time, I already liked you.\nA: You too, it's destiny.", "tag": "애정 표현"}, {"no": 821, "cat": "친구 대화", "vn": "Bày tỏ lòng biết ơn", "vn_a": "B: Cảm ơn anh đã luôn ở bên em.\nA: Đó là chuyện đương nhiên mà em.", "vn_b": "B: Em may mắn lắm khi gặp anh.\nA: Anh mới là người may mắn nhất.", "jp": "", "jp_a": "B: いつもそばにいてくれてありがとう。\nA: それは自然なことです。", "jp_b": "B: あなたに出会えてとても幸運です。\nA: あなたは最も幸運な人です。", "en": "Express gratitude", "en_a": "B: Thank you for always being by my side.\nA: That's a natural thing.", "en_b": "B: I'm very lucky to have met you.\nA: You are the luckiest person.", "tag": "애정 표현"}, {"no": 822, "cat": "친구 대화", "vn": "nắm tay", "vn_a": "A: Đưa tay đây anh nắm.\nB: Tay anh ấm quá.", "vn_b": "A: Vì có em nên mới ấm.\nB: Anh dẻo miệng nhỉ!", "jp": "", "jp_a": "A: 手を貸してください、そうすれば握ります。\nB: あなたの手はとても暖かいです。", "jp_b": "A: あなたがいるから、私は暖かい。\nB: とても優しい話し方ですね！", "en": "hold hand", "en_a": "A: Give me your hand and I'll hold it.\nB: Your hand is so warm.", "en_b": "A: Because I have you, I am warm.\nB: You're so soft-spoken!", "tag": "애정 표현"}, {"no": 823, "cat": "친구 대화", "vn": "yêu cầu hôn", "vn_a": "A: Cho anh hôn em một cái nhé.\nB: Anh hỏi gì kỳ vậy, hôn đi!", "vn_b": "A: Anh muốn hỏi cho lịch sự thôi.\nB: Lịch sự gì mà má đỏ thế kia.", "jp": "", "jp_a": "A: キスしてください。\nB: なぜそんなに変なことを聞​​くのですか？キスして！", "jp_b": "A: ただ丁寧に聞きたいだけです。\nB: 頬が赤くなるほどの礼儀とは何ですか？", "en": "ask for a kiss", "en_a": "A: Please give me a kiss.\nB: Why are you asking so strangely? Kiss me!", "en_b": "A: I just want to ask politely.\nB: What kind of politeness makes your cheeks so red?", "tag": "애정 표현"}, {"no": 824, "cat": "친구 대화", "vn": "gọi bằng biệt danh", "vn_a": "A: Em yêu, lại đây với anh.\nB: Sao anh gọi em ngọt thế?", "vn_b": "A: Vì em là em yêu của anh mà.\nB: Anh muốn gì, nói thẳng đi.", "jp": "", "jp_a": "A: ベイビー、ここに来て。\nB: なぜ私をそんなに甘いと呼ぶのですか？", "jp_b": "A: だってあなたは私の最愛の人だから。\nB: なんでしょう？はっきり言ってください。", "en": "called by nickname", "en_a": "A: Baby, come here to me.\nB: Why do you call me so sweet?", "en_b": "A: Because you are my darling.\nB: What do you want? Say it straight.", "tag": "애정 표현"}, {"no": 825, "cat": "친구 대화", "vn": "món quà bất ngờ", "vn_a": "A: Em nhắm mắt lại, anh có món quà cho em.\nB: Quà gì vậy anh?", "vn_b": "A: Mở mắt ra đi, một bó hoa hồng.\nB: Trời ơi, anh làm em cảm động quá.", "jp": "", "jp_a": "A: 目を閉じて、あなたにプレゼントがあります。\nB: あなたの贈り物は何ですか？", "jp_b": "A: 目を開けると、バラの花束。\nB: ああ、なんてことだ、あなたは私をとても感動させます。", "en": "surprise gift", "en_a": "A: Close your eyes, I have a gift for you.\nB: What's your gift?", "en_b": "A: Open your eyes, a bouquet of roses.\nB: Oh my god, you make me so emotional.", "tag": "애정 표현"}, {"no": 826, "cat": "친구 대화", "vn": "Khi tôi cảm động", "vn_a": "B: Anh thật sự là người tốt nhất em từng gặp.\nA: Anh chỉ làm những gì người yêu nên làm.", "vn_b": "B: Em sẽ trân trọng anh suốt đời.\nA: Anh cũng vậy, em là tất cả của anh.", "jp": "", "jp_a": "B: あなたは本当に私が今まで会った中で最高の人です。\nA: 彼は恋人としてすべきことをしただけです。", "jp_b": "B: 私はあなたを永遠に大切にします。\nA: 私も、あなたは私のすべてです。", "en": "When I'm emotional", "en_a": "B: You are truly the best person I have ever met.\nA: He just did what a lover should do.", "en_b": "B: I will cherish you forever.\nA: Me too, you are my everything.", "tag": "애정 표현"}, {"no": 827, "cat": "친구 대화", "vn": "nói rằng bạn hạnh phúc", "vn_a": "B: Bên anh em hạnh phúc lắm.\nA: Anh muốn em mãi hạnh phúc như vậy.", "vn_b": "B: Có anh là đủ rồi.\nA: Anh sẽ cố gắng để em không bao giờ buồn.", "jp": "", "jp_a": "B: 私は皆さんにとても満足しています。\nA: いつまでも幸せでいてほしいです。", "jp_b": "B: あなたがいれば十分です。\nA: 決して悲しまないように頑張ります。", "en": "say you are happy", "en_a": "B: I'm very happy with you guys.\nA: I want you to be happy forever.", "en_b": "B: Having you is enough.\nA: I will try so that you are never sad.", "tag": "애정 표현"}, {"no": 828, "cat": "친구 대화", "vn": "xưng", "vn_a": "A: Em à, anh muốn nói với em một điều.\nB: Chuyện gì vậy anh, sao nghiêm trọng thế?", "vn_b": "A: Anh thật sự rất yêu em.\nB: Anh làm em cười rồi, em cũng yêu anh.", "jp": "", "jp_a": "A: ハニー、言いたいことがあります。\nB: 何が起こっているのですか、なぜそんなに深刻ですか？", "jp_b": "A: 本当に愛しています。\nB: あなたは私を笑わせてくれます、私もあなたを愛しています。", "en": "confess", "en_a": "A: Honey, I want to tell you something.\nB: What's going on, why is it so serious?", "en_b": "A: I really love you.\nB: You make me laugh, I love you too.", "tag": "애정 표현"}, {"no": 829, "cat": "친구 대화", "vn": "gửi và nhận tin nhắn", "vn_a": "B: Anh đang làm gì vậy?\nA: Anh đang nghĩ về em.", "vn_b": "B: Anh dỗi à? Sao tự nhiên ngọt thế?\nA: Yêu em không cần lý do.", "jp": "", "jp_a": "B: 何してるの？\nA: あなたのことを考えています。", "jp_b": "B: 拗ねてるの？なぜこんなに自然な甘さなのでしょうか？\nA: 理由もなくあなたを愛しています。", "en": "send and receive messages", "en_a": "B: What are you doing?\nA: I'm thinking about you.", "en_b": "B: Are you sulking? Why is it so naturally sweet?\nA: Love you without any reason.", "tag": "애정 표현"}, {"no": 830, "cat": "친구 대화", "vn": "tin nhắn buổi sáng", "vn_a": "A: Chào buổi sáng em yêu.\nB: Anh dậy sớm thế?", "vn_b": "A: Anh muốn là người đầu tiên chúc em ngày tốt lành.\nB: Em yêu anh nhiều lắm.", "jp": "", "jp_a": "A: おはようございます、恋人。\nB: そんなに早く起きますか？", "jp_b": "A: 良い一日をお祈りしたいと思います。\nB: あなたをとても愛しています。", "en": "morning message", "en_a": "A: Good morning, sweetheart.\nB: You get up so early?", "en_b": "A: I want to be the first to wish you a good day.\nB: I love you so much.", "tag": "애정 표현"}, {"no": 831, "cat": "친구 대화", "vn": "rạp chiếu phim", "vn_a": "B: Mình xem phim gì hôm nay?\nA: Phim hành động hay phim tình cảm?", "vn_b": "B: Em muốn xem phim tình cảm.\nA: Vậy mình xem phim đó nhé, anh mua bắp rang.", "jp": "", "jp_a": "B: 今日は何の映画を見るべきですか?\nA: アクション映画ですか、それとも恋愛映画ですか？", "jp_b": "B: ロマンチックな映画を見たいです。\nA: それで、その映画を見ましょう、ポップコーンを買います。", "en": "cinema", "en_a": "B: What movie should I watch today?\nA: Action movie or romantic movie?", "en_b": "B: I want to watch a romantic movie.\nA: So let's watch that movie, I'll buy popcorn.", "tag": "데이트"}, {"no": 832, "cat": "친구 대화", "vn": "quán cà phê", "vn_a": "A: Em uống gì? Cà phê hay trà sữa?\nB: Cho em trà sữa trân châu.", "vn_b": "A: Ngồi trong hay ngoài?\nB: Mình ngồi gần cửa sổ đi.", "jp": "", "jp_a": "A: 何を飲みますか？コーヒーとかミルクティーとか？\nB: パールミルクティーをください。", "jp_b": "A: 内側に座りますか、それとも外側に座りますか？\nB: 窓の近くに座りましょう。", "en": "cafe", "en_a": "A: What do you drink? Coffee or milk tea?\nB: Give me pearl milk tea.", "en_b": "A: Sit inside or outside?\nB: Let's sit near the window.", "tag": "데이트"}, {"no": 833, "cat": "친구 대화", "vn": "nhà hàng", "vn_a": "A: Em chọn món đi, anh trả tiền.\nB: Anh khách sáo gì, mình ăn cùng nhau mà.", "vn_b": "A: Hôm nay anh muốn chiêu đãi em.\nB: Vậy em chọn món đắt nhất nha!", "jp": "", "jp_a": "A: あなたが食べ物を選び、私が支払います。\nB: 礼儀正しくして、一緒に食べましょう。", "jp_b": "A: 今日はあなたを治療したいと思います。\nB: なので一番高いものを選びます！", "en": "restaurant", "en_a": "A: You choose the food, I pay.\nB: Why don't you be polite, let's eat together.", "en_b": "A: Today I want to treat you.\nB: So I choose the most expensive one!", "tag": "데이트"}, {"no": 834, "cat": "친구 대화", "vn": "đi dạo trong công viên", "vn_a": "B: Trời đẹp quá, mình đi dạo công viên đi.\nA: Anh mang theo nước cho em.", "vn_b": "B: Anh chu đáo thật.\nA: Vì anh muốn chăm sóc em.", "jp": "", "jp_a": "B: 天気がとてもいいので、公園に散歩に行きましょう。\nA: 水を持ってきてくれました。", "jp_b": "B: 本当に思慮深いですね。\nA: 大事にしたいから。", "en": "take a walk in the park", "en_a": "B: The weather is so beautiful, let's go for a walk in the park.\nA: I brought you water.", "en_b": "B: You're really thoughtful.\nA: Because I want to take care of you.", "tag": "데이트"}, {"no": 835, "cat": "친구 대화", "vn": "ngày đi biển", "vn_a": "B: Biển đẹp quá anh ơi!\nA: Mình chụp ảnh nhé.", "vn_b": "B: Anh nhớ chụp đẹp cho em đấy.\nA: Với anh, em luôn đẹp nhất.", "jp": "", "jp_a": "B: 海はとても美しいです！\nA: 写真を撮りましょう。", "jp_b": "B: 忘れずに私のために美しい写真を撮ってください。\nA: 私にとって、あなたはいつも一番美しいです。", "en": "beach day", "en_a": "B: The sea is so beautiful!\nA: Let's take pictures.", "en_b": "B: Remember to take beautiful photos for me.\nA: To me, you are always the most beautiful.", "tag": "데이트"}, {"no": 836, "cat": "친구 대화", "vn": "kế hoạch du lịch", "vn_a": "A: Tháng sau mình đi Đà Lạt nhé.\nB: Hay quá, em chưa đi bao giờ.", "vn_b": "A: Anh đặt khách sạn rồi đó.\nB: Trời, anh nhanh thật!", "jp": "", "jp_a": "A: 来月はダラットに行きます。\nB: すごい、まだ行ったことがないんです。", "jp_b": "A: もうホテルを予約しました。\nB: 神様、本当に早いですね！", "en": "travel plan", "en_a": "A: Next month I will go to Da Lat.\nB: Great, I've never been there before.", "en_b": "A: I booked the hotel already.\nB: God, you're so fast!", "tag": "데이트"}, {"no": 837, "cat": "친구 대화", "vn": "Nhận phòng khách sạn", "vn_a": "A: Phòng này em thấy được không?\nB: Đẹp lắm, view biển luôn nè.", "vn_b": "A: Anh đặt riêng cho em đó.\nB: Cảm ơn anh, em yêu anh.", "jp": "", "jp_a": "A: この部屋を見てもいいですか？\nB: 海が見えてとても綺麗です。", "jp_b": "A: あなたのためだけに注文しました。\nB: ありがとう、愛しています。", "en": "Check in to the hotel", "en_a": "A: Can I see this room?\nB: It's very beautiful, with a sea view.", "en_b": "A: I ordered it just for you.\nB: Thank you, I love you.", "tag": "데이트"}, {"no": 838, "cat": "친구 대화", "vn": "chụp ảnh", "vn_a": "B: Anh ơi, chụp ảnh cho em đi.\nA: Em đứng nghiêng người chút, đẹp hơn.", "vn_b": "B: Đẹp không anh?\nA: Đẹp lắm, để anh đăng Facebook khoe.", "jp": "", "jp_a": "B: ハニー、写真を撮って。\nA: 少し横に立った方が綺麗です。", "jp_b": "B: 綺麗じゃないですか？\nA: とても美しいので、フェイスブックに投稿して自慢させてください。", "en": "take a photo", "en_a": "B: Honey, take a photo for me.\nA: I stand a little sideways, it's more beautiful.", "en_b": "B: Isn't it beautiful?\nA: It's so beautiful, let me post it on Facebook to show off.", "tag": "데이트"}, {"no": 839, "cat": "친구 대화", "vn": "karaoke", "vn_a": "A: Em hát bài gì cho anh nghe đi.\nB: Em hát \"Người Yêu Cũ\" của Phan Mạnh Quỳnh nhé.", "vn_b": "A: Bài đó buồn lắm, hát bài vui đi.\nB: Vậy mình song ca nhé.", "jp": "", "jp_a": "A: あなたのためにどんな歌を歌えばいいですか？\nB: ファン・マン・クインの「Ex-Lover」を歌ってみましょう。", "jp_b": "A: その歌はとても悲しいので、楽しい歌を歌いましょう。\nB: それではデュエットを歌いましょう。", "en": "karaoke", "en_a": "A: What song should I sing for you?\nB: Let's sing \"Ex-Lover\" by Phan Manh Quynh.", "en_b": "A: That song is so sad, let's sing a happy song.\nB: So let's sing a duet.", "tag": "데이트"}, {"no": 840, "cat": "친구 대화", "vn": "mua sắm", "vn_a": "B: Anh thấy cái áo này có hợp em không?\nA: Hợp lắm, em mặc cái nào cũng đẹp.", "vn_b": "B: Anh chỉ biết khen thôi.\nA: Vì sự thật là vậy mà.", "jp": "", "jp_a": "B: このシャツは私に似合っていると思いますか?\nA: とてもよく似合っていて、何を着ても美しく見えます。", "jp_b": "B: 褒めることしかできません。\nA: それが真実だからです。", "en": "shopping", "en_a": "B: Do you think this shirt suits me?\nA: It suits me very well, I look beautiful in whatever I wear.", "en_b": "B: I can only praise.\nA: Because that's the truth.", "tag": "데이트"}, {"no": 841, "cat": "친구 대화", "vn": "chợ đêm", "vn_a": "A: Đói chưa, mình ăn gì đi.\nB: Em muốn ăn bánh tráng nướng.", "vn_b": "A: Để anh mua, em đứng đây nhé.\nB: Mua thêm chè cho em nha.", "jp": "", "jp_a": "A: お腹がすきましたか？何か食べましょう。\nB: ライスペーパーを焼いて食べたい。", "jp_b": "A: 買わせてください、あなたはここに立ってください。\nB: もっとお茶を買ってきてください。", "en": "night market", "en_a": "A: Are you hungry? Let's eat something.\nB: I want to eat grilled rice paper.", "en_b": "A: Let me buy it, you stand here.\nB: Buy me more tea.", "tag": "데이트"}, {"no": 842, "cat": "친구 대화", "vn": "bảo tàng", "vn_a": "B: Anh có thích lịch sử không?\nA: Có chứ, đặc biệt là cổ vật.", "vn_b": "B: Em thích nghệ thuật hơn.\nA: Vậy mình bổ sung cho nhau.", "jp": "", "jp_a": "B: 歴史は好きですか？\nA: はい、特に骨董品です。", "jp_b": "B: アートがもっと好きになりました。\nA: だから私たちはお互いを補い合うのです。", "en": "museum", "en_a": "B: Do you like history?\nA: Yes, especially antiques.", "en_b": "B: I like art more.\nA: So we complement each other.", "tag": "데이트"}, {"no": 843, "cat": "친구 대화", "vn": "công viên giải trí", "vn_a": "B: Em sợ tàu lượn lắm!\nA: Có anh đây, không sợ.", "vn_b": "B: Hứa nắm tay em chặt nhé.\nA: Anh không bao giờ buông tay em đâu.", "jp": "", "jp_a": "B: ジェットコースターはとても怖いです！\nA: 私はここにいるよ、怖がらないで。", "jp_b": "B: 私の手をしっかり握ると約束してください。\nA: 私はあなたの手を決して離しません。", "en": "amusement park", "en_a": "B: I'm so afraid of roller coasters!\nA: I'm here, don't be afraid.", "en_b": "B: Promise to hold my hand tightly.\nA: I will never let go of your hand.", "tag": "데이트"}, {"no": 844, "cat": "친구 대화", "vn": "Xem cảnh đêm", "vn_a": "A: Sài Gòn về đêm đẹp quá.\nB: Em thích ngắm đèn thành phố.", "vn_b": "A: Đẹp nhưng không bằng em.\nB: Lại nịnh nữa rồi.", "jp": "", "jp_a": "A: サイゴンの夜はとても美しいです。\nB: 私は街の明かりを見るのが好きです。", "jp_b": "A: 美しいですが、あなたほどではありません。\nB: またまたお世辞。", "en": "See the night scene", "en_a": "A: Saigon at night is so beautiful.\nB: I like watching city lights.", "en_b": "A: Beautiful but not as good as you.\nB: Flattery again.", "tag": "데이트"}, {"no": 845, "cat": "친구 대화", "vn": "Ngày kết thúc", "vn_a": "A: Trễ rồi, anh đưa em về nhé.\nB: Hôm nay vui quá.", "vn_b": "A: Mai mình lại đi chơi nữa nhé.\nB: Hứa rồi đó, không được nuốt lời.", "jp": "", "jp_a": "A: もう遅いので家まで送ってください。\nB: 今日はとても楽しいです。", "jp_b": "A: 明日また出かけましょう。\nB: 約束したのに、約束を反故にしないでください。", "en": "End date", "en_a": "A: It's late, please take me home.\nB: Today is so fun.", "en_b": "A: Let's go out again tomorrow.\nB: You promised, don't go back on your word.", "tag": "데이트"}, {"no": 846, "cat": "친구 대화", "vn": "Khi bạn trễ hẹn", "vn_a": "B: Sao anh đến muộn vậy? Em đợi cả tiếng rồi.\nA: Xin lỗi em, kẹt xe quá.", "vn_b": "B: Lần nào cũng kẹt xe!\nA: Anh xin lỗi mà, đừng giận nha.", "jp": "", "jp_a": "B: なぜそんなに遅いのですか？ 1時間も待ってるんです。\nA: ごめんなさい、渋滞です。", "jp_b": "B: 毎回渋滞！\nA: ごめんなさい、怒らないでください。", "en": "When you're late for an appointment", "en_a": "B: Why are you so late? I've been waiting for an hour.\nA: Sorry, traffic jam.", "en_b": "B: Traffic jam every time!\nA: I'm sorry, don't be angry.", "tag": "갈등/화해"}, {"no": 847, "cat": "친구 대화", "vn": "Khi tôi chỉ nhìn vào điện thoại của mình", "vn_a": "B: Sao anh cứ chăm chăm nhìn điện thoại vậy?\nA: Anh đang xem tin tức thôi mà.", "vn_b": "B: Mình đi ăn cùng nhau, anh phải để ý em chứ.\nA: Xin lỗi em, anh cất điện thoại đây.", "jp": "", "jp_a": "B: なぜ携帯を見続けるのですか？\nA: ただニュースを見ているところです。", "jp_b": "B: 私たちは一緒に食事に行きます、あなたは私に注意しなければなりません。\nA: ごめんなさい、携帯電話をしまいました。", "en": "When I just look at my phone", "en_a": "B: Why do you keep looking at your phone?\nA: I'm just watching the news.", "en_b": "B: We go out to eat together, you have to pay attention to me.\nA: Sorry, I put my phone away.", "tag": "갈등/화해"}, {"no": 848, "cat": "친구 대화", "vn": "lòng ghen tị", "vn_a": "B: Cô đó là ai mà nhắn tin cho anh hoài vậy?\nA: Đồng nghiệp thôi, công việc thôi mà.", "vn_b": "B: Đồng nghiệp gì mà tin nhắn dài thế?\nA: Em xem này, toàn chuyện công việc.", "jp": "", "jp_a": "B: あなたにメールをし続けるあの女の子は誰ですか?\nA: ただの同僚、ただ仕事をするだけ。", "jp_b": "B: あんなに長いメッセージを送ってくる同僚は一体どんな人なのでしょうか？\nA: ほら、全部仕事の話だよ。", "en": "jealousy", "en_a": "B: Who is that girl that keeps texting you?\nA: Just colleagues, just work.", "en_b": "B: What kind of colleague has such long messages?\nA: Look, it's all about work.", "tag": "갈등/화해"}, {"no": 849, "cat": "친구 대화", "vn": "sự hiểu lầm", "vn_a": "A: Em hiểu lầm anh rồi.\nB: Em không hiểu lầm, em thấy rõ ràng.", "vn_b": "A: Để anh giải thích cho em nghe.\nB: Được, anh nói đi.", "jp": "", "jp_a": "A: 私はあなたのことを誤解していました。\nB: 誤解していません、はっきりとわかります。", "jp_b": "A: 説明させてください。\nB: わかりました、あなたはそれを言います。", "en": "misunderstanding", "en_a": "A: I misunderstood you.\nB: I don't misunderstand, I see clearly.", "en_b": "A: Let me explain it to you.\nB: Okay, you say it.", "tag": "갈등/화해"}, {"no": 850, "cat": "친구 대화", "vn": "xin lỗi", "vn_a": "A: Anh sai rồi, em tha lỗi cho anh nhé.\nB: Anh hứa không tái phạm chứ?", "vn_b": "A: Anh hứa, anh sẽ không bao giờ làm em buồn nữa.\nB: Vậy em tin anh lần này.", "jp": "", "jp_a": "A: 私は間違っていました、許してください。\nB: 二度としないと約束しますか？", "jp_b": "A: 約束します、もう二度とあなたを悲しませることはありません。\nB: だから今回はあなたを信頼します。", "en": "Sorry", "en_a": "A: I was wrong, please forgive me.\nB: Do you promise not to do it again?", "en_b": "A: I promise, I will never make you sad again.\nB: So I trust you this time.", "tag": "갈등/화해"}, {"no": 851, "cat": "친구 대화", "vn": "sự phản đối im lặng", "vn_a": "A: Em đừng im lặng nữa, nói gì đi.\nB: Em không có gì để nói.", "vn_b": "A: Em giận anh điều gì, nói anh biết.\nB: Anh tự suy nghĩ đi.", "jp": "", "jp_a": "A: もう黙ってないで、何か言ってください。\nB: 何も言うことはありません。", "jp_b": "A: 私に怒っているなら、言ってください。\nB: 自分で考えてください。", "en": "silent protest", "en_a": "A: Don't stay silent anymore, say something.\nB: I have nothing to say.", "en_b": "A: If you're angry at me, tell me.\nB: Think for yourself.", "tag": "갈등/화해"}, {"no": 852, "cat": "친구 대화", "vn": "Khi bạn đang rất tức giận", "vn_a": "B: Em đang rất giận đấy!\nA: Anh biết rồi, anh xin lỗi.", "vn_b": "B: Xin lỗi không thôi không đủ!\nA: Vậy anh phải làm gì để em hết giận?", "jp": "", "jp_a": "B: とても怒っています！\nA: わかっています、申し訳ありません。", "jp_b": "B: 申し訳ありませんが十分ではありません!\nA: では、怒るのをやめさせるにはどうすればいいでしょうか？", "en": "When you are very angry", "en_a": "B: I'm so angry!\nA: I know, I'm sorry.", "en_b": "B: Sorry is not enough!\nA: So what should I do to make you stop being angry?", "tag": "갈등/화해"}, {"no": 853, "cat": "친구 대화", "vn": "dọa chia tay", "vn_a": "B: Hay là mình tạm xa nhau một thời gian đi.\nA: Đừng nói vậy, anh không thể mất em.", "vn_b": "B: Em mệt mỏi lắm rồi.\nA: Mình cùng giải quyết, đừng bỏ cuộc nhé.", "jp": "", "jp_a": "B: あるいは、しばらく離れたほうがいいかもしれません。\nA: そんなこと言わないで、私はあなたを失うわけにはいきません。", "jp_b": "B: 私はとても疲れている。\nA: 諦めずに一緒に解決しましょう。", "en": "threaten to break up", "en_a": "B: Or maybe we should just go away for a while.\nA: Don't say that, I can't lose you.", "en_b": "B: I'm so tired.\nA: Let's solve it together, don't give up.", "tag": "갈등/화해"}, {"no": 854, "cat": "친구 대화", "vn": "hòa giải", "vn_a": "A: Mình làm hòa nhé.\nB: Anh phải hứa thay đổi đó.", "vn_b": "A: Anh hứa, từ nay anh sẽ tốt hơn với em.\nB: Lại đây, em ôm anh một cái.", "jp": "", "jp_a": "A: 平和を作りましょう。\nB: それを変えると約束しなければなりません。", "jp_b": "A: 約束します、これからはもっとあなたに優しくしていきます。\nB: こっちにおいで、抱きしめてあげるよ。", "en": "reconcile", "en_a": "A: Let's make peace.\nB: You must promise to change that.", "en_b": "A: I promise, from now on I will be better to you.\nB: Come here, I'll give you a hug.", "tag": "갈등/화해"}, {"no": 855, "cat": "친구 대화", "vn": "khôi phục niềm tin", "vn_a": "B: Em muốn tin anh, nhưng em sợ.\nA: Hãy cho anh cơ hội chứng minh.", "vn_b": "B: Một lần nữa thôi đó.\nA: Cảm ơn em đã không bỏ anh.", "jp": "", "jp_a": "B: 信じたいけど怖い。\nA: それを証明するチャンスをください。", "jp_b": "B: もう一度だけ。\nA: 私から離れないでくれてありがとう。", "en": "restore confidence", "en_a": "B: I want to believe you, but I'm scared.\nA: Give me a chance to prove it.", "en_b": "B: Just one more time.\nA: Thank you for not leaving me.", "tag": "갈등/화해"}, {"no": 856, "cat": "친구 대화", "vn": "câu chuyện hôn nhân", "vn_a": "A: Em có nghĩ tới chuyện kết hôn chưa?\nB: Em mới 25 thôi mà anh.", "vn_b": "A: Anh muốn cưới em trong vòng 2 năm tới.\nB: Vậy anh phải tiết kiệm tiền nha.", "jp": "", "jp_a": "A: 結婚について考えたことはありますか？\nB: 私はまだ25歳です、兄弟。", "jp_b": "A: 2年以内には結婚したいと思っています。\nB: だからお金を節約しなければなりません。", "en": "marriage story", "en_a": "A: Have you thought about getting married?\nB: I'm only 25, bro.", "en_b": "A: I want to marry you within the next 2 years.\nB: So you have to save money.", "tag": "미래 계획"}, {"no": 857, "cat": "친구 대화", "vn": "gặp bố mẹ tôi", "vn_a": "A: Tết này em về quê anh chơi nhé.\nB: Em sợ ba mẹ anh không thích em.", "vn_b": "A: Yên tâm, ba mẹ anh dễ tính lắm.\nB: Em mua quà gì cho ba mẹ anh?", "jp": "", "jp_a": "A: 今年のテト、あなたの故郷に遊びに帰ります。\nB: あなたの両親は私のことを嫌っているのではないかと思います。", "jp_b": "A: 心配しないでください、私の両親はとても穏やかです。\nB: あなたの両親にどんなプレゼントを買えばいいでしょうか？", "en": "meet my parents", "en_a": "A: This Tet, I'll come back to your hometown to play.\nB: I'm afraid your parents don't like me.", "en_b": "A: Don't worry, my parents are very easy-going.\nB: What gift should I buy for your parents?", "tag": "미래 계획"}, {"no": 858, "cat": "친구 대화", "vn": "Bắt đầu sống chung", "vn_a": "A: Mình dọn về sống chung nhé.\nB: Anh nói thật à?", "vn_b": "A: Anh muốn mỗi sáng được nhìn thấy em.\nB: Vậy mình tìm nhà nhé.", "jp": "", "jp_a": "A: 引っ越して一緒に住もうよ。\nB: 本当のことを言っていますか？", "jp_b": "A: 毎朝あなたに会いたいです。\nB: それでは、家を探しましょう。", "en": "Start living together", "en_a": "A: Let's move in and live together.\nB: Are you telling the truth?", "en_b": "A: I want to see you every morning.\nB: So let's find a house.", "tag": "미래 계획"}, {"no": 859, "cat": "친구 대화", "vn": "kế hoạch sinh con", "vn_a": "B: Anh muốn có mấy đứa con?\nA: Anh muốn hai đứa, một trai một gái.", "vn_b": "B: Em cũng vậy, mong sao như ý.\nA: Đặt tên đẹp đẹp cho con nhé.", "jp": "", "jp_a": "B: 子供は何人欲しいですか?\nA: 私は男の子と女の子の2人の子供が欲しいです。", "jp_b": "B: 私も、うまくいくことを願っています。\nA: お子様に素敵な名前を付けてください。", "en": "birth plan", "en_a": "B: How many children do you want?\nA: I want two children, one boy and one girl.", "en_b": "B: Me too, I hope it goes well.\nA: Give your child a beautiful name.", "tag": "미래 계획"}, {"no": 860, "cat": "친구 대화", "vn": "Nghề nghiệp/Khởi nghiệp", "vn_a": "B: Anh muốn làm sếp mình không?\nA: Có chứ, anh muốn mở công ty riêng.", "vn_b": "B: Em sẽ ủng hộ anh hết mình.\nA: Có em là anh có động lực rồi.", "jp": "", "jp_a": "B: 私の上司になりたいですか？\nA: はい、自分の会社を開きたいです。", "jp_b": "B: 心から応援させていただきます。\nA: あなたがいると私のモチベーションが上がります。", "en": "Career/Startup", "en_a": "B: Do you want to be my boss?\nA: Yes, I want to open my own company.", "en_b": "B: I will support you wholeheartedly.\nA: Having you makes me motivated.", "tag": "미래 계획"}, {"no": 861, "cat": "친구 대화", "vn": "kế hoạch tiết kiệm", "vn_a": "A: Mình lập kế hoạch tiết kiệm nhé.\nB: Mỗi tháng để dành bao nhiêu?", "vn_b": "A: Khoảng 30% lương đi.\nB: Vậy mình sẽ sớm có nhà.", "jp": "", "jp_a": "A: 貯蓄計画を立ててみましょう。\nB: 毎月いくら貯金すればいいの？", "jp_b": "A: 給料の30％くらい。\nB: だからもうすぐ家が建つよ。", "en": "savings plan", "en_a": "A: Let's make a savings plan.\nB: How much to save each month?", "en_b": "A: About 30% of salary.\nB: So I will have a house soon.", "tag": "미래 계획"}, {"no": 862, "cat": "친구 대화", "vn": "mua nhà", "vn_a": "B: Mình mua nhà ở đâu nhỉ?\nA: Quận 7 đi, gần công ty cả hai mình.", "vn_b": "B: Khu đó đắt lắm.\nA: Anh sẽ cố gắng kiếm tiền.", "jp": "", "jp_a": "B: 家はどこで買えばいいの？\nA: 第 7 地区、両社の近く。", "jp_b": "B: その地域はとても物価が高いです。\nA: お金を稼いでみます。", "en": "buy a house", "en_a": "B: Where do I buy a house?\nA: District 7, close to both of our companies.", "en_b": "B: That area is very expensive.\nA: I will try to make money.", "tag": "미래 계획"}, {"no": 863, "cat": "친구 대화", "vn": "chuyến đi mơ ước", "vn_a": "B: Em mơ được đi châu Âu một lần.\nA: Mình sẽ đi tuần trăng mật ở Paris.", "vn_b": "B: Anh hứa rồi đấy nhé.\nA: Anh không bao giờ thất hứa với em.", "jp": "", "jp_a": "B: 私は一度ヨーロッパに行くことを夢見ています。\nA: 新婚旅行でパリへ行く予定です。", "jp_b": "B: 約束します。\nA: 私はあなたとの約束を決して破りません。", "en": "dream trip", "en_a": "B: I dream of going to Europe once.\nA: I'm going on my honeymoon to Paris.", "en_b": "B: I promise.\nA: I never break my promise to you.", "tag": "미래 계획"}, {"no": 864, "cat": "친구 대화", "vn": "kế hoạch nghỉ hưu", "vn_a": "A: Già rồi mình về quê sống nhé.\nB: Có vườn rau, nuôi chó, chơi với cháu.", "vn_b": "A: Đó là cuộc sống anh muốn.\nB: Em cũng vậy, có anh là đủ.", "jp": "", "jp_a": "A: 年を取ったら、故郷に戻って暮らすつもりです。\nB: 家庭菜園をしたり、犬を育てたり、孫と遊んだり。", "jp_b": "A: それが彼が望む人生だ。\nB: 私も、あなたがいれば十分です。", "en": "retirement plan", "en_a": "A: When I'm old, I'll go back to my hometown to live.\nB: Have a vegetable garden, raise a dog, and play with grandchildren.", "en_b": "A: That's the life he wants.\nB: Me too, having you is enough.", "tag": "미래 계획"}, {"no": 865, "cat": "친구 대화", "vn": "cùng nhau già đi", "vn_a": "B: Anh có sợ già không?\nA: Không, miễn là già cùng em.", "vn_b": "B: Anh ngọt ghê.\nA: Anh nói thật, đó là ước nguyện của anh.", "jp": "", "jp_a": "B: 年をとるのが怖いですか？\nA: いいえ、私があなたと一緒に年を重ねる限り。", "jp_b": "B: あなたはとても優しいです。\nA: 彼は真実を語った、それが彼の願いだった。", "en": "grow old together", "en_a": "B: Are you afraid of getting old?\nA: No, as long as I grow old with you.", "en_b": "B: You're so sweet.\nA: He told the truth, that was his wish.", "tag": "미래 계획"}, {"no": 866, "cat": "친구 대화", "vn": "Khi bạn chán nản", "vn_a": "B: Anh ơi, em buồn quá.\nA: Có chuyện gì kể anh nghe đi.", "vn_b": "B: Công việc áp lực quá, em không chịu nổi.\nA: Tới đây, anh ôm em một cái.", "jp": "", "jp_a": "B: ハニー、とても悲しいです。\nA: 何か言いたいことはありますか？", "jp_b": "B: 仕事はストレスがたまりすぎて、耐えられません。\nA: こっちに来て、抱きしめて。", "en": "When you're depressed", "en_a": "B: Honey, I'm so sad.\nA: Is there something to tell you?", "en_b": "B: Work is so stressful, I can't stand it.\nA: Come here, give me a hug.", "tag": "감정/위로"}, {"no": 867, "cat": "친구 대화", "vn": "nhấn mạnh", "vn_a": "A: Hôm nay anh stress kinh khủng.\nB: Sếp lại la anh à?", "vn_b": "A: Ừ, anh muốn nghỉ việc luôn.\nB: Bình tĩnh, mai tính, nay anh nghỉ ngơi đi.", "jp": "", "jp_a": "A: 今日、私は非常にストレスを感じています。\nB: あなたの上司はまたあなたに怒鳴っていますか？", "jp_b": "A: はい、仕事を辞めたいです。\nB: 落ち着いて、明日のことを考えて、今は休んでもいいです。", "en": "emphasize", "en_a": "A: Today I'm extremely stressed.\nB: Is your boss yelling at you again?", "en_b": "A: Yes, I want to quit my job.\nB: Calm down, think tomorrow, now you can rest.", "tag": "감정/위로"}, {"no": 868, "cat": "친구 대화", "vn": "an ủi", "vn_a": "B: Em không biết phải làm sao.\nA: Có anh đây, đừng lo.", "vn_b": "B: Cảm ơn anh, anh là điểm tựa của em.\nA: Bất cứ lúc nào em cần, anh sẽ ở đây.", "jp": "", "jp_a": "B: どうすればいいのかわかりません。\nA: 私はここにいます、心配しないでください。", "jp_b": "B: ありがとう、あなたは私のサポートです。\nA: あなたが私を必要とするときはいつでも、私はここにいます。", "en": "appease", "en_a": "B: I don't know what to do.\nA: I'm here, don't worry.", "en_b": "B: Thank you, you are my support.\nA: Anytime you need me, I'll be here.", "tag": "감정/위로"}, {"no": 869, "cat": "친구 대화", "vn": "chia sẻ những khoảnh khắc hạnh phúc", "vn_a": "B: Anh ơi, em được tăng lương rồi!\nA: Thật à? Chúc mừng em.", "vn_b": "B: Tối nay em mời anh ăn nhà hàng.\nA: Vậy em đặt nhà hàng đi, anh ăn nhiều đó!", "jp": "", "jp_a": "B: おい、昇給したよ！\nA: 本当に？おめでとう。", "jp_b": "B: 今夜、レストランでのディナーにご招待します。\nA: それならレストランを予約して、たくさん食べます！", "en": "share happy moments", "en_a": "B: Hey man, I got a raise!\nA: Really? Congratulations.", "en_b": "B: Tonight I invite you to dinner at a restaurant.\nA: Then book a restaurant, I'll eat a lot!", "tag": "감정/위로"}, {"no": 870, "cat": "친구 대화", "vn": "sẻ chia những ngày buồn", "vn_a": "A: Hôm nay ông nội anh mất rồi.\nB: Trời ơi, anh có sao không?", "vn_b": "A: Anh buồn lắm, nhưng anh phải mạnh mẽ.\nB: Em sẽ đi đám tang cùng anh.", "jp": "", "jp_a": "A: 今日、私の祖父が亡くなりました。\nB: ああ、大丈夫ですか？", "jp_b": "A: とても悲しいですが、強くならなければなりません。\nB: 私はあなたと一緒にお葬式に行きます。", "en": "Share sad days", "en_a": "A: Today my grandfather passed away.\nB: Oh my god, are you okay?", "en_b": "A: I'm very sad, but I have to be strong.\nB: I will go to the funeral with you.", "tag": "감정/위로"}, {"no": 871, "cat": "친구 대화", "vn": "nguôi giận", "vn_a": "B: Anh đừng giận sếp nữa.\nA: Anh không kiềm chế được.", "vn_b": "B: Hít thở sâu nào, có em đây.\nA: Có em anh thấy bình tĩnh hơn.", "jp": "", "jp_a": "B: もう上司に怒らないでください。\nA: 彼は自分自身をコントロールできなかった。", "jp_b": "B: 深呼吸してください、私はここにいます。\nA: あなたと一緒にいると、気持ちが落ち着くのです。", "en": "mitigate", "en_a": "B: Don't be angry with your boss anymore.\nA: He couldn't control himself.", "en_b": "B: Take a deep breath, I'm here.\nA: With you I feel calmer.", "tag": "감정/위로"}, {"no": 872, "cat": "친구 대화", "vn": "khuyến khích", "vn_a": "B: Anh có thể làm được, em tin anh.\nA: Anh sợ mình không làm nổi.", "vn_b": "B: Anh giỏi lắm, đừng nghi ngờ bản thân.\nA: Có em ủng hộ anh có thể làm mọi thứ.", "jp": "", "jp_a": "B: あなたならできる、私はあなたを信じています。\nA: 残念ながらそれはできません。", "jp_b": "B: あなたは素晴らしいです、自分を疑わないでください。\nA: あなたのサポートがあれば、私は何でもできます。", "en": "encourage", "en_a": "B: You can do it, I believe in you.\nA: I'm afraid I can't do it.", "en_b": "B: You're great, don't doubt yourself.\nA: With your support I can do anything.", "tag": "감정/위로"}, {"no": 873, "cat": "친구 대화", "vn": "hỗ trợ phỏng vấn", "vn_a": "A: Mai em phỏng vấn rồi, hồi hộp quá.\nB: Anh cứ tự nhiên, anh đủ giỏi rồi.", "vn_b": "A: Lỡ rớt thì sao?\nB: Có em đây, không lo.", "jp": "", "jp_a": "A: 明日面接なのですが、とても緊張しています。\nB: さあ、もう十分です。", "jp_b": "A: 落ちたらどうしますか？\nB: 私はここにいます、心配しないでください。", "en": "interview support", "en_a": "A: I have an interview tomorrow, I'm so nervous.\nB: Go ahead, you're good enough.", "en_b": "A: What if you fall?\nB: I'm here, don't worry.", "tag": "감정/위로"}, {"no": 874, "cat": "친구 대화", "vn": "thiếu tự tin", "vn_a": "B: Em thấy mình không đủ tốt.\nA: Em là người tuyệt vời nhất anh biết.", "vn_b": "B: Anh nói vì anh yêu em thôi.\nA: Anh nói vì đó là sự thật.", "jp": "", "jp_a": "B: 私は十分ではないように感じます。\nA: あなたは私が知っている中で最も素晴らしい人です。", "jp_b": "B: 愛しているから言ったのです。\nA: 彼はそれが真実だったからそう言った。", "en": "diffidence", "en_a": "B: I feel like I'm not good enough.\nA: You are the most wonderful person I know.", "en_b": "B: I said it because I love you.\nA: He said it because it was the truth.", "tag": "감정/위로"}, {"no": 875, "cat": "친구 대화", "vn": "sự cô đơn", "vn_a": "B: Em cô đơn quá, anh ơi.\nA: Em đừng nghĩ vậy, anh luôn ở bên em mà.", "vn_b": "B: Có lúc em vẫn thấy trống trải.\nA: Anh hiểu, mình đi đâu đó cho khuây khoả nhé.", "jp": "", "jp_a": "B: とても寂しいよ、ハニー。\nA: そんなこと思わないで、私はいつも一緒だよ。", "jp_b": "B: 今でも時々空っぽに感じることがあります。\nA: 分かりました、どこかリラックスする場所に行きましょう。", "en": "loneliness", "en_a": "B: I'm so lonely, honey.\nA: Don't think like that, I'm always with you.", "en_b": "B: Sometimes I still feel empty.\nA: I understand, let's go somewhere to relax.", "tag": "감정/위로"}, {"no": 876, "cat": "친구 대화", "vn": "Khi bạn ốm", "vn_a": "B: Anh ơi, em sốt rồi.\nA: Để anh mua thuốc cho.", "vn_b": "B: Anh đo nhiệt độ cho em.\nA: 38 độ, em phải uống nhiều nước.", "jp": "", "jp_a": "B: ハニー、熱があります。\nA: 薬を買ってあげましょう。", "jp_b": "B: 体温を測りました。\nA: 38度になると、水をたくさん飲まなければなりません。", "en": "When you're sick", "en_a": "B: Honey, I have a fever.\nA: Let me buy medicine for you.", "en_b": "B: I took your temperature.\nA: 38 degrees, you have to drink a lot of water.", "tag": "건강/돌봄"}, {"no": 877, "cat": "친구 대화", "vn": "đến bệnh viện", "vn_a": "A: Đi bệnh viện đi em, đừng chịu nữa.\nB: Em sợ tiêm lắm.", "vn_b": "A: Anh đi cùng em, đừng sợ.\nB: Cảm ơn anh đã luôn lo cho em.", "jp": "", "jp_a": "A: 病院に行きなさい、もう我慢しないでください。\nB: 私は注射がとても怖いです。", "jp_b": "A: 私はあなたと一緒です、恐れることはありません。\nB: いつもお世話になりありがとうございます。", "en": "to the hospital", "en_a": "A: Go to the hospital, don't take it anymore.\nB: I'm very afraid of injections.", "en_b": "A: I'm with you, don't be afraid.\nB: Thank you for always taking care of me.", "tag": "건강/돌봄"}, {"no": 878, "cat": "친구 대화", "vn": "tập thể dục", "vn_a": "A: Mai mình đi tập gym nhé.\nB: Em không thích tập nặng.", "vn_b": "A: Vậy mình chạy bộ buổi sáng đi.\nB: Ok, dậy sớm gọi em nha.", "jp": "", "jp_a": "A: 明日ジムに行きましょう。\nB: 私は激しいトレーニングは好きではありません。", "jp_b": "A: ということで、朝ジョギングに行きます。\nB: 分かった、早く起きて電話して。", "en": "do exercise", "en_a": "A: Let's go to the gym tomorrow.\nB: I don't like heavy training.", "en_b": "A: So I go jogging in the morning.\nB: Ok, wake up early and call me.", "tag": "건강/돌봄"}, {"no": 879, "cat": "친구 대화", "vn": "ăn kiêng", "vn_a": "B: Em phải giảm cân.\nA: Em đẹp rồi mà, không cần.", "vn_b": "B: Em mặc đồ không vừa.\nA: Vậy anh cùng giảm với em.", "jp": "", "jp_a": "B: 体重を減らさなければなりません。\nA: あなたはすでに美しいので、その必要はありません。", "jp_b": "B: 私の服は似合わない。\nA: だから私と一緒にそれを減らすことができます。", "en": "diet", "en_a": "B: I have to lose weight.\nA: You're already beautiful, no need.", "en_b": "B: My clothes don't fit.\nA: So you can reduce it with me.", "tag": "건강/돌봄"}, {"no": 880, "cat": "친구 대화", "vn": "ngủ", "vn_a": "A: Em phải ngủ đủ giấc đó.\nB: Em làm việc khuya quá.", "vn_b": "A: Sức khỏe quan trọng hơn công việc.\nB: Em biết rồi, em sẽ ngủ sớm.", "jp": "", "jp_a": "A: 十分な睡眠を取らなければなりません。\nB: 仕事が遅すぎます。", "jp_b": "A: 健康は仕事よりも大切です。\nB: 分かった、早く寝ます。", "en": "Sleep", "en_a": "A: You must get enough sleep.\nB: I work too late.", "en_b": "A: Health is more important than work.\nB: I know, I'll sleep early.", "tag": "건강/돌봄"}, {"no": 881, "cat": "친구 대화", "vn": "Chăm sóc bữa ăn của bạn", "vn_a": "B: Anh ăn cơm chưa?\nA: Chưa, anh bận quá.", "vn_b": "B: Anh phải ăn đúng giờ chứ!\nA: Em đặt đồ ăn cho anh nhé.", "jp": "", "jp_a": "B: 食べましたか？\nA: いいえ、忙しすぎます。", "jp_b": "B: 時間通りに食べなければなりません！\nA: 食べ物を注文します。", "en": "Take care of your meals", "en_a": "B: Have you eaten?\nA: No, I'm too busy.", "en_b": "B: You must eat on time!\nA: I'll order you food.", "tag": "건강/돌봄"}, {"no": 882, "cat": "친구 대화", "vn": "mát xa", "vn_a": "B: Anh mỏi vai à, em mát-xa cho.\nA: Tay em ấm quá, dễ chịu thật.", "vn_b": "B: Anh làm việc nhiều quá rồi.\nA: Có em massage anh khoẻ liền.", "jp": "", "jp_a": "B: 肩が疲れているのでマッサージしましょう。\nA: あなたの手がとても暖かくて、とても快適です。", "jp_b": "B: あなたは働きすぎました。\nA: マッサージしてもらえると元気になりますよ。", "en": "massage", "en_a": "B: Your shoulder is tired, let me massage it for you.\nA: Your hands are so warm, so comfortable.", "en_b": "B: You've been working too much.\nA: If you massage me, I'll be fine.", "tag": "건강/돌봄"}, {"no": 883, "cat": "친구 대화", "vn": "Thăm nhà vợ/chồng", "vn_a": "A: Cuối tuần mình về nhà ba mẹ anh nhé.\nB: Mẹ anh thích ăn gì, em mua biếu.", "vn_b": "A: Mẹ thích trái cây, đặc biệt là sầu riêng.\nB: Vậy em mua sầu riêng.", "jp": "", "jp_a": "A: 今週末、あなたの実家に行きましょう。\nB: お母さんが食べたいものは何でも買ってあげるよ。", "jp_b": "A: お母さんは果物が好きで、特にドリアンが好きです。\nB: ということでドリアンを買いました。", "en": "Visit your spouse's house", "en_a": "A: Let's go to your parents' house this weekend.\nB: Whatever your mother likes to eat, I'll buy it for you.", "en_b": "A: Mom likes fruit, especially durian.\nB: So I bought durian.", "tag": "가족/사회"}, {"no": 884, "cat": "친구 대화", "vn": "bạn bè gặp nhau", "vn_a": "A: Tối nay bạn anh tụ họp, em đi cùng nhé.\nB: Em ngại lắm, em không quen ai.", "vn_b": "A: Anh giới thiệu, mọi người dễ thương lắm.\nB: Vậy anh không được bỏ em một mình đó.", "jp": "", "jp_a": "A: 今夜友達が集まるので、一緒に行きます。\nB: とても恥ずかしくて、誰も知りません。", "jp_b": "A: と紹介されましたが、みんな可愛いですね。\nB: だから、私を放っておけないんです。", "en": "friends meet", "en_a": "A: Tonight my friends are gathering, I'll go with you.\nB: I'm so shy, I don't know anyone.", "en_b": "A: He introduced, everyone is so cute.\nB: So you can't leave me alone.", "tag": "가족/사회"}, {"no": 885, "cat": "친구 대화", "vn": "ăn tối cùng nhau", "vn_a": "B: Anh nhậu say về sớm nha.\nA: Anh sẽ uống ít thôi.", "vn_b": "B: Đừng đi với mấy đứa rủ rê.\nA: Yên tâm, anh chỉ có em thôi.", "jp": "", "jp_a": "B: 酔っ払って早く帰ってくるんですね。\nA: 少し飲みます。", "jp_b": "B: 誘ってくる男性とは行かないでください。\nA: 心配しないでください、私にはあなたしかいません。", "en": "have dinner together", "en_a": "B: You're drunk and come home early.\nA: I'll drink a little.", "en_b": "B: Don't go with guys who invite you.\nA: Don't worry, I only have you.", "tag": "가족/사회"}, {"no": 886, "cat": "친구 대화", "vn": "tham dự một đám cưới", "vn_a": "A: Cuối tuần này dự đám cưới bạn anh nhé.\nB: Em mặc gì hợp?", "vn_b": "A: Áo dài đi, em mặc đẹp lắm.\nB: Em đi may một bộ mới.", "jp": "", "jp_a": "A: 今週末友人の結婚式に出席します。\nB: 何を着ればいいですか？", "jp_b": "A: アオザイを着ると、あなたは美しく見えます。\nB: 新しいセットを縫います。", "en": "attend a wedding", "en_a": "A: Going to my friend's wedding this weekend.\nB: What should I wear?", "en_b": "A: Wear ao dai, you look beautiful in it.\nB: I'm going to sew a new set.", "tag": "가족/사회"}, {"no": 887, "cat": "친구 대화", "vn": "Ngày Lễ (Tết)", "vn_a": "B: Tết này em không về quê em được.\nA: Sao vậy em, có chuyện gì?", "vn_b": "B: Mẹ em bệnh, em phải về sớm.\nA: Anh đi cùng em nhé.", "jp": "", "jp_a": "B: 今年のテトには故郷に帰れない。\nA: どうしたの、どうしたの？", "jp_b": "B: 母が病気なので、早く帰らなければなりません。\nA: 一緒に来てください。", "en": "Holidays (Tet)", "en_a": "B: I can't go back to my hometown this Tet.\nA: What's wrong, what's wrong?", "en_b": "B: My mother is sick, I have to go home early.\nA: Please come with me.", "tag": "가족/사회"}, {"no": 888, "cat": "친구 대화", "vn": "gọi cho bố mẹ bạn", "vn_a": "A: Em gọi cho mẹ chưa?\nB: Chưa, em sẽ gọi tối nay.", "vn_b": "A: Mẹ em sẽ vui lắm khi nghe giọng em.\nB: Em biết, em nhớ mẹ em quá.", "jp": "", "jp_a": "A: もうお母さんに電話しましたか？\nB: いいえ、今夜電話します。", "jp_b": "A: お母さんもあなたの声を聞いてとても喜ぶでしょう。\nB: わかっています、母がとても恋しいです。", "en": "call your parents", "en_a": "A: Have you called mom yet?\nB: No, I'll call tonight.", "en_b": "A: Your mother will be very happy to hear your voice.\nB: I know, I miss my mother so much.", "tag": "가족/사회"}, {"no": 889, "cat": "친구 대화", "vn": "giới thiệu với bạn bè", "vn_a": "B: Đây là người yêu em, anh Nam.\nA: Chào các bạn, rất vui được gặp.", "vn_b": "B: Anh ấy rất tốt với em.\nA: Em mới là người tuyệt vời.", "jp": "", "jp_a": "B: 私を愛している人、ナムさんです。\nA: みなさんこんにちは、初めまして。", "jp_b": "B: 彼は私にとても良くしてくれます。\nA: あなたは素晴らしい人です。", "en": "Introduce to friends", "en_a": "B: This is the person who loves me, Mr. Nam.\nA: Hello everyone, nice to meet you.", "en_b": "B: He is very good to me.\nA: You are a wonderful person.", "tag": "가족/사회"}, {"no": 890, "cat": "친구 대화", "vn": "đăng bài trên SNS", "vn_a": "B: Anh đăng ảnh hai mình lên Facebook đi.\nA: Để anh chỉnh ảnh đẹp đã.", "vn_b": "B: Caption thật ngọt ngào nha.\nA: \"Người yêu của tôi đẹp nhất thế gian\" được không?", "jp": "", "jp_a": "B: 二人の写真をFacebookに投稿してください。\nA: 写真を綺麗に加工させて頂きます。", "jp_b": "B: キャプションがとても優しいですね。\nA: 「私の恋人は世界で一番美しい」いいですか？", "en": "post on SNS", "en_a": "B: Please post a photo of the two of us on Facebook.\nA: Let me edit the photo beautifully.", "en_b": "B: The caption is so sweet.\nA: \"My lover is the most beautiful in the world\" okay?", "tag": "가족/사회"}, {"no": 891, "cat": "친구 대화", "vn": "đề nghị", "vn_a": "A: Em yêu, anh có một câu hỏi quan trọng.\nB: Anh quỳ xuống làm gì vậy?", "vn_b": "A: Em có đồng ý làm vợ anh không?\nB: Vâng, em đồng ý!", "jp": "", "jp_a": "A: ハニー、重要な質問があります。\nB: 何のためにひざまずいているのですか？", "jp_b": "A: 私の妻になることに同意しますか？\nB: はい、同意します！", "en": "suggestion", "en_a": "A: Honey, I have an important question.\nB: What are you kneeling down for?", "en_b": "A: Do you agree to be my wife?\nB: Yes, I agree!", "tag": "특별한 순간"}, {"no": 892, "cat": "친구 대화", "vn": "hôn ước", "vn_a": "B: Em không thể tin được, mình đính hôn rồi!\nA: Anh là người đàn ông hạnh phúc nhất.", "vn_b": "B: Mình sẽ làm đám cưới khi nào?\nA: Mùa thu năm sau nhé.", "jp": "", "jp_a": "B: 信じられない、婚約したんだ！\nA: 彼は最も幸せな人です。", "jp_b": "B: いつ結婚しますか？\nA: 来年秋。", "en": "engagement", "en_a": "B: I can't believe it, I'm engaged!\nA: He is the happiest man.", "en_b": "B: When will I get married?\nA: Fall next year.", "tag": "특별한 순간"}, {"no": 893, "cat": "친구 대화", "vn": "dịp kỉ niệm", "vn_a": "A: Hôm nay là kỷ niệm một năm của mình.\nB: Anh nhớ à? Em tưởng anh quên.", "vn_b": "A: Sao quên được, anh đặt nhà hàng rồi.\nB: Anh thật sự là người yêu hoàn hảo.", "jp": "", "jp_a": "A: 今日は私の一周年記念日です。\nB: 覚えていますか？忘れたのかと思った。", "jp_b": "A: 忘れるはずがないのに、すでにレストランを予約してしまったのだ。\nB: 彼は本当に完璧な恋人です。", "en": "anniversary occasion", "en_a": "A: Today is my one year anniversary.\nB: Do you remember? I thought you forgot.", "en_b": "A: How could I forget, I already booked the restaurant.\nB: He is truly the perfect lover.", "tag": "특별한 순간"}, {"no": 894, "cat": "친구 대화", "vn": "ngày lễ tình nhân", "vn_a": "A: Chúc em ngày Valentine vui vẻ.\nB: Hoa và socola đẹp quá.", "vn_b": "A: Đây chỉ là phần nhỏ thôi, quà chính ở nhà.\nB: Anh tốn kém quá rồi.", "jp": "", "jp_a": "A: 幸せなバレンタインデーをお過ごしください。\nB: お花もチョコレートもとても綺麗です。", "jp_b": "A: これはほんの一部で、主な贈り物は自宅にあります。\nB: お金を使いすぎました。", "en": "Valentine's Day", "en_a": "A: Wishing you a happy Valentine's Day.\nB: The flowers and chocolate are so beautiful.", "en_b": "A: This is just a small part, the main gift is at home.\nB: You've spent too much money.", "tag": "특별한 순간"}, {"no": 895, "cat": "친구 대화", "vn": "Giáng sinh", "vn_a": "B: Giáng sinh này mình làm gì?\nA: Ăn tối lãng mạn, sau đó đi xem đèn.", "vn_b": "B: Có quà không anh?\nA: Quà của em sẽ là một điều bất ngờ.", "jp": "", "jp_a": "B: 今年のクリスマスは何をしたらいいでしょうか？\nA: ロマンチックなディナーを楽しんだ後は、ライトアップを見に行きましょう。", "jp_b": "B: 贈り物はありますか？\nA: あなたの贈り物はサプライズになるでしょう。", "en": "Christmas", "en_a": "B: What should I do this Christmas?\nA: Have a romantic dinner, then go see the lights.", "en_b": "B: Do you have a gift?\nA: Your gift will be a surprise.", "tag": "특별한 순간"}, {"no": 896, "cat": "친구 대화", "vn": "đếm ngược năm mới", "vn_a": "A: Đếm ngược nào, 5, 4, 3, 2, 1!\nB: Chúc mừng năm
