<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vietnamese 3000 — VN · JP · EN</title>
<style>
:root{
  --bg:#f8fafc;--card:#fff;--soft:#f1f5f9;--text:#0f172a;--muted:#64748b;
  --border:#e2e8f0;--accent:#1e40af;--vn:#1e3a5f;--jp:#1a1a1a;--en:#475569;
  --core-bg:#dbeafe;--core:#1e40af;--biz-bg:#fef3c7;--biz:#92400e;
  --daily-bg:#dcfce7;--daily:#166534;--fa:#dc2626;--fb:#ea580c;--fc:#16a34a;
  --sh:0 1px 3px rgba(0,0,0,.04);
}
[data-theme="dark"]{
  --bg:#0f172a;--card:#1e293b;--soft:#334155;--text:#f1f5f9;--muted:#94a3b8;
  --border:#334155;--accent:#60a5fa;--vn:#93c5fd;--jp:#e2e8f0;--en:#cbd5e1;
  --core-bg:#1e3a8a;--core:#93c5fd;--biz-bg:#78350f;--biz:#fde68a;
  --daily-bg:#14532d;--daily:#bbf7d0;--fa:#f87171;--fb:#fb923c;--fc:#4ade80;
  --sh:0 1px 3px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;transition:background .2s,color .2s}
header{position:sticky;top:0;z-index:100;background:var(--card);
  border-bottom:1px solid var(--border);padding:14px 20px;box-shadow:var(--sh)}
.htop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
h1{font-size:20px;color:var(--accent);font-weight:700}
.sub{font-size:11px;color:var(--muted);margin-top:2px}
.tbtn{background:var(--soft);border:1px solid var(--border);color:var(--text);
  padding:7px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.tbtn:hover{background:var(--border)}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.sb{flex:1;min-width:220px;padding:9px 14px;border:1px solid var(--border);
  border-radius:8px;font-size:14px;background:var(--soft);color:var(--text);outline:none}
.sb:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,64,175,.12)}
.fg{display:flex;gap:5px;flex-wrap:wrap}
.ch{padding:5px 11px;border:1px solid var(--border);border-radius:18px;
  background:var(--soft);color:var(--text);font-size:11px;cursor:pointer;
  user-select:none;font-weight:500}
.ch:hover{border-color:var(--accent)}
.ch.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.st{font-size:11px;color:var(--muted);padding:8px 20px;background:var(--card);
  border-bottom:1px solid var(--border)}
main{padding:14px;max-width:960px;margin:0 auto}
.item{background:var(--card);border:1px solid var(--border);border-radius:10px;
  margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);transition:transform .1s}
.item:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.06)}
.word{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;padding:0}
.word>div{padding:12px 16px;border-right:1px solid var(--border)}
.word>div:last-child{border-right:none}
.ex{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;
  background:var(--soft);border-top:1px dashed var(--border)}
.ex>div{padding:8px 16px;border-right:1px solid var(--border);font-size:13px}
.ex>div:last-child{border-right:none}
.lbl{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase;
  letter-spacing:.04em;margin-bottom:3px}
.vw{font-size:18px;font-weight:700;color:var(--vn)}
.jw{font-size:15px;font-weight:600;color:var(--jp)}
.ew{font-size:14px;color:var(--en)}
.ve{color:var(--vn);font-weight:500}
.je{color:var(--jp)}
.ee{color:var(--en);font-style:italic;font-size:12px}
.meta{display:flex;gap:6px;align-items:center;padding:0 16px 8px}
.badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:8px}
.b-core{background:var(--core-bg);color:var(--core)}
.b-biz{background:var(--biz-bg);color:var(--biz)}
.b-daily{background:var(--daily-bg);color:var(--daily)}
.b-f{background:transparent;border:1px solid currentColor}
.b-f.A{color:var(--fa)}.b-f.B{color:var(--fb)}.b-f.C{color:var(--fc)}
.b-tag{background:var(--soft);color:var(--muted);font-size:9px;padding:2px 6px;border-radius:4px}
.no{font-size:10px;color:var(--muted);margin-left:auto;font-weight:600}
ruby{ruby-align:center}rt{font-size:.55em;color:var(--muted);font-weight:normal}
.empty{text-align:center;padding:50px;color:var(--muted)}
@media(max-width:700px){
  .word,.ex{grid-template-columns:1fr}
  .word>div,.ex>div{border-right:none;border-bottom:1px solid var(--border)}
  .word>div:last-child,.ex>div:last-child{border-bottom:none}
  h1{font-size:17px}.vw{font-size:16px}
}
</style>
</head>

const S={q:"",cat:"all",freq:"all"};
const strip=s=>s.replace(/<[^>]*>/g,"").toLowerCase();
const bc=c=>c==="Core"?"b-core":c==="Business"?"b-biz":"b-daily";
function card(d){return`
<div class="item">
  <div class="meta">
    <span class="badge ${bc(d.cat)}">${d.cat}</span>
    <span class="badge b-f ${d.freq}">${d.freq}</span>
    <span class="b-tag">#${d.tag}</span>
    <span class="no">#${String(d.no).padStart(3,"0")}</span>
  </div>
  <div class="word">
    <div><div class="lbl">Vietnamese</div><div class="vw">${d.vn}</div></div>
    <div><div class="lbl">日本語</div><div class="jw">${d.jp}</div></div>
    <div><div class="lbl">English</div><div class="ew">${d.en}</div></div>
  </div>
  <div class="ex">
    <div class="ve">${d.vn_ex}</div>
    <div class="je">${d.jp_ex}</div>
    <div class="ee">${d.en_ex}</div>
  </div>
</div>`}
function render(){
  const q=S.q.trim().toLowerCase();
  const r=D.filter(d=>{
    if(S.cat!=="all"&&d.cat!==S.cat)return false;
    if(S.freq!=="all"&&d.freq!==S.freq)return false;
    if(q){const h=[d.vn,strip(d.jp),d.en,d.vn_ex,strip(d.jp_ex),d.en_ex,d.tag].join(" ").toLowerCase();
      if(!h.includes(q))return false}
    return true});
  document.getElementById("st").textContent=`${r.length} / ${D.length} items`;
  document.getElementById("main").innerHTML=r.length?r.map(card).join(""):`<div class="empty">No results</div>`}
document.getElementById("sb").addEventListener("input",e=>{S.q=e.target.value;render()});
document.querySelectorAll(".ch").forEach(c=>c.addEventListener("click",()=>{
  S[c.dataset.f]=c.dataset.v;
  c.parentElement.querySelectorAll(".ch").forEach(x=>x.classList.remove("on"));
  c.classList.add("on");render()}));
const tt=document.getElementById("tt");
function theme(t){document.documentElement.setAttribute("data-theme",t);
  tt.textContent=t==="dark"?"☀️ Light":"🌙 Dark";try{localStorage.setItem("v3k",t)}catch(e){}}
let ini="light";try{const s=localStorage.getItem("v3k");if(s)ini=s;
  else if(matchMedia("(prefers-color-scheme:dark)").matches)ini="dark"}catch(e){}
theme(ini);tt.addEventListener("click",()=>theme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark"));
render();
</script>
